post:
  tags:
    - BookingPart
  summary: >
    Adds a reservation or ancillary not previously added from offer to a
    booking.
  description: >
    Adds a reservation or an ancillary to a booking. A provider can decide to
    allow or reject additional admissions, reservations or ancillaries on an

    confirmed booking.
  operationId: createBookingBookedOffersParts
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/acceptLanguage.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - $ref: ../components/parameters/idempotencyKey.yml
    - name: bookingId
      in: path
      required: true
      schema:
        type: string
    - name: bookedOfferId
      in: path
      required: true
      schema:
        type: string
        maxLength: 32768
  requestBody:
    required: true
    content:
      application/vnd.uic.osdm+json:
        schema:
          $ref: ../components/schemas/BookedOfferPartRequest.yml
  responses:
    '200':
      description: |
        reservation or ancillary added to booked offer
      content:
        application/vnd.uic.osdm+json:
          schema:
            $ref: ../components/schemas/BookedOfferPartResponse.yml
      headers:
        Content-Language:
          schema:
            type: string
            description: >
              The language of translatable strings in the response (see
              RFC2616-sec14.12).
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
delete:
  tags:
    - BookingPart
  summary: >-
    Removes reservations or ancillaries from a booking in case the parts were
    not yet confirmed. On confirmed reservations use the refund.
  operationId: deleteBookingBookedOffersParts
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - name: bookingId
      in: path
      required: true
      schema:
        type: string
    - name: bookedOfferId
      in: path
      required: true
      schema:
        type: string
        maxLength: 32768
    - name: bookedOfferPartIds
      in: query
      required: true
      description: |
        list of bookedOfferPartIds of parts to be deleted
      schema:
        type: array
        minItems: 1
        items:
          type: string
  responses:
    '204':
      description: >
        In case that a request was successful only status code 204 will be
        returned but no response content will be provided (aka as return type
        'void' in many programming languages).
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '409':
      $ref: ../components/responses/ConflictResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
