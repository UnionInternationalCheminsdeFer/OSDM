/trips-collection:
  post:
    tags:
    - Trips
    summary: returns a collection of trips for a given OJP trip request
    description: |
      Returns trips for a given trip request based on the OJP specification.
    operationId: postTrips
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptLanguage
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptNamespace
    - $ref: ../OSDM-online-api.yml#/components/parameters/page
    - name: stopBehavior
      in: query
      schema:
        $ref: ../OSDM-online-api.yml#/components/schemas/StopBehavior
      required: false
    requestBody:
      required: true
      description: |
        request for trips
      content:
        application/json:
          schema:
            $ref: ../OSDM-online-api.yml#/components/schemas/TripSearchCriteria
    responses:
      '200':
        description: |
          trips found
        content:
          application/json:
            schema:
              $ref: ../OSDM-online-api.yml#/components/schemas/TripCollectionResponse
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
/trips-collections/{tripsCollectionId}:
  get:
    tags:
    - Trips
    summary: Returns a collection of trips.
    description: |
      Returns a collection of trips for a for a given trips collection id.
      The unique codes of the origin and destination can be resolved using the places service.
    operationId: getTripsCollectionId
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptLanguage
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptNamespace
    - $ref: ../OSDM-online-api.yml#/components/parameters/page
    - name: tripsCollectionId
      in: path
      description: |
        id of the trips
      required: true
      schema:
        type: string
    - name: stopBehavior
      in: query
      schema:
        $ref: ../OSDM-online-api.yml#/components/schemas/StopBehavior
      required: false
    - name: embed
      in: query
      description: |
        Influences whether referenced resources are returned in full or as references only.
        Default value: ALL
      schema:
        type: array
        maxItems: 2
        items:
          $ref: ../OSDM-online-api.yml#/components/schemas/TripsCollectionResponseContent
    responses:
      '200':
        description: |
          trips found
        content:
          application/json:
            schema:
              $ref: ../OSDM-online-api.yml#/components/schemas/TripCollectionResponse
        headers:
          Content-Language:
            schema:
              type: string
              description: |
                The language of translatable strings in the response (see RFC2616-sec14.12).
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
