get:
  tags:
    - Exchange
  summary: Returns the exchange operation with the id provided.
  description: |
    Returns the exchange operation with the id provided. It may be a
    provisional or a confirmed exchange.
  operationId: getBookingsExchangeOperations
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/acceptLanguage.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - $ref: ../components/parameters/acceptNamespace.yml
    - name: bookingId
      in: path
      description: |
        id of the booking
      required: true
      schema:
        type: string
    - name: exchangeOperationId
      in: path
      description: |
        id of the exchange operation
      required: true
      schema:
        type: string
    - name: embed
      in: query
      description: >
        Influences whether referenced resources are returned in full or as
        references only.

        Default value: ALL
      schema:
        type: array
        maxItems: 5
        items:
          $ref: ../components/schemas/ExchangeOperationResponseContent.yml
  responses:
    '200':
      description: |
        ExchangeOperation found
      content:
        application/vnd.uic.osdm+json:
          schema:
            $ref: ../components/schemas/ExchangeOperationResponse.yml
      headers:
        Content-Language:
          schema:
            type: string
            description: >
              The language of translatable strings in the response (see
              RFC2616-sec14.12).
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
patch:
  tags:
    - Exchange
  summary: Allows to update an ongoing exchange operation.
  operationId: updateBookingsExchangeOperations
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/acceptLanguage.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - $ref: ../components/parameters/idempotencyKey.yml
    - $ref: ../components/parameters/acceptNamespace.yml
    - name: bookingId
      in: path
      description: |
        id of the booking to be exchanged.
      required: true
      schema:
        type: string
    - name: exchangeOperationId
      in: path
      description: |
        id of the exchange operation.
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/vnd.uic.osdm+json:
        schema:
          $ref: ../components/schemas/ExchangeOperationPatchRequest.yml
  responses:
    '200':
      description: |
        Exchange successfully completed
      content:
        application/vnd.uic.osdm+json:
          schema:
            $ref: ../components/schemas/ExchangeOperationResponse.yml
      headers:
        Content-Language:
          schema:
            type: string
            description: >
              The language of translatable strings in the response (see
              RFC2616-sec14.12).
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '409':
      $ref: ../components/responses/ConflictResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
delete:
  tags:
    - Exchange
  summary: Cancels an ongoing exchange operation in provisional state.
  operationId: deleteBookingsExchangeOperation
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - name: bookingId
      in: path
      description: |
        id of the booking containing the exchange operation
      required: true
      schema:
        type: string
    - name: exchangeOperationId
      in: path
      description: |
        id of the exchangeOperation to delete.
      required: true
      schema:
        type: string
  responses:
    '204':
      description: >
        In case that a request was successful only status code 204 will be
        returned but no response content will be provided (aka as return type
        'void' in many programming languages).
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '409':
      $ref: ../components/responses/ConflictResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
