get:
  tags:
    - Complaint Management
  summary: Returns a complaint.
  description: |
    Get a complaint including its current state.
  operationId: getComplaint
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/acceptLanguage.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - name: complaintId
      in: path
      description: |
        id of the complaint
      required: true
      schema:
        type: string
  responses:
    '200':
      description: |
        the requested complaint
      content:
        application/vnd.uic.osdm+json:
          schema:
            $ref: ../components/schemas/ComplaintResponse.yml
      headers:
        Cache-Control:
          schema:
            type: string
            default: public, max-age=10000
            description: >
              Resource is fairly persistent and has a medium time to live to
              allow short-term caching.
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
patch:
  tags:
    - Complaint Management
  summary: Allows updating a complaint.
  description: |
    Update a complaint request, i.e add missing documents or change state.
  operationId: patchComplaint
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/acceptLanguage.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - $ref: ../components/parameters/idempotencyKey.yml
    - name: complaintId
      in: path
      description: |
        id of the complaint to be patched
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/vnd.uic.osdm+json:
        schema:
          $ref: ../components/schemas/ComplaintPatchRequest.yml
  responses:
    '200':
      description: |
        complaint updated
      content:
        application/vnd.uic.osdm+json:
          schema:
            $ref: ../components/schemas/ComplaintResponse.yml
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '409':
      $ref: ../components/responses/ConflictResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
