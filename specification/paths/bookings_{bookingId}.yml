get:
  tags:
    - Bookings
  summary: Returns a booking.
  operationId: getBookingsId
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/acceptLanguage.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - $ref: ../components/parameters/acceptNamespace.yml
    - name: bookingId
      in: path
      description: |
        id of the booking to get.
      required: true
      schema:
        type: string
    - name: embed
      in: query
      description: >
        Influences whether referenced resources are returned in full or as
        references only.

        Default value: ALL
      schema:
        type: array
        maxItems: 7
        items:
          $ref: ../components/schemas/BookingResponseContent.yml
  responses:
    '200':
      description: |
        booking found
      content:
        application/vnd.uic.osdm+json:
          schema:
            $ref: ../components/schemas/BookingResponse.yml
      headers:
        Content-Language:
          schema:
            type: string
            description: >
              The language of translatable strings in the response (see
              RFC2616-sec14.12).
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
patch:
  tags:
    - Bookings
  summary: Updates a booking but does *not* confirm the booking.
  description: >
    Updates fulfillment types, place selection and add payment. Does *not*
    confirm the booking. The booking is confirmed by calling 'POST
    /bookings/{bookingId}/fulfillments'.
  operationId: updateBooking
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/acceptLanguage.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - $ref: ../components/parameters/acceptNamespace.yml
    - name: bookingId
      in: path
      description: |
        id of the booking to be patched
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/vnd.uic.osdm+json:
        schema:
          $ref: ../components/schemas/BookingPatchRequest.yml
  responses:
    '200':
      description: |
        booking fulfillment type updated
      content:
        application/vnd.uic.osdm+json:
          schema:
            $ref: ../components/schemas/BookingResponse.yml
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '409':
      $ref: ../components/responses/ConflictResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
delete:
  tags:
    - Bookings
  summary: Deletes a booking.
  description: |
    It is only possible before the booking is confirmed.
  operationId: deleteBookingsId
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - name: bookingId
      in: path
      description: |
        id of the booking to delete.
      required: true
      schema:
        type: string
  responses:
    '204':
      description: >
        In case that a request was successful only status code 204 will be
        returned but no response content will be provided (aka as return type
        'void' in many programming languages).
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '409':
      $ref: ../components/responses/ConflictResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
