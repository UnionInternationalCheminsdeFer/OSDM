        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
/availabilities/nearby:
  get:
    tags:
    - Availabilities
    summary: Get availabilities nearby a given place.
    description: |
      Get availabilities nearby a given place.
    operationId: getAvailabilitiesNearby
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptLanguage
      description: deprecated
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - $ref: ../OSDM-online-api.yml#/components/parameters/page
    - name: contextId
      in: query
      description: |
        denotes the offerId when contextType is OFFER, bookingId when contextType is BOOKING
      required: true
      schema:
        type: string
        maxLength: 32768
    - name: contextType
      in: query
      required: true
      schema:
        $ref: ../OSDM-online-api.yml#/components/schemas/ContextType
    - name: resourceId
      in: query
      description: |
        denotes the reservationId wen resourceType is RESERVATION, fareId when resourceType is FARE
      required: true
      schema:
        type: string
        maxLength: 32768
    - name: resourceType
      in: query
      required: true
      schema:
        $ref: ../OSDM-online-api.yml#/components/schemas/ResourceType
    - name: coachNumber
      in: query
      description: |
        coach number of the referenced place
      required: true
      schema:
        type: string
    - name: placeNumber
      in: query
      description: |
        place number of the referenced place
      required: true
      schema:
        type: string
    responses:
      '200':
        description: |
          place availabilities found
        content:
          application/json:
            schema:
              $ref: ../OSDM-online-api.yml#/components/schemas/PlaceAvailabilityCollectionResponse
        headers:
          Content-Language:
            schema:
              type: string
              description: |
                The language of translatable strings in the response (see RFC2616-sec14.12).
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
