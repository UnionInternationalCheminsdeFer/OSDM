get:
  tags:
    - Refund
  summary: >-
    Returns the refund offer for the ids provided. Does not return confirmed
    refunds.
  operationId: getRefundOffers
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/acceptLanguage.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - $ref: ../components/parameters/acceptNamespace.yml
    - name: bookingId
      in: path
      description: |
        id of the booking
      required: true
      schema:
        type: string
    - name: refundOfferId
      in: path
      description: |
        id of the refund offer to get.
      required: true
      schema:
        type: string
        maxLength: 32768
  responses:
    '200':
      description: |
        refund offer found
      content:
        application/vnd.uic.osdm+json:
          schema:
            $ref: ../components/schemas/RefundOfferResponse.yml
      headers:
        Content-Language:
          schema:
            type: string
            description: >
              The language of translatable strings in the response (see
              RFC2616-sec14.12).
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
patch:
  tags:
    - Refund
  summary: Allows to accept and confirm a refund offer.
  operationId: patchRefundOffers
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/acceptLanguage.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - $ref: ../components/parameters/idempotencyKey.yml
    - $ref: ../components/parameters/acceptNamespace.yml
    - name: bookingId
      in: path
      description: |
        id of the booking
      required: true
      schema:
        type: string
    - name: refundOfferId
      in: path
      description: |
        id of the refund offer
      required: true
      schema:
        type: string
        maxLength: 32768
  requestBody:
    required: true
    content:
      application/vnd.uic.osdm+json:
        schema:
          $ref: ../components/schemas/RefundOfferPatchRequest.yml
  responses:
    '200':
      description: |
        refund offer confirmed
      content:
        application/vnd.uic.osdm+json:
          schema:
            $ref: ../components/schemas/RefundOfferResponse.yml
      headers:
        Content-Language:
          schema:
            type: string
            description: >
              The language of translatable strings in the response (see
              RFC2616-sec14.12).
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '409':
      $ref: ../components/responses/ConflictResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
delete:
  tags:
    - Refund
  summary: Deletes a refundOffer without waiting for expiry.
  description: |
    In case the unconfirmed refund offer is not stored in the booking 
    object the delete request must return an ok (http 204). In case the 
    refund offer is already confirmed and can not be deleted the reply 
    must be an error (http 409 conflict).
  operationId: deleteRefundOffers
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - name: bookingId
      in: path
      description: |
        id of the booking
      required: true
      schema:
        type: string
    - name: refundOfferId
      in: path
      description: |
        id of the refund offer
      required: true
      schema:
        type: string
  responses:
    '204':
      description: |
        refund offer deleted
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '409':
      $ref: ../components/responses/ConflictResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
