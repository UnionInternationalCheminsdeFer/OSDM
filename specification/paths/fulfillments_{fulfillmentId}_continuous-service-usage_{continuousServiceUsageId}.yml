get:
  tags:
    - Fulfillments
    - On-Demand Services
  summary: return the continuous service usage including latest updates
  operationId: getContinuousServiceUsageId
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/acceptLanguage.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - $ref: ../components/parameters/acceptNamespace.yml
    - name: fulfillmentId
      in: path
      description: |
        id of the fulfillment to get.
      required: true
      schema:
        type: string
    - name: continuousServiceUsageId
      in: path
      description: |
        id of the continuous service usage to get.
      required: true
      schema:
        type: string
  responses:
    '200':
      description: |
        continuous service usage found
      content:
        application/vnd.uic.osdm+json:
          schema:
            $ref: ../components/schemas/ContinuousServiceUsage.yml
      headers:
        Content-Language:
          schema:
            type: string
            description: >
              The language of translatable strings in the response (see
              RFC2616-sec14.12).
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
patch:
  tags:
    - Fulfillments
    - On-Demand Services
  summary: start or end the usage of a continuous service of an demand vehicle
  description: |
    start or end the usage of a continuous service of an demand vehicle
  operationId: patchContinuousServiceUsageId
  parameters:
    - $ref: ../components/parameters/requestor.yml
    - $ref: ../components/parameters/acceptLanguage.yml
    - $ref: ../components/parameters/traceParent.yml
    - $ref: ../components/parameters/traceState.yml
    - $ref: ../components/parameters/idempotencyKey.yml
    - $ref: ../components/parameters/acceptNamespace.yml
    - name: fulfillmentId
      in: path
      required: true
      schema:
        type: string
    - name: continuousServiceUsageId
      in: path
      description: |
        id of the continuous service usage to get.
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/vnd.uic.osdm+json:
        schema:
          $ref: ../components/schemas/ContinuousServiceUsagePatchRequest.yml
  responses:
    '200':
      description: |
        fulfillment patched
      content:
        application/vnd.uic.osdm+json:
          schema:
            $ref: ../components/schemas/ContinuousServiceUsage.yml
      headers:
        Content-Language:
          schema:
            type: string
            description: >
              The language of translatable strings in the response (see
              RFC2616-sec14.12).
    '400':
      $ref: ../components/responses/BadRequestResponse.yml
    '401':
      $ref: ../components/responses/UnauthorizedResponse.yml
    '403':
      $ref: ../components/responses/ForbiddenResponse.yml
    '404':
      $ref: ../components/responses/NotFoundResponse.yml
    '409':
      $ref: ../components/responses/ConflictResponse.yml
    '415':
      $ref: ../components/responses/UnsupportedMediaTypeResponse.yml
    '500':
      $ref: ../components/responses/InternalServerErrorResponse.yml
    '501':
      $ref: ../components/responses/NotImplementedResponse.yml
    '503':
      $ref: ../components/responses/ServiceUnavailableResponse.yml
    default:
      $ref: ../components/responses/DefaultErrorResponse.yml
  security:
    - oAuth2ClientCredentials: []
