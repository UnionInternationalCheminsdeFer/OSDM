type: object
additionalProperties: false
description: |
  Describes the details of the available places.
required:
  - accommodationType
  - accommodationSubType
  - legCoverage
properties:
  accommodationType:
    $ref: ./AccommodationType.yml
  accommodationSubType:
    $ref: ./AccommodationSubType.yml
  placeProperties:
    description: >
      Selectable place properties for the offer. For
      AccommodationSubType=ANY_SEAT all available and bookable properties need
      to be returned to give a sales tool a list of possible selections.
    type:
      - array
      - 'null'
    items:
      $ref: ./PlaceProperty.yml
  numericAvailability:
    description: >
      For the AccommodationSubType=ANY_SEAT the total amount of places for the
      combination of AccommodationType and AccommodationSubType needs to
      returned.
    type:
      - integer
      - 'null'
    format: int32
  legCoverage:
    $ref: ./TripLegCoverage.yml
