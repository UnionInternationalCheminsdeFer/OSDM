type: object
additionalProperties: false
description: |
  Route description including the first and last real stopPoint
properties:
  viaSummary:
    description: >
      Printable representation of the allowed routing ("Wegetext") excluding the
      start and end point (via-description).
    type:
      - string
      - 'null'
    maxLength: 140
  routeStartName:
    description: >-
      name of the route start, either a station or a tariff border. When
      concatenated with another fare only one of the end and start points
      remains.
    type:
      - string
      - 'null'
    maxLength: 40
  routeEndName:
    description: >-
      name of the route end, either a station or a tariff border. When
      concatenated with another fare only one of the end and start points
      remains.
    type:
      - string
      - 'null'
    maxLength: 40
    examples:
      - Salzburg Hbf (GR)
  routeItem:
    $ref: ./RouteItem.yml
  routeItemList:
    description: |
      list of route items referenced within the list
    type: array
    items:
      $ref: ./RouteItem.yml
