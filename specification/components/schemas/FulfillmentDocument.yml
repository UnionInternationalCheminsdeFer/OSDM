type: object
additionalProperties: false
description: >
  Document created for fulfillment. Either downloadLink + downloadExpiry or
  content must

  be provided.
required:
  - id
  - medium
  - type
  - format
properties:
  id:
    type: string
    description: >
      Technical reference. Required for referencing from
      fulfillment.fulfillmentDocumentRefs
  medium:
    $ref: ./FulfillmentMediaType.yml
  type:
    $ref: ./FulfillmentDocumentType.yml
  downloadLink:
    type:
      - string
      - 'null'
    format: uri
  downloadExpiry:
    description: >
      Expiration time of the download link, the document will not be available
      at the given URI

      after this time.
    type:
      - string
      - 'null'
    format: date-time
  content:
    description: >
      base64 encoded binary of the actual fulfillment document. The length
      restriction of 4 MBytes applies to the encoded

      string, so the raw document cannot exceed 3 MBytes in size.
    type:
      - string
      - 'null'
    format: byte
    maxLength: 4194304
  format:
    $ref: ./DocumentFormat.yml
  applicationProvider:
    $ref: ./CompanyRef.yml
