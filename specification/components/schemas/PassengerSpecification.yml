description: >
  Minimal specification of a passenger to request offers.

  Either the date of birth or the age at the time of travel needs to be set. We
  recommend to use date of birth as it is more stable than age.

  Business rules for mandatory and non patchable items must be checked on the
  backend.

  Forward business rules for mandatory items using a requestedInformation field.
allOf:
  - $ref: ./AbstractPassenger.yml
  - type: object
    additionalProperties: false
    properties:
      detail:
        $ref: ./PersonDetail.yml
      transportableDetails:
        $ref: ./Transportable.yml
