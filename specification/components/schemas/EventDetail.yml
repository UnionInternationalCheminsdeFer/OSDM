type: object
additionalProperties: false
required:
  - summary
  - requestor
  - change
  - resource
properties:
  summary:
    description: |
      human readable description of the event
    type: string
  requestor:
    description: >
      Contains detailed information about who is calling the API. It can include
      information such as channel, organization, sales unit or workstation id
      and be used to configure e.g. the fare range provided to the caller. The
      content of the string is part of a bilateral contract by the two parties
      and not standardized by OSDM. It is recommend to encrypt the information
      transferred.
    type: string
  change:
    $ref: ./HistoryStatus.yml
  resource:
    $ref: ./Resource.yml
