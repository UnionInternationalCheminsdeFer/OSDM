type: object
additionalProperties: false
description: >
  In case of multi-journey products describe parameters to be used to change the
  a fulfillment in status AVAILABLE to FULFILLED so it can be used by the
  passenger.
properties:
  fromPlaceRequired:
    type:
      - boolean
      - 'null'
    default: false
  travelDates:
    description: >
      Travel dates that can be selected. Note: date only is used to cover
      properly the case of passes including

      multiple time zones.
    type:
      - array
      - 'null'
    items:
      type: string
  travelValidityRanges:
    type: array
    items:
      $ref: ./TravelValidityRange.yml
  maxAvailableZones:
    description: |
      upper limit to the number of selected zones
    type:
      - integer
      - 'null'
    format: int32
  availableZones:
    type: array
    items:
      $ref: ./ZoneDefinition.yml
