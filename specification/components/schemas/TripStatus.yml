type: object
additionalProperties: false
properties:
  unplanned:
    description: |
      Whether this trip is an additional one that has not been planned.
    type: boolean
    default: false
  cancelled:
    description: |
      Whether this trip is cancelled and will not be run.
    type: boolean
    default: false
  deviation:
    description: |
      Whether this trip deviates from the planned service pattern.
    type: boolean
    default: false
  delayed:
    description: |
      Whether this trip is delayed.
    type: boolean
    default: false
  infeasible:
    description: >
      Whether this trip cannot be used, due to operational delays and impossible
      transfers.
    type: boolean
    default: false
