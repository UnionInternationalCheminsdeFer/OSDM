description: >
  Minimal specification of a passenger to request offers without any GDPR
  relevant attributes such as name or address.

  Either the date of birth or the age at the time of travel needs to be set. We
  recommend to use date of birth as it is more stable than age.
allOf:
  - $ref: ./AbstractPassenger.yml
  - type: object
    additionalProperties: false
    properties:
      residency:
        $ref: ./CountryCode.yml
      transportable:
        $ref: ./TransportableSpecification.yml
