description: Usage of a continuos service vehicle
type: object
additionalProperties: false
required:
  - id
  - status
properties:
  id:
    type: string
    maxLength: 1024
  status:
    $ref: ./ContinuousServiceUsageStatus.yml
  parkingImage:
    description: >
      base64 encoded binary of the jpg image of the parked vehicle when ending
      the usage.
    type:
      - string
      - 'null'
    format: byte
    maxLength: 4194304
  tip:
    $ref: ./Tip.yml
