type: object
additionalProperties: false
description: >
  The supporting document helps to supporting the claim.  Either downloadLink +
  downloadExpiry or content must be provided.
required:
  - title
  - downloadExpiry
  - format
properties:
  title:
    description: |
      title of the document
    type: string
    examples:
      - delay confirmation written by staff on board
  downloadLink:
    type:
      - string
      - 'null'
  downloadExpiry:
    type: string
    format: date-time
  content:
    description: >
      base64 encoded binary of the actual document. The length restriction of 4
      MBytes applies to the encoded

      string, so the raw document cannot exceed 3 MBytes in size.
    type:
      - string
      - 'null'
    format: byte
    maxLength: 4194304
  format:
    $ref: ./DocumentFormat.yml
