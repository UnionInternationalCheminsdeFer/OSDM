description: >
  Physical format of the document provided in the content field in Mime-Type
  format, e.g.

  application/pdf, image/jpeg, etc. Must be filled if the 'content' field is
  present.
type: string
enum:
  - application/pdf
  - application/vnd.apple.pkpass
  - image/jpeg
  - image/png
  - text/calendar
  - text/html
  - application/json
