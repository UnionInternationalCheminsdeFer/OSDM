type: object
additionalProperties: false
required:
  - id
  - createdOn
  - validFrom
  - validUntil
  - status
  - fulfillments
properties:
  id:
    description: |
      id of the cancel fulfillments offer
    type: string
    maxLength: 32768
  summary:
    description: |
      A human-readable description of the refund offer.
    type:
      - string
      - 'null'
  createdOn:
    type: string
    format: date-time
  validFrom:
    type: string
    format: date-time
  validUntil:
    description: |
      time until the offer can be used
    type: string
    format: date-time
  confirmedOn:
    type:
      - string
      - 'null'
    format: date-time
  status:
    $ref: ./CancelFulfillmentsStatus.yml
  fulfillments:
    type: array
    items:
      $ref: ./Fulfillment.yml
    minItems: 1
  _links:
    $ref: ./Links.yml
