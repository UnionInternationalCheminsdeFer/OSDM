type: object
additionalProperties: false
required:
  - id
  - createdOn
  - validFrom
  - validUntil
  - releasedFulfillments
properties:
  id:
    description: |
      id of the release offer
    type: string
    maxLength: 32768
  summary:
    description: |
      A human-readable description of the release offer.
    type:
      - string
      - 'null'
  createdOn:
    type: string
    format: date-time
  validFrom:
    type: string
    format: date-time
  validUntil:
    description: |
      time until the offer can be used
    type: string
    format: date-time
  releasedFulfillments:
    description: >
      fulfillments to be refunded or replaced. This might differ from the
      requested refund specification in case the original request did not
      include all related fulfillments or booking parts. It must also incude the
      references to booking parts and passenger ids which can be omitted in teh
      request in case all part or passengers related to a fulfillment are
      refunded.
    type: array
    items:
      $ref: ./RefundedFulfillmentSpecification.yml
    minItems: 1
  appliedOverruleCode:
    $ref: ./OverruleCode.yml
  _links:
    $ref: ./Links.yml
