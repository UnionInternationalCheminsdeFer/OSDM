type: object
additionalProperties: false
description: |
  This property can be used in case a return trip is being requested.
  This will allow to benefit from return-specific fares or product
properties:
  outboundOfferIds:
    description: >
      Needs to be provided when creating the collection of inbound travels so
      that the provider

      can relate the inbound travels to the outbound travels context.
    type:
      - array
      - 'null'
    items:
      type: string
      maxLength: 32768
  outboundTripIds:
    description: |
      Needs to be provided when creating collection of offers covering both
      outbound and inbound (return) journey.
    type:
      - array
      - 'null'
    items:
      type: string
      maxLength: 32768
  departureTime:
    description: >
      Needs to be in local date time format of the stop. Exactly one of
      `departureTime` or `arrivalTime` must be provided.
    type:
      - string
      - 'null'
    format: date-time
  arrivalTime:
    description: >
      Needs to be in local date time format of the stop. Exactly one of
      `departureTime` or `arrivalTime` must be provided.
    type:
      - string
      - 'null'
    format: date-time
  origin:
    $ref: ./PlaceRef.yml
  destination:
    $ref: ./PlaceRef.yml
  vias:
    description: >
      Ordered series of points where the journey must pass through. If more

      than one via point is given all of them must be obeyed - in the correct

      order. The server is allowed to replace a via stop by equivalent stops.


      TripDataFilters given at a via apply to the section after that via. To
      apply a TripDataFilter for 

      the first section (between the origin and the first via), use the
      TripDataFilter within the

      TripParameters structure.
    type: array
    items:
      $ref: ./TripVia.yml
  parameters:
    $ref: ./TripParameters.yml
