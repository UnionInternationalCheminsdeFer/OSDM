  - HISTORIC_TRAIN
  - INTERCITY
  - REGIONAL
  - INTERREGIONAL
  - URBAN
  - TRAIN
  - TRAM
  - UNDERGROUND
  - NIGHT_TRAIN
  - SHARED_TAXI
  - MOTOR_RAIL
  - MOUNTAIN_TRAIN
  - PLANE
  - COACH_GROUP
  - SHIP
  - BUS
  - ON_DEMAND_SERVICE
  - BICYCLE
  - SCOOTER
  - TAXI
