description: >
  TAP-TSI/UIC contains a sensible subset of SIRI Transport Modes.

  Values from the [Transport Mode Code
  List](https://osdm.io/spec/catalog-of-code-lists/#TransportMode)

  Listed values here are examples.
type: string
