type: object
additionalProperties: false
description: >
  A vehicle movement on a continuous, non-timetabled service.

  Service of this leg. May be 'walk' in most cases, but also cycling or taxi
  etc.

  Provided by OJP.
required:
  - publishedServiceName
  - originText
  - destinationText
properties:
  operationMode:
    $ref: ./ContinousOperationMode.yml
  personalMode:
    $ref: ./PersonalMode.yml
  operatingDayRef:
    $ref: ./OperationDayRef.yml
  publishedServiceName:
    type: string
    examples:
      - Circle Line
  originText:
    type: string
  destinationText:
    type: string
  bookingArrangements:
    description: |
      booking arrangements in case the service can not be booked via OSDM.
      Provided by OJP.
    type: array
    items:
      $ref: ./BookingArrangement.yml
