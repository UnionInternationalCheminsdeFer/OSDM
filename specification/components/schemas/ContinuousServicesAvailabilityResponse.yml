type: object
additionalProperties: false
required:
  - pickUpPlaces
properties:
  pickUpPlaces:
    description: >
      list of pick-up places for on-demand vehicles. The list might include more
      or other pick up places than mentioned originally in the trip
      specification.
    type: array
    items:
      $ref: ./ContinuousServicePickUpPlace.yml
    minItems: 1
    maxItems: 500
