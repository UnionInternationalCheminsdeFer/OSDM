description: >
  Values from the [Trip Allocation Process Code
  List](https://osdm.io/spec/catalog-of-code-lists/#TripAllocationProcess)

  Known Values:

  - NONE: Individual trips don't need to be allocated.

  - MANUAL: The passenger has to allocate a trip manually (This should not be
  used as it is by design non-interoperable).

  - ACTIVATION: Individual trips can be allocated by activation of the ticket.

  - FULFILLMENT: A new fulfillment needs to be created to allocate a trip.
type: string
x-extensible-enum:
  - NONE
  - MANUAL
  - ACTIVATION
  - FULFILLMENT
