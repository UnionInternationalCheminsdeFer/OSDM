type: object
additionalProperties: false
description: >
  References all the offer part elements in an uniform format.

  In its part, an OfferPartReference can refer to reservation, admission,
  ancillary or fee.
required:
  - id
properties:
  id:
    type: string
    maxLength: 32768
  summary:
    description: |
      A human-readable description of the offer part reference.
    type:
      - string
      - 'null'
  _links:
    $ref: ./Links.yml
