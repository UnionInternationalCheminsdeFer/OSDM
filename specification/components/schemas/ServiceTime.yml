type: object
additionalProperties: false
description: >
  The time needs to be in Offset Time Format, i.e.  2023-12-03T10:15:30+01:00 as
  it is important the time zones are important  to show in the timetable.


  Do not use the Coordinated Universal Time (UTC) format, i.e.
  2023-12-03T10:15:30Z.
required:
  - timetabledTime
properties:
  timetabledTime:
    type:
      - string
      - 'null'
    format: date-time
  estimatedTime:
    type:
      - string
      - 'null'
    format: date-time
  observedTime:
    type:
      - string
      - 'null'
    format: date-time
