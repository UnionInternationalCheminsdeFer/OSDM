description: >
  An admission represents a travel right, or the entitlement to travel onboard a
  train between

  the given origin and destination, following the given route. It does not
  include a seat reservation.
allOf:
  - $ref: ./AbstractOfferPart.yml
  - type: object
    additionalProperties: false
    required:
      - validFrom
    properties:
      validFrom:
        description: |
          Validity of Booking Part for travel
        type: string
        format: date-time
      validUntil:
        description: |
          Validity of Booking Part for travel
        type:
          - string
          - 'null'
        format: date-time
      regionalValiditySummary:
        $ref: ./RegionalValiditySummary.yml
      regionalValidities:
        description: |
          This contains multiple regional validities for this item
        type: array
        items:
          $ref: ./RegionalValidity.yml
        minItems: 1
      reservations:
        type: array
        items:
          $ref: ./ReservationRelation.yml
      ancillaries:
        type: array
        items:
          $ref: ./AncillaryRelation.yml
      feeRefs:
        type: array
        items:
          $ref: ./OfferPartReference.yml
      regulatoryConditions:
        type: array
        items:
          $ref: ./RegulatoryCondition.yml
      throughTicketTags:
        type: array
        items:
          $ref: ./ThroughTicketTag.yml
