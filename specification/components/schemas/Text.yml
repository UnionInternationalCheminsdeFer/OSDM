type: object
additionalProperties: false
description: >
  Directly included text in case of online services. Text must be encoded in
  UTF-8 format.
required:
  - text
properties:
  id:
    type: string
  translations:
    type: array
    items:
      $ref: ./Translation.yml
  text:
    type: string
    maxLength: 32768
  shortText:
    type:
      - string
      - 'null'
