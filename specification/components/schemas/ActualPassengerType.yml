description: >
  Actual Passenger type according to UIC passenger, i.e. passenger type list. 

  Returns the passenger type according to the underlying fare system. 

  E.g. a passenger of type PERSON is categorized as a ADULT or YOUTH.

  Values from the [Passenger Type Code
  List](https://osdm.io/spec/catalog-of-code-lists/#PassengerType)

  Listed values here are examples.
type: string
x-extensible-enum:
  - YOUNG_CHILD
  - CHILD
  - YOUTH
  - ADULT
  - SENIOR
  - FAMILY_CHILD
  - ACCOMP_PRM
  - PRM_CHILD
  - WHEELCHAIR
  - PERSON
  - PRM
  - DOG
  - PET
  - LUGGAGE
  - PRM
  - PRM_CHILD
  - BICYCLE
  - PRAM
  - ACCOMP_DOG
  - ACCOMP_PRM
  - CAR
  - MOTOCYCLE
  - TRAILER
default: PERSON
