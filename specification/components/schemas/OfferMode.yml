description: >
  Offer mode applied to provide offers for given criteria. 


  Individual offer mode means that each passenger is given individual admissions
  and reservations  to allow to refund individual passengers booked in a single
  booking.


  If collective mode is not supported,  reverts back to the other mode and
  provides warning.


  If individual mode is not supported,  reverts back to the other mode and
  provides warning.
type: string
enum:
  - COLLECTIVE
  - INDIVIDUAL
