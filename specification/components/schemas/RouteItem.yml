type: object
additionalProperties: false
description: >
  Items to compose routes (Note - replaced viaStation, content compliant with
  viaStation in IRS 90918-4 and 90918-9)
properties:
  alternativeRouteItemIndices:
    description: >
      list of alternative route parts to be used on this travel path referenced
      by the index in the provided list of route items
    type:
      - array
      - 'null'
    items:
      type: integer
      format: int32
  carrierConstraint:
    $ref: ./CarrierConstraint.yml
  routeItemIndices:
    description: >
      sequence of route items along the travel path referenced by the index in
      the provided list of route items
    type: array
    items:
      type:
        - integer
        - 'null'
      format: int32
  serviceConstraint:
    $ref: ./ServiceConstraint.yml
  station:
    $ref: ./StopPlace.yml
  fareReferenceStation:
    $ref: ./FareReferenceStation.yml
