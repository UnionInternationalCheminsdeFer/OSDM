type: object
properties:
  countryName:
    description: |
      Country of the address.
    type:
      - string
      - 'null'
    examples:
      - The Netherlands
  countryCode:
    $ref: ./CountryCode.yml
  postCode:
    description: |
      Postal code of the address.
    type:
      - string
      - 'null'
    examples:
      - 2265CA
  city:
    description: |
      City name
    type:
      - string
      - 'null'
    examples:
      - Leidschendam
  street:
    description: |
      Street name of the address. Can also contain the house number.
    type:
      - string
      - 'null'
    examples:
      - Oude Trambaan
  houseNumber:
    description: >
      House number of the address. House number can either be in this separate
      field, or can be

      contained in the street field.
    type:
      - string
      - 'null'
    examples:
      - '7'
