type: object
additionalProperties: false
description: |
  Describes the details of the reserved place(s).
required:
  - accommodationType
  - accommodationSubType
  - reservedPlaces
  - legCoverage
properties:
  accommodationType:
    $ref: ./AccommodationType.yml
  accommodationSubType:
    $ref: ./AccommodationSubType.yml
  reservedPlaces:
    description: >
      Reserved places in a confirmed reservation.

      Reserved Place inludes multiple places, however there might be multiple
      objects needed in case:

      - places are in separate coaches, then one object per coach is needed

      - places have different place properties that need to be shown (e.g. 5
      Places in family compartment + 4 other places)

      - optional: group places by compartments (in case compartments are
      indicated on the train)
    type: array
    items:
      $ref: ./ReservedPlace.yml
    minItems: 1
  legCoverage:
    $ref: ./TripLegCoverage.yml
