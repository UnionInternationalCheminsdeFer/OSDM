type: object
additionalProperties: false
required:
  - id
  - createdOn
  - validFrom
  - validUntil
  - status
  - refundedFulfillments
  - refundFee
  - refundableAmount
properties:
  id:
    description: |
      id of the refund offer
    type: string
    maxLength: 32768
  summary:
    description: |
      A human-readable description of the refund offer.
    type:
      - string
      - 'null'
    examples:
      - Refund Offer for Paris-Barcelona Andre Dupont 2022-07-23
  createdOn:
    type: string
    format: date-time
  validFrom:
    type: string
    format: date-time
  validUntil:
    description: |
      time until the offer can be used
    type: string
    format: date-time
  status:
    $ref: ./RefundStatus.yml
  reimbursementStatus:
    $ref: ./ReimbursementStatus.yml
  appliedOverruleCode:
    $ref: ./OverruleCode.yml
  refundedFulfillments:
    description: >
      fulfillments to be refunded or replaced. This might differ from the
      requested refund specification in case the original request did not
      include all related fulfillments or booking parts. It must also incude the
      references to booking parts and passenger ids which can be omitted in teh
      request in case all part or passengers related to a fulfillment are
      refunded.
    type: array
    items:
      $ref: ./RefundedFulfillmentSpecification.yml
    minItems: 1
  refundFee:
    $ref: ./Price.yml
    description: |
      Total Amount kept by the carrier and/or distributor
  refundableAmount:
    $ref: ./Price.yml
    description: |
      Amount refunded to the purchaser
  refundOfferBreakdown:
    description: |
      breakdown of the refund offer
    type: array
    items:
      $ref: ./RefundBreakdownItem.yml
  reimbursementMethod:
    $ref: ./ReimbursementMethod.yml
  _links:
    $ref: ./Links.yml
