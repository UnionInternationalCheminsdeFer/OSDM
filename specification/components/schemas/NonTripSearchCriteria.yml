type: object
additionalProperties: false
description: >
  Defines the requested validity when searching specifically for a non-trip
  Offer. 


  The geographical validity can either be specified by a list of nutsCodes, by a
  list of places (e.g. stations) with the semantics that trips between either of
  any of the listed stations are covered (e.g. Frankfurt (Main) Hbf,
  Friedberg(Hess) and Hanau Hbf, which would imply that any travel between these
  stations is to be covered), or a list of zones (e.g. with carrier urn:vdv:rmv,
  the zones with the ids 50, 2501 and 3001 would cover the same area as the list
  of stations above).
properties:
  validFrom:
    type:
      - integer
      - 'null'
    format: date-time
  nutsCodes:
    description: >
      Nomenclature des units territoriales statistiques COMMISSION REGULATION
      (EU) No 31/2011
    type:
      - array
      - 'null'
    items:
      type: string
  zones:
    type: array
    items:
      $ref: ./ZoneDefinition.yml
  places:
    type: array
    items:
      $ref: ./PlaceRef.yml
