type: object
description: >
  Notification on an event that occured on the provider side and changed a
  resource. Base event for inheritance.
discriminator:
  propertyName: objectType
  mapping:
    BookingEvent: ./BookingEvent.yml
    ComplaintEvent: ./ComplaintEvent.yml
    ReimbursementEvent: ./ReimbursementEvent.yml
required:
  - objectType
  - summary
  - revision
  - resources
properties:
  objectType:
    description: |
      Attribute is used as discriminator for inheritance between data types.
    type: string
    enum:
      - BookingEvent
      - ComplaintEvent
      - ReimbursementEvent
  summary:
    type: string
    description: >-
      Human readable description of what has changed on the booking. e.g. "Train
      ICE 34 at 2021-12-22 13:30 has been cancelled", "Complaint 123456 has been
      settled", "Reimbursement 456-xyz has been settled".
  revision:
    $ref: ./Revision.yml
  resources:
    description: Resources to be called by receiver to update a booking.
    type: array
    items:
      $ref: ./Resource.yml
