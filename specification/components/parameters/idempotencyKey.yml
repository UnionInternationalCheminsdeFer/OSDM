name: Idempotency-Key
in: header
description: >
  The HTTP Idempotency request header field can be used to carry idempotency key
  in order to make

  non-idempotent HTTP methods such as POST or PATCH fault-tolerant. Servers
  should keep the idempotency

  key for as long as the result of the underlying operation is valid.
  Idempotency keys should be 

  globally unique.
schema:
  type: string
  format: uuid
