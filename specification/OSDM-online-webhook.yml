openapi: 3.1.0
servers:
  - description: No server provided
    url: /
info:
  title: UIC 90918-10 - OSDM webhooks
  version: 4.0.0
  description: |
    Specifications for the OSDM API standard. The OSDM webhook specification allows an
    allocator to inform a distributor about changes to a booking or a complaint.
  contact:
    name: OSDM Working Group
    url: "https://osdm.io"
    email: osdm@uic.org
  license:
    name: Apache 2.0
    url: "https://www.apache.org/licenses/LICENSE-2.0.html"

tags:
  - name: Events
    description: Webhook event notifications from allocator to distributor.

security:
  - oAuth2ClientCredentials: []

webhooks:
  events:
    $ref: ./webhooks/events.yml

components:
  securitySchemes:
    oAuth2ClientCredentials:
      $ref: ./components/security-schemes.yml#/oAuth2ClientCredentials
