ContinuousMode:
  description: |
    Types of modes that run at any time without a timetable. Provided by OJP.
  type: string
  x-extensible-enum:
  - WALK
  - DEMAND_RESPONSIVE
  - REPLACEMENT_SERVICE
ContinuousService:
  type: object
  additionalProperties: false
  description: |
    A vehicle movement on a continuous, non-timetabled service.
    Service of this leg. May be 'walk' in most cases, but also cycling or taxi etc.
    Provided by OJP.
  required:
  - operatingDayRef
  - journeyRef
  - mode
  - publishedServiceName
  - originText
  - destinationText
  properties:
    continuousMode:
      $ref: '#/ContinuousMode'
    individualMode:
      $ref: ./_common.yml#/IndividualMode
    operatingDayRef:
      $ref: ./trip.yml#/OperationDayRef
    journeyRef:
      $ref: ./trip.yml#/JourneyRef
    mode:
      type: string
      nullable: false
      example: Ask Stefan
    publishedServiceName:
      type: string
      nullable: false
      example: Circle Line
    originText:
      type: string
      nullable: false
    destinationText:
      type: string
      nullable: false
