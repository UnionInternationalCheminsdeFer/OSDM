ContinuousServiceAvailabilityScope:
  description: search parameter so get available pick-up places for continuous on-demand services.
  type: object
  properties:
    geoLocation:
      $ref: ./ojp/_common.yml#/GeoPosition
    vehicleType:
      $ref: '#/ContinuousServiceVehicleType'
ContinuousServiceBookingPart:
  description: |
    A booking part for a continuous on-demand service.
  allOf:
  - $ref: ./booking.yml#/AbstractBookingPart
  - type: object
    additionalProperties: false
    required:
    - pickUpPlaces
    properties:
      pickUpPlaces:
        description: |
          List of pick-up places for on-demand vehicles.
          The list might include more or other pick up places than mentioned originally in the trip specification.
        type: array
        items:
          $ref: '#/ContinuousServicePickUpPlace'
        minItems: 1
      tipRef:
        description: id of the tip for staff (e.g. taxi)
        type: string
        maxLength: 1024
ContinuousServicePickUpPlace:
  description: |
    Pick-up places for on-demand vehicles like taxis, bicycles or scooters
  required:
  - description
  - geoPosition
  - availableVehicles
  properties:
    id:
      description: id of the pick-up place
      type: string
      maxLength: 32768
    description:
      description: description of the pick-up place
      type: string
      maxLength: 32768
    name:
      description: name of the pick-up place
      type: string
      maxLength: 32768
      examples:
      - Taxi Stand Main Station East Exit
    accessDescription:
      description: description on how to access the on-demand vehicle
      type: string
      maxLength: 32768
      examples:
      - Scooter to be unlocked by SMS code
    geoPosition:
      $ref: ./ojp/_common.yml#/GeoPosition
    availableVehicles:
      type: array
      items:
        $ref: '#/ContinuousServiceVehicleAvailability'
      maxItems: 500
    preAllocationTimeLimit:
      description: Duration for which the vehicle can be blocked until the usage starts.
      type: string
      format: duration
      examples:
      - PT30M
    processIndication:
      description: Machine readable indications on how the on-demand process should be handled.
      type: array
      items:
        $ref: '#/ContinuousServiceProcessIndication'
    estimatedVehicleArrivalAtPickUp:
      description: |
        Time until when the vehicle is expected to arrive at the pick-up place (taxi,..)
      type: string
      format: date-time
    estimatedUserArrivalAtPickUp:
      description: |
        Time until when the user of the service is expected to arrive at the pick-up place.
      type: string
      format: date-time
ContinuousServiceProcessIndication:
  description: "Process indications for on-demand services  \n[On-Demand Vehicle Process](https://osdm.io/spec/catalog-of-code-lists/#OnDemandVehicleProcesses)\n"
  type: string
  x-extensible-enum:
  - PRE_ALLOCATION_REQUIRED
  - SHALLOW_INTEGRATION
  - DEEP_INTEGRATION
  - PREPAID
  - POSTPAID
  - AUTO_START_USAGE
  - AUTO_END_USAGE
  - BLOCKING_TRACKING
  - USAGE_TRACKING
  - PARKING_IMAGE_REQUIRED
  - TIP_SUPPORTED
ContinuousServicesAvailabilityResponse:
  type: object
  additionalProperties: false
  required:
  - pickUpPlaces
  properties:
    pickUpPlaces:
      description: |
        list of pick-up places for on-demand vehicles. The list might include more or other pick up places than mentioned originally in the trip specification.
      type: array
      items:
        $ref: '#/ContinuousServicePickUpPlace'
      minItems: 1
      maxItems: 500
ContinuousServiceUsage:
  description: Usage of a continuos service vehicle
  type: object
  additionalProperties: false
  required:
  - id
  - status
  - startUsageDescription
  - endUsageDescription
  properties:
    id:
      type: string
      maxLength: 1024
    status:
      $ref: '#/ContinuousServiceUsageStatus'
    geoPosition:
      $ref: ./ojp/_common.yml#/GeoPosition
    startUsageDescription:
      description: start usage procedure description
      type: string
      maxLength: 32768
    endUsageDescription:
      description: end usage procedure description
      type: string
      maxLength: 32768
    startUsageCredentials:
      description: credentials to start the usage, e.g. nfc-enabled pkpass
      $ref: ./fulfillment.yml#/FulfillmentDocument
    startUsageTimeLimit:
      description: time limit to start the usage
      type: string
      format: date-time
    blockingFeeRef:
      description: id of the fee taken on blocking the vehicle
      type: string
      maxLength: 1024
    tipRef:
      description: id of the tip provided to staff
      type: string
      maxLength: 1024
    usageForPostPayment:
      $ref: ./booking.yml#/IndicatedUsage
    remainingUsageFromPrePayment:
      $ref: ./booking.yml#/IndicatedUsage
    estimatedTimeOfArrivalAtPickUpPlace:
      type: string
      format: date-time
ContinuousServiceUsagePatchRequest:
  description: Usage of a continuos service vehicle
  type: object
  additionalProperties: false
  required:
  - id
  - status
  properties:
    id:
      type: string
      maxLength: 1024
    status:
      $ref: '#/ContinuousServiceUsageStatus'
    parkingImage:
      description: |
        base64 encoded binary of the jpg image of the parked vehicle when ending the usage.
      type:
      - string
      - 'null'
      format: byte
      maxLength: 4194304
    tip:
      $ref: ./_common.yml#/Tip
ContinuousServiceUsageStatus:
  description: status of the usage of a vehicle
  type: string
  x-extensible-enum:
  - VEHICLE_BLOCKED
  - USAGE_STARTED
  - USAGE_ENDED
  - BLOCKING_TIME_OUT
  - USAGE_TIME_OUT
ContinuousServiceVehicleAvailability:
  description: |
    number and type of available vehicles
  required:
  - vehicleDescription
  - vehicleType
  - availableVehicles
  properties:
    vehicleDescription:
      type: string
      maxLength: 32768
      examples:
      - Scooter up to 120 kg traveler weight
    vehicleType:
      $ref: '#/ContinuousServiceVehicleType'
    availableVehicles:
      description: number of available vehicles
      type: integer
      format: int32
ContinuousServiceVehicleSelection:
  type: object
  additionalProperties: false
  required:
  - pickUpPlaceRef
  - vehicleType
  properties:
    pickUpPlaceRef:
      description: id of the selected pick-up place
      type: string
      maxLength: 1024
    vehicleType:
      $ref: '#/ContinuousServiceVehicleType'
ContinuousServiceVehicleType:
  description: |
    [Vehicle types from code list of on-demand vehicle types](https://osdm.io/spec/catalog-of-code-lists/#OnDemandVehicleTypes)
  type: string
  x-extensible-enum:
  - BICYCLE
  - ELECTRIC_BICYCLE
  - CARGO_BICYCLE
  - SCOOTER
  - TAXI
  - SELF_DRIVING_CAR
