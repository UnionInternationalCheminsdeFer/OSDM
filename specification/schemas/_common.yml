      description: |
        minutes of the day in the time zone of travel
      type: integer
      format: int32
    until:
      description: |
        minutes of the day in the time zone of travel
      type: integer
      format: int32
    scope:
      $ref: ./fare.yml#/ExclusionScope
Fee:
  description: |
    Fees are used to represent additional costs for services or products. In contrast to other offer parts in OSDM, the customer is not free whether to choose a fee or not: fees are generated and applied to other services or products by the providing system.
  allOf:
  - $ref: ./offer.yml#/AbstractOfferPart
  - type: object
    additionalProperties: false
    properties:
      applicability:
        $ref: '#/ApplicabilityType'
      transactionContext:
        $ref: '#/TransactionContextType'
      isProviderFee:
        description: |
          The fees are attributed to the provider. In some business models used with fares the fees are attributed to the distributor.
        type: boolean
        default: true
GeneralAttribute:
  type: object
  additionalProperties: false
  required:
  - text
  - code
  properties:
    text:
      description: text to be displayed to the user
      type:
      - string
      - 'null'
    code:
      type:
      - string
      - 'null'
    key:
      type:
      - string
      - 'null'
