VAT:
  type: object
  description: "The VAT structure details a VAT amount (in case of international travel, there may be multiple VAT structures).\n\
    The netAmount is the amount before adding the VAT; the grossAmount is the amount including VAT, where\nthe amount is the\
    \ actual VAT being described here. So the equation netAmount + amount = grossAmount holds.\nFurthermore, the equation\
    \ netAmount * percentage = amount also holds, but is susceptible to possible rounding\nerrors.\nAll the grossAmounts of\
    \ the VAT structures should add up to the overall amount of the enclosing price structure.      \nThe currency is inherited\
    \ from the currency of the associated price.\n"
  additionalProperties: false
  required:
  - countryCode
  - amount
  properties:
    countryCode:
      $ref: '#/CountryCode'
    amount:
      description: |
        VAT amount in cents (in case of EUR). For calculation the legal requiremets from local counties and the EU need to be applied.
      type: integer
      format: int32
      examples:
      - 5
    scale:
      description: |
        scale of the amount - the number of positions after the comma
      type:
      - integer
      - 'null'
      format: int32
      default: 2
    netAmount:
      description: |
        amount before adding VAT
      type:
      - integer
      - 'null'
      format: int32
      examples:
      - 5
    netAmountScale:
      description: |
        scale of the netAmount - the number of positions after the comma
      type:
      - integer
      - 'null'
      format: int32
      default: 2
    grossAmount:
      description: |
        total amount after adding VAT in cents
      type:
      - integer
      - 'null'
      format: int32
      examples:
      - 5
    grossAmountScale:
      description: |
        scale of the grossAmount - the number of positions after the comma
      type:
      - integer
      - 'null'
      format: int32
      default: 2
    percentage:
      $ref: '#/Percentage'
    taxId:
      type:
      - string
      - 'null'
    vatOnInvoice:
      type:
      - boolean
      - 'null'
      default: false
    taxIdOnInvoice:
      type:
      - boolean
      - 'null'
      default: false
    scope:
      $ref: '#/VatScope'
VatScope:
  description: |
    scope where the VAT applies.
    Values from the [Tax Scope Code List](https://osdm.io/spec/catalog-of-code-lists/#VatScope)
    Listed values here are examples.
  type: string
  x-extensible-enum:
