  - CONFIRMED
  - FULFILLED
  - CANCELLED
  - RELEASED
  - REFUNDED
  - EXCHANGED
  - EXCHANGE_ONGOING
  - ERROR
  - AVAILABLE
  - CHECKED_IN
Latitude:
