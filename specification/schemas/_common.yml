      - 'null'
      pattern: '[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}'
    accountId:
      description: |
        bank account id to be used outside of EU
      type:
      - string
      - 'null'
    bankIdCode:
      $ref: '#/BankIdCode'
    bankId:
      type:
      - string
      - 'null'
    ownerName:
      type:
      - string
      - 'null'
      examples:
      - John Doe
BankIdCode:
  type: string
  x-extensible-enum:
  - SWIFT
BarCodeType:
  description: |
    Item according to IRS 90918-9: FCB, TLB, SSB
    Values from the [Barcode Type Code List](https://osdm.io/spec/catalog-of-code-lists/#BarcodeType)
    Listed values here are examples.
  type: string
  x-extensible-enum:
  - FCB
  - TLB
  - SSB
  - DOSIPAS
Calendar:
  type: object
  additionalProperties: false
  properties:
    from:
      type:
      - string
      - 'null'
      format: date-time
    until:
      type:
      - string
      - 'null'
      format: date-time
    dates:
      description: |
        dates included in the calendar. In case no dates are provided the range is assumed to be valid
      type:
      - array
      - 'null'
      items:
        type: string
        format: date
    utcOffset:
      description: |
        offset to UTC in minutes (number of minutes to be added to get UTC dates)
      type:
      - integer
      - 'null'
      format: int32
CardReference:
  type: object
  additionalProperties: false
  description: |
    Number and issuer are needed to identify a travel account, the code identifies a reduction card.
  required:
  - type
  properties:
    code:
      description: |
        Code of the card type according to issuer. E.g. BahnCard50.
        Predefined values from the [Reduction Card Code List](https://osdm.io/spec/catalog-of-code-lists/#ReductionCard)
      type:
      - string
      - 'null'
    number:
      description: |
        Number identifying the travel account, need issuer to be unique.
      type:
      - string
      - 'null'
    issuer:
      $ref: '#/CompanyRef'
    type:
      $ref: ./travel-account.yml#/TravelAccountType
    chipCardContentFormat:
      type: string
      x-extensible-enum:
      - CALYPSO-ABT
      - CALYPSO-CBT
    chipCardContent:
      description: |
        base64 encoded content of the chip card. This is in some scenarios needed to validate whether the new ticket will be compatible with the tickets already on the card.
      type:
      - string
      - 'null'
      format: byte
      maxLength: 4194304
CardTypeReference:
  type: object
  additionalProperties: false
  required:
  - code
  properties:
    issuer:
      $ref: '#/CompanyRef'
    code:
