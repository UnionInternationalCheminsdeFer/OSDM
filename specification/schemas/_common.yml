AccountingId:
  description: id used as reference to OSDM in the settlement data exchange
  type: string
  maxLength: 256
AccountingRef:
  description: |
    reference to accounting data in case the accounting is not provided by the API provider
  type: object
  required:
  - accountingCompany
  properties:
    accountingCompany:
      $ref: '#/CompanyRef'
    accountingIds:
      description: |
        ids of accounting data used to link the booking part with accounting data in the billing send by the accounting company
      type: array
      items:
         $ref: '#/AccountingId'
AlternativeSystemProposal:
  description: |
    This type can only be used in offer responses inside OfferCollectionResponse when the problem has the following values:
    * Type is https://osdm.io/errors/alternative_system_proposal
    * Code is urn:uic:problem:ALTERNATIVE_SYSTEM_PROPOSAL
    * Status (HTTP) is 200
    The OSDM Offer API returns an alternative system proposal when the current system cannot provide an
    offer for the requested trip, but identifies one or more other OSDM/90918.1-capable systems that might be able
    to fulfill the request.
    The proposal should be returned as part of the problems section in the OfferCollectionResponse.
    If only some of the legs or products are affected, for example in a multi-leg trip:
    * The available offers should be returned to the caller
    * One or more AlternativeSystemProposals should be returned as part of
      OfferCollectionResponse's problems structure
    * The problem pointer structure should be filled to identify the affected Leg(s) or OfferPart(s).
      * It must contain a problem pointer for the affected trip legs, which should be priced or booked
        in other systems. The problem pointer's responsePointer field should contain a link to the
        affected leg inside the given trip (e.g. #/trips[1]/legs[1]/id).
      * The scope structure may be filled with the leg's vehicle (train) number.
      * If a partial offer is returned for a leg, then it might contain a response problem pointer pointing
        to the affected offer parts. For example, if the system can provide an admission offer for the whole trip,
        but the reservation offer part is missing for one leg, then the following responsePointer could be returned:
        #/offers[1]/reservationOfferParts
  type: object
  required:
  - systemOperatorCode
  properties:
    reservationSystemId:
      description: |
        The 90918.1 code of the alternative reservation system.
      type: integer
      example: 80
    systemOperatorCode:
      description: |
        The company code (e.g. RICS code) of the alternative reservation system's operator.
      $ref: '#/CompanyRef'
      nullable: false
      example: 'urn:uic:rics:1185'
    scope:
      type: array
      items:
        $ref: '#/AlternativeSystemProposalScope'
      minItems: 0
    priority:
      description: |
        If multiple alternative system proposals are returned, the provider might define a
        priority order between them. The requestor should first use the proposal with the
        lowest priority that matches the requestor's case based on the proposal's scope
        and problem pointer.
      type: integer
      example: 1
AlternativeSystemProposalScope:
  description: |
    Defines a scope for an alternative system proposal. This object specifies the routing
    logic for:
     * Trips or trains hosted across multiple OSDM/UIC 918.1 reservation systems, identifying which
       system to connect to for specific travel classes or accommodation (sub)types.
       For example, the problem returned for a RailJet might contain two proposals: one for business class
       pointing to ÖBB, and another pointing to MAV for first and second class (using two scopes).
       In a more complex case, it might contain three AlternativeSystemProposals:
          * One with business class scope pointing to ÖBB
          * Another with first and second class scope and priority "1", also pointing to ÖBB
          * A third with first and second class scope and priority "2", pointing to MAV, indicating
            that the requestor should first ask ÖBB, but if an ÖBB offer is not available, for example
            because it has run out of spaces, MAV may also be used.
     * Offers for trips containing multiple legs. In this case, the vehicleNumber also helps the
       requestor identify which system to connect to for each leg or journey.
  type: object
  required:
  - vehicleNumber
  properties:
    vehicleNumber:
      description: |
        Vehicle number, such as the train number, for which the alternative system proposal is valid.
      type: string
      nullable: false
      example: "462"
    travelClass:
      $ref: '#/TravelClass'
    accommodationType:
      $ref: './place.yml#/AccommodationType'
    accommodationSubType:
      $ref: './place.yml#/AccommodationSubType'
ApiNextVersion:
  type: object
  description: |
    Next version of the API.
    The next version is used to indicate the next version of the API that is being used.
    The version is in semantic versioning format, e.g. "4.0.0" and it is a version released at osdm.io.
  properties:
    version:
      type: string
      description: |
        Version of the next API.
      examples:
      - 4.0.0
    availableAt:
      type: string
      format: url
      examples:
      - https://api.next.example.com
    availableFrom:
      type:
      - string
      - 'null'
      format: date-time
      description: |
        Date from which the next version is available.
      examples:
      - '2025-01-01T00:00:00+01:00'
ApiVersion:
  type: object
  description: |
    Version of the API.
    The version is used to indicate the version of the API that is being used.
    The version is in semantic versioning format, e.g. "3.0.0" and it is a version released at osdm.io.
  required:
  - version
  properties:
    version:
      type: string
      description: |
        Version of the API
      examples:
      - 3.0.0
    sunset:
      type:
      - string
      - 'null'
      format: date-time
      description: |
        Date after which the API version will no longer be available.
      examples:
      - '2024-12-31T23:59:59+01:00'
    nextVersion:
      anyOf:
      - $ref: '#/ApiNextVersion'
      - type: 'null'
ApplicabilityType:
  type: string
  x-extensible-enum:
  - BOOKING
  - TRIP
  - OFFERPART
  - SEAT_SELECTION
AppliedFee:
  description: |
    Fees are used to represent additional costs for services or products. In contrast to other offer parts in OSDM, the customer is not free whether to choose a fee or not: fees are generated and applied to other services or products by the providing system.
  allOf:
  - $ref: ./booking.yml#/AbstractBookingPart
  - type: object
    additionalProperties: false
    properties:
      applicability:
        $ref: '#/ApplicabilityType'
      transactionContext:
        $ref: '#/TransactionContextType'
      isProviderFee:
        description: |
          The fees are attributed to the provider. In some business models used with fares the fees are attributed to the distributor.
        type: boolean
        default: true
AppliedReductions:
  type: object
  additionalProperties: false
  description: |
    Applied reductions per passenger, per offer part and per part of the trip.
  required:
  - description
  properties:
    passengerRef:
      description: "id of the passenger.  \nIn the offer flow the id refers to the externalRef as the passenger id is created\
        \ at booking time only.\n"
      type: string
    description:
      description: |
        Clear text representation of the actual passenger type, suitable to be presented to a client.
      type: string
    passengerType:
      description: |
        reduction applied due to passenger type. passenger types that do not grant a reduction must not be provided due to GDPR.
      $ref: ./person.yml#/ActualPassengerType
    tripCoverage:
      type: array
      items:
        $ref: ./trip.yml#/TripCoverage
    appliedCards:
      type: array
      items:
        $ref: '#/CardReference'
    appliedCorporateCodes:
      description: |
        applied corporate codes in case they provided a reduction
      type: array
      items:
        $ref: '#/CorporateCode'
    appliedPromotionCodes:
      description: |
        applied promotional codes in case they provided a reduction
      type: array
      items:
        $ref: '#/PromotionCode'
    reductionAmount:
      $ref: '#/Price'
BackOfficeStatus:
  description: |
    Status of the request sent to the back office.
    Valid Values:
    - 'INITIATED'
    - 'EVALUATING'
    - 'DECIDED'
    - 'SETTLED'
    - 'INFORMATION_MISSING'
    - 'REQUEST_UPDATED' # Additional information, i.e. documents have been provided which should trigger reevaluation.
  type: string
  enum:
  - INITIATED
  - EVALUATING
  - DECIDED
  - SETTLED
  - INFORMATION_MISSING
  - REQUEST_UPDATED
BankAccountReference:
