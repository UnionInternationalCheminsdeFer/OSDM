  - currency
  - amount
  properties:
    currency:
      $ref: '#/Currency'
    amount:
      description: |
        amount in cents
      type: integer
      format: int32
    scale:
      description: |
        scale of the amount - the number of positions after the comma
      type:
      - integer
      - 'null'
      format: int32
      default: 2
CurrencyConversion:
