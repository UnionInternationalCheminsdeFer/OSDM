    \ if appropriate. Values from the [Travel Validity Type Code List](https://osdm.io/spec/catalog-of-code-lists/#TravelValidityType)\
    \ \nValues from the [Tavel Validity Type Code List](https://osdm.io/spec/catalog-of-code-lists/#TravelValidityType)\n\
    Listed values here are examples.\n"
  type: string
  x-extensible-enum:
