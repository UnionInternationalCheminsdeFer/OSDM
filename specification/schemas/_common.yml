  type:
  - integer
  - 'null'
  format: int32
  minimum: 0
DistributionMode:
  description: "booking parts in product mode are provided as complete products where the tickets and \nconditions are prepared\
    \ by the OSDM provider. Booking parts in fare mode need to be assambled \ninto tickes on the OSDM client side. In fare\
    \ mode the conditions are defined on the client \nside the restrictions on conditions and combinability layed down in\
    \ the booking part (fare). \nBy definition admissions and ancillaries are in PRODUCT_MODE and fares are in _MODE. Reservation\
    \ \nmight be in PRODUCT_MODE or in _MODE. Offers in _MODE must not be provided unless they are\nrequested in the offer\
    \ part type list.\n"
  type: string
  enum:
  - PRODUCT_MODE
  - FARE_MODE
  default: PRODUCT_MODE
Event:
  type: object
  additionalProperties: false
  description: |
    Record of an action that occurred in the life cycle of the booking.
  required:
  - id
  - timestamp
  - type
  - details
  properties:
    id:
      description: |
        id of the event
      type: string
    timestamp:
      description: |
        timestamp of the event
      type:
      - string
      - 'null'
      format: date-time
    type:
      $ref: '#/EventType'
    details:
      $ref: '#/EventDetail'
EventDetail:
  type: object
  additionalProperties: false
  required:
  - summary
  - requestor
  - change
  - resource
  properties:
    summary:
      description: |
        human readable description of the event
      type: string
    requestor:
      description: |
        Contains detailed information about who is calling the API. It can include information such as channel, organization, sales unit or workstation id and be used to configure e.g. the fare range provided to the caller. The content of the string is part of a bilateral contract by the two parties and not standardized by OSDM. It is recommend to encrypt the information transferred.
      type: string
    change:
      $ref: '#/HistoryStatus'
    resource:
      $ref: '#/Resource'
