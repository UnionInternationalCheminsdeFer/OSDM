ControlSecurityType:
  description: |
    Known Values:
    - 'SIP': secure paper tickets
    - 'SID': security in data (signed bar code)
    - 'SIS': security in system
    Values from the [Control Security Type Code List](https://osdm.io/spec/catalog-of-code-lists/#ControlSecurityType)
    Listed values here are examples.
  type: string
  x-extensible-enum:
  - SIP
  - SID
  - SIS
Document:
  type: object
  additionalProperties: false
  description: |
    Non travel document created. Either downloadLink + downloadExpiry or content must be provided.
  required:
  - id
  - type
  - scope
  properties:
    id:
      type: string
    summary:
      type:
      - string
      - 'null'
    passengerRef:
      description: |
        Reference to a passenger, to be specified when the document related to an individual passenger.
      type:
      - string
      - 'null'
    downloadLink:
      type:
      - string
      - 'null'
      format: uri
    downloadExpiry:
      description: |
        Expiration time of the download link, the document will not be available at the given URI  after this time.
      type:
      - string
      - 'null'
      format: date-time
    documentContent:
      $ref: '#/DocumentContent'
    type:
      $ref: '#/DocumentType'
    scope:
      $ref: '#/DocumentScope'
DocumentCollectionResponse:
  type: object
  additionalProperties: false
  required:
  - documents
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    documents:
      type: array
      items:
        $ref: '#/Document'
      minItems: 1
DocumentContent:
  type: object
  required:
  - content
  - format
  properties:
    content:
      description: |
        base64 encoded binary of the actual fulfillment document. The length restriction of 4 MBytes applies to the encoded
        string, so the raw document cannot exceed 3 MBytes in size.
      type:
      - string
      - 'null'
      format: byte
      maxLength: 4194304
    format:
      $ref: '#/DocumentFormat'
DocumentFormat:
  description: |
    Physical format of the document provided in the content field in Mime-Type format, e.g.
    application/pdf, image/jpeg, etc. Must be filled if the 'content' field is present.
  type: string
  enum:
  - application/pdf
  - application/vnd.apple.pkpass
  - image/jpeg
  - image/png
  - text/calendar
  - text/html
  - application/json
DocumentRequest:
  type: object
  additionalProperties: false
  required:
  - document
  properties:
    document:
      $ref: '#/DocumentSpecification'
DocumentResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    document:
      $ref: '#/Document'
DocumentScope:
  type: string
  enum:
  - BOOKING
  - PASSENGER
DocumentSpecification:
  type: object
  additionalProperties: false
  description: |
    Non travel document created. Either downloadLink + downloadExpiry or content must be provided.
  required:
  - scope
  - type
  properties:
    passengerRef:
      description: |
        Reference to a passenger, to be specified when the document related to an individual passenger.
      type:
      - string
      - 'null'
    content:
      description: |
        base64 encoded binary of the actual fulfillment document. The length restriction of 4 MBytes applies to the encoded
        string, so the raw document cannot exceed 3 MBytes in size.
      type:
      - string
      - 'null'
      format: byte
      maxLength: 4194304
    format:
      $ref: '#/DocumentFormat'
    scope:
      $ref: '#/DocumentScope'
    type:
      $ref: '#/DocumentType'
DocumentType:
  type: string
  enum:
  - BOOKING_RECEIPT
  - CO2_REPORT
  - INFORMATION
  - COMPLAINT_EXPLANATION
Fulfillment:
  type: object
  additionalProperties: false
  description: |
    A fulfillment is a document (or part of a document in distributor mode) that
    - allows the passenger to prove its travel right
    - provides easier access to trains and stations
    - allows an exchange for other services (voucher)
    A fulfillment refers to services of one or multiple offer parts or a fare (distributor mode).
  required:
  - id
  - status
  - bookingRef
  - createdOn
  properties:
    id:
      type: string
    status:
      $ref: '#/FulfillmentStatus'
    bookingRef:
      description: |
        the id of the booking the fulfillment is part of
      type: string
    summary:
      description: |
        A human-readable description of the fulfillment.
      type:
      - string
      - 'null'
    createdOn:
      type: string
      format: date-time
    controlNumber:
      description: |
        Ticket Control Number. Used for secure paper stock of referencing tickets in fulfillment applications.
      type:
      - string
      - 'null'
    bookingParts:
      type: array
      items:
        $ref: ./booking.yml#/BookingPartReference
    availableUsage:
      $ref: '#/FulfillmentUsage'
    issuer:
      $ref: ./_common.yml#/CompanyRef
    fulfillmentDocumentRefs:
      description: |
        References to the fulfillment documents.
      type: array
      items:
        type: string
        description: |
          Fulfillment document ID
    issuingLanguage:
      type: string
      description: the issuing language (ISO-639-1 language code).
    fulfillmentParts:
      description: |
        Fulfillment items to be integrated into tickets (distributor mode).
      type: array
      items:
        $ref: '#/FulfillmentPart'
    contentComplete:
      type:
      - boolean
      - 'null'
      default: false
      description: |
        Indicates whether the fulfillment has all documents or parts generated (if any needed) or they are still pending generation.
    tripCoverage:
      type: array
      items:
        $ref: ./trip.yml#/TripCoverage
    continuousServiceUsage:
      $ref: ./continuous-service.yml#/ContinuousServiceUsage
    _links:
      $ref: ./_common.yml#/Links
FulfillmentCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    fulfillments:
      type: array
      items:
        $ref: '#/Fulfillment'
    fulfillmentDocuments:
      type: array
      items:
        $ref: '#/FulfillmentDocument'
    issuedVoucherRefs:
      type: array
      items:
        $ref: '#/VoucherRef'
    _links:
      $ref: ./_common.yml#/Links
FulfillmentConstraint:
  type: object
  additionalProperties: false
  required:
  - acceptedControlSecurityTypes
  properties:
    acceptedControlSecurityTypes:
      type: array
      items:
        $ref: '#/ControlSecurityType'
      minItems: 1
    acceptedBarCodes:
      description: |
        for SiD fulfillment one of the listed bar codes is required
      type: array
      items:
        $ref: ./_common.yml#/BarCodeType
    requiredBarCodes:
      description: |
        One of the listed bar codes must be provided.
      type: array
      items:
        $ref: ./_common.yml#/BarCodeType
    requiredSiS:
      type: array
      items:
        $ref: '#/SiSType'
    isIndividualTicketingForbidden:
      description: |
        a separate fulfillment per passenger is forbidden
      type:
      - boolean
      - 'null'
      default: false
FulfillmentDocument:
  type: object
  additionalProperties: false
  description: |
    Document created for fulfillment. Either downloadLink + downloadExpiry or content must
    be provided.
  required:
  - id
  - medium
  - type
  - format
  properties:
    id:
      type: string
      description: |
        Technical reference. Required for referencing from fulfillment.fulfillmentDocumentRefs
    medium:
      $ref: '#/FulfillmentMediaType'
    type:
      $ref: '#/FulfillmentDocumentType'
    downloadLink:
      type:
      - string
      - 'null'
      format: uri
    downloadExpiry:
      description: |
        Expiration time of the download link, the document will not be available at the given URI
        after this time.
      type:
      - string
      - 'null'
      format: date-time
    content:
      description: |
        base64 encoded binary of the actual fulfillment document. The length restriction of 4 MBytes applies to the encoded
        string, so the raw document cannot exceed 3 MBytes in size.
      type:
      - string
      - 'null'
      format: byte
      maxLength: 4194304
    format:
      $ref: '#/DocumentFormat'
    applicationProvider:
      $ref: ./_common.yml#/CompanyRef
FulfillmentDocumentType:
  description: |
    The type of fulfillment document.
    Values from the [Fulfillment Document Type Code List](https://osdm.io/spec/catalog-of-code-lists/#FulfillmentDocumentType)
  type: string
  enum:
  - BOARDING_PASS
  - BOOKING_RECEIPT
  - INFORMATION
  - TICKET
  - VOUCHER
FulfillmentId:
  type: string
FulfillmentItemSecurityFeature:
  type: object
  additionalProperties: false
  properties:
    type:
      $ref: '#/SecurityFeatureType'
    data:
      description: |
        base64 encoded data. The length restriction of 4 MBytes applies to the encoded
        string, so the raw data cannot exceed 3 MBytes in size.
      type:
      - string
      - 'null'
      format: byte
      maxLength: 4194304
FulfillmentItemSecurityFeatureLinks:
  type: object
  additionalProperties: false
  properties:
    type:
      $ref: '#/SecurityFeatureType'
    uri:
      description: |
        link to download the security feature
      type:
      - string
      - 'null'
      format: uri
FulfillmentMediaType:
  description: |
    Fulfillment types. RCT2, RCCST and UIC_PDF are official UIC standards.
    Values from the [Fulfillment Media Type Code List](https://osdm.io/spec/catalog-of-code-lists/#FulfillmentMediaType)
    Listed values here are examples.
  type: string
  x-extensible-enum:
  - PDF_A4
  - RCCST
  - RCT2
  - TICKETLESS
  - APPLICATION
  - WALLET
  - CHIP_CARD
FulfillmentOption:
  type: object
  additionalProperties: false
  description: |
    CIT paper implies printing on value paper which is stock controlled.
  required:
  - type
  - media
  properties:
    type:
      $ref: '#/FulfillmentType'
    media:
      $ref: '#/FulfillmentMediaType'
    applications:
      description: "list of applications that can \nhandle the fulfillment. This is required in case of media APPLICATION.\n\
        The applications might be modules on a vending machine to handle chop cards or smartphone apps handling NFC communication..\n"
      type: array
      items:
        type: string
      minItems: 1
    specification:
      description: accepted fulfillment specifications in case the fulfillment via APPLICATION or CHIP_CARD is not not limited
        to a specific application.
      type: array
      items:
        type: string
        examples:
        - CALYPSO
      minItems: 1
FulfillmentPart:
  type: object
  additionalProperties: false
  description: |
    Fulfillment items to be integrated in to tickets,
    e.g. visual security elements, additional bar codes, control keys.
  properties:
    fulfillmentMedia:
      description: |
        list of fulfillment media where this item applies
      type: array
      items:
        $ref: '#/FulfillmentMediaType'
    passengerRef:
      description: |
        reference to a passenger
      type:
      - string
      - 'null'
    controlId:
      type:
      - string
      - 'null'
    securityFeatures:
      description: |
        'visual elements, bar codes'
      type: array
      items:
        $ref: '#/FulfillmentItemSecurityFeature'
    securityFeatureLinks:
      type: array
      items:
        $ref: '#/FulfillmentItemSecurityFeatureLinks'
    fulfillmentInformationTexts:
      type: array
      items:
        $ref: ./_common.yml#/TextElement
    isMandatory:
      description: |
        The use of the provided features is mandatory.
      type:
      - boolean
      - 'null'
      default: false
    securePaperOnly:
      description: |
        The security feature must be used on secure paper.
      type:
      - boolean
      - 'null'
      default: false
FulfillmentPatchRequest:
  type: object
  additionalProperties: false
  description: |
    Changes the fulfillment to status AVAILABLE. In the case of multi-journey  product, one of the fulfillment is
    now 'activated' and can be used to travel. Selects on-demand vehicles. Selects pick-up place and vehicle type for continuous services.
  required:
  - startOfUsage
  properties:
    selectedZoneIds:
      type:
      - array
      - 'null'
      items:
        type: string
    travelDates:
      type:
      - array
      - 'null'
      items:
        type: string
        format: date
    startOfUsage:
      type:
      - string
      - 'null'
      format: date-time
    fromPlace:
      $ref: ./ojp/place.yml#/PlaceRef
    stockControlNumbers:
      description: |
        The ids of the secure paper stock that identifies the blank secure paper stock used for printing.

        The stock control number is only used for secure paper stock and triggers a printing of the stock control number in the ticket layout. This establishes a link between paper stock and ticket that is used to control the usage of blank secure paper stock at offices as secure paper has otherwise no intrinsic protection against internal fraud.
      type:
      - array
      - 'null'
      items:
        type: string
    continuousServiceVehicleSelection:
      description: |
        selection of a pick-up place and vehicle type for continuous services.
      $ref: ./continuous-service.yml#/ContinuousServiceVehicleSelection
FulfillmentPostRequest:
  type: object
  additionalProperties: false
  description: |
    Creates the fulfillment in the requested language
  properties:
    issuingLanguage:
      type: string
      description: the desired issuing language (ISO-639-1 language code). If not provided or not available, will default
        to (one of) the language(s) of the issuing country
FulfillmentRef:
  description: |
    reference to a fulfillment including the status and related bookingPart references
  required:
  - id
  - status
  - summary
  - bookingParts
  - fulfillmentType
  properties:
    id:
      type: string
    status:
      $ref: '#/FulfillmentStatus'
    summary:
      description: |
        A human-readable description of the fulfillment.
      type:
      - string
      - 'null'
    bookingParts:
      type: array
      items:
        $ref: ./booking.yml#/BookingPartReference
      minItems: 1
    fulfillmentType:
      $ref: '#/FulfillmentType'
    createdOn:
      type: string
      format: date-time
FulfillmentRefs:
  description: |
    references to fulfillments including the status and related bookingPart references
  required:
  - fulfillmentRefs
  properties:
    fulfillmentRefs:
      type: array
      items:
        $ref: '#/FulfillmentRef'
      minItems: 1
FulfillmentResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    fulfillment:
      $ref: '#/Fulfillment'
    fulfillmentDocuments:
      description: |
        Final document created for fulfillment.
      type: array
      items:
        $ref: '#/FulfillmentDocument'
FulfillmentsPatchRequest:
  type: object
  additionalProperties: false
  description: |
    Changes the fulfillment to status FULFILLED.
  properties:
    fulfillmentUpdates:
      type: array
      items:
        $ref: '#/FulfillmentId'
FulfillmentsResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    fulfillments:
      type: array
      items:
        $ref: '#/Fulfillment'
FulfillmentStatus:
  description: |
    Individual fulfillments of a multi journey booking need an separate patch to create the usable fulfillment in status FULFILLED before they are in an intermediate state AVAILABLE where they don't provide a document for travel. Fulfillments can be ON_HOLD in case they are booked but not yet available (e.g. a booking providing two journeys per week) or passed in case the fulfillment was not patched for usage within the required time.
  type: string
  enum:
  - AVAILABLE
  - ON_HOLD
  - CONFIRMED
  - FULFILLED
  - CHECKEDIN
  - CANCELLED
  - RELEASED
  - REFUNDED
  - EXCHANGED
  - EXPIRED
FulfillmentSummaryStatus:
  description: |
    status of a fulfillment
  type: string
  x-extensible-enum:
  - PENDING
  - CREATED
  - COMPLETE
FulfillmentType:
  description: |
    Values from the [Fulfillment Type Code List](https://osdm.io/spec/catalog-of-code-lists/#FulfillmentType)
    Listed values here are examples.
  type: string
  x-extensible-enum:
  - ETICKET
  - CIT_PAPER
  - PASS_CHIP
  - PASS_REFERENCE
  - NO_FULFILLMENT
FulfillmentUsage:
  type: object
  additionalProperties: false
  description: |
    In case of multi-journey products describe parameters to be used to change the a fulfillment in status AVAILABLE to FULFILLED so it can be used by the passenger.
  properties:
    fromPlaceRequired:
      type:
      - boolean
      - 'null'
      default: false
    travelDates:
      description: |
        Travel dates that can be selected. Note: date only is used to cover properly the case of passes including
        multiple time zones.
      type:
      - array
      - 'null'
      items:
        type: string
    travelValidityRanges:
      type: array
      items:
        $ref: ./fare.yml#/TravelValidityRange
    maxAvailableZones:
      description: |
        upper limit to the number of selected zones
      type:
      - integer
      - 'null'
      format: int32
    availableZones:
      type: array
      items:
        $ref: ./fare.yml#/ZoneDefinition
SecurityElementFormat:
  type: string
  enum:
  - PNG
  - GIF
  - SVG
  - BINARY
  - TEXT
SecurityElementType:
  type: string
  enum:
  - VISUAL_ELEMENT
  - BAR_CODE
SecurityFeatureType:
  type: object
  additionalProperties: false
  description: |
    Defines type and format of the security feature.
  properties:
    type:
      $ref: '#/SecurityElementType'
    format:
      $ref: '#/SecurityElementFormat'
    symbology:
      $ref: ./_common.yml#/Symbology
SiSType:
  description: |
    Type of the exchange of control data for security in system implementations.
    Values from the [Control Data Exchange Type Code List](https://osdm.io/spec/catalog-of-code-lists/#ControlDataExchangeType)
    Listed values here are examples.
  type: string
  x-extensible-enum:
  - REGISTRY
  - PEER2PEER
VoucherRef:
  type: object
  description: |
    reference to a voucher issued during the sales process
  additionalProperties: false
  required:
  - issuer
  - code
  properties:
    issuer:
      $ref: ./_common.yml#/CompanyRef
    code:
      description: |
        voucher code provided by the issuer
      type: string
    fulfillmentRef:
      description: |
        reference to the fulfillment of the voucher.
      $ref: '#/FulfillmentRefs'
