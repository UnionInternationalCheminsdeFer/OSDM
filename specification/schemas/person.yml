AbstractPassenger:
  type: object
  additionalProperties: false
  description: |
    Minimal common specification of a passenger used for inheritance.
  required:
  - externalRef
  properties:
    externalRef:
      description: |
        A stable reference to a passenger from other elements, or from caller system. When received in input of a request, it must be echoed back in the response.
      type: string
      examples:
      - TK-id-12345
    dateOfBirth:
      description: |
        Date of birth of the passenger. Only needed for passengers of type persons, family child, PRM
        and wheelchair.
      type:
      - string
      - 'null'
      format: date
    age:
      type:
      - integer
      - 'null'
      format: int32
      minimum: 0
    cards:
      description: |
        reduction or loyalty cards owned by the passenger
      type: array
      items:
        $ref: ./_common.yml#/CardReference
    prmNeeds:
      description: |
        For the persons with reduced mobility (PRMs) its specific needs for support are expressed.
      type: array
      items:
        $ref: '#/PRMNeedType'
    type:
      $ref: '#/PassengerType'
    gender:
      $ref: '#/Gender'
ActualPassengerType:
  description: "Actual Passenger type according to UIC passenger, i.e. passenger type list. \nReturns the passenger type according\
    \ to the underlying fare system. \nE.g. a passenger of type PERSON is categorized as a ADULT or YOUTH.\nValues from the\
    \ [Passenger Type Code List](https://osdm.io/spec/catalog-of-code-lists/#PassengerType)\nListed values here are examples.\n"
  type: string
  x-extensible-enum:
  - YOUNG_CHILD
  - CHILD
  - YOUTH
  - ADULT
  - SENIOR
  - FAMILY_CHILD
  - ACCOMP_PRM
  - PRM_CHILD
  - WHEELCHAIR
  - PERSON
  - PRM
  - DOG
  - PET
  - LUGGAGE
  - PRM
  - PRM_CHILD
  - BICYCLE
  - PRAM
  - ACCOMP_DOG
  - ACCOMP_PRM
  - CAR
  - MOTOCYCLE
  - TRAILER
  default: PERSON
AnonymousPassengerSpecification:
  description: |
    Minimal specification of a passenger to request offers without any GDPR relevant attributes such as name or address.
    Either the date of birth or the age at the time of travel needs to be set. We recommend to use date of birth as it is more stable than age.
  allOf:
  - $ref: '#/AbstractPassenger'
  - type: object
    additionalProperties: false
    properties:
      residency:
        $ref: ./_common.yml#/CountryCode
      transportable:
        $ref: ./transportable.yml#/TransportableSpecification
CompanyDetail:
  type: object
  additionalProperties: false
  properties:
    name:
      type: string
    registrationNumber:
      type: string
    legalPostalAddress:
      $ref: ./_common.yml#/PostalAddress
    contact:
      $ref: ./_common.yml#/ContactDetail
    taxId:
      type: string
Gender:
  description: |
    The gender of the passenger, which is important in the case of night trains.
    Values from the [Gender Code List](https://osdm.io/spec/catalog-of-code-lists/#Gender)
  type:
  - string
  - 'null'
  enum:
  - MALE
  - FEMALE
  - X
IdentificationCard:
  type: object
  additionalProperties: false
  description: |
    Person identification information  to be exchanged for border control if legally required.

    It is not allowed to send personal information not required in the offer reply.
    It is legally not allowed to send these personal data already in the offer request.
  required:
  - id
  - type
  properties:
    id:
      description: |
        Identifier on the document.
      type: string
    type:
      description: |
        Refer to code list for values
      type: string
    name:
      description: |
        ICAO transliteration identical as written in the document
      type:
      - string
      - 'null'
    nationality:
      description: |
        ISO 3166-1 alpha-2 2 character country code
      type:
      - string
      - 'null'
    birthCity:
      type:
      - string
      - 'null'
    issuingCity:
      description: |
        place where the document is issued
      type:
      - string
      - 'null'
    residenceCity:
      type:
      - string
      - 'null'
    birthCountryCode:
      $ref: ./_common.yml#/CountryCode
    issuingCountryCode:
      $ref: ./_common.yml#/CountryCode
    residenceCountryCode:
      $ref: ./_common.yml#/CountryCode
    issuingDate:
      type:
      - string
      - 'null'
      format: date-time
    gender:
      $ref: '#/Gender'
    expirationDate:
      type:
      - string
      - 'null'
      format: date
Passenger:
  type: object
  additionalProperties: false
  description: |
    Information about a passenger.
    Either the date of birth or the age at the time of travel needs to be set. We recommend to use date of birth as it is more stable than age.
    The externalRef of the passenger must be provided
  allOf:
  - $ref: '#/PassengerSpecification'
  - type: object
    additionalProperties: false
    required:
    - id
    properties:
      id:
        type: string
      summary:
        description: |
          A human-readable description of the passenger.
        type:
        - string
        - 'null'
      identificationCard:
        $ref: '#/IdentificationCard'
      transportableDetails:
        $ref: ./transportable.yml#/Transportable
      _links:
        $ref: ./_common.yml#/Links
PassengerCategory:
  type: object
  description: "Passenger Category predefines a set of passenger specification properties that result to offer of a specific\
    \ passenger type. \n`title` is the localized name of the passenger category and `specification` describes exact passenger\
    \ specification that may results into offer for selected\npassenger category. Passenger category specification doesn't\
    \ guarante availability of expected passenger type on offered trip. `appliedPassengerType` must always be checked in the\
    \ offer response.\n"
  additionalProperties: false
  required:
  - title
  - specification
  properties:
    base:
      type:
      - boolean
      - 'null'
      default: false
      description: "Indicate whether this passenger category should be preselected \nas a default option in the passenger\
        \ selection. Usually results \nto a \"full fare\" or \"adult fare\" offers.\n"
    additional:
      type:
      - boolean
      - 'null'
      default: false
      description: |
        Indicate whether this passenger category should be always visible in UI or folded into "additional" section.
    title:
      description: |
        Default and localized name of the passenger category.
      $ref: ./_common.yml#/Text
    specification:
      description: |
        Exact passenger specification to be used in order to request an offer for given passenger category.
      $ref: '#/AnonymousPassengerSpecification'
PassengerConstraints:
  type: object
  additionalProperties: false
  properties:
    number:
      description: |
        number of passengers with this constraint
      type:
      - integer
      - 'null'
      format: int32
    upperAgeLimit:
      type:
      - integer
      - 'null'
      format: int32
    lowerAgeLimit:
      type:
      - integer
      - 'null'
      format: int32
PassengerResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    passenger:
      $ref: '#/Passenger'
PassengersBatchUpdateRequest:
  type: object
  additionalProperties: false
  properties:
    passengers:
      type: array
      items:
        $ref: '#/Passenger'
PassengersCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    passengers:
      type: array
      items:
        $ref: '#/Passenger'
PassengerSpecification:
  description: |
    Minimal specification of a passenger to request offers.
    Either the date of birth or the age at the time of travel needs to be set. We recommend to use date of birth as it is more stable than age.
    Business rules for mandatory and non patchable items must be checked on the backend.
    Forward business rules for mandatory items using a requestedInformation field.
  allOf:
  - $ref: '#/AbstractPassenger'
  - type: object
    additionalProperties: false
    properties:
      detail:
        $ref: '#/PersonDetail'
      transportableDetails:
        $ref: ./transportable.yml#/Transportable
PassengerType:
  description: "Passenger type according to UIC passenger, i.e. passenger type list.\nValues from the [Passenger Type Code\
    \ List](https://osdm.io/spec/catalog-of-code-lists/#PassengerType)\nListed values here are examples.   \nProposed default\
    \ PERSON\n"
  type: string
  x-extensible-enum:
  - YOUNG_CHILD
  - CHILD
  - YOUTH
  - ADULT
  - SENIOR
  - FAMILY_CHILD
  - ACCOMP_PRM
  - PRM_CHILD
  - WHEELCHAIR
  - PERSON
  - PRM
  - DOG
  - PET
  - LUGGAGE
  - BICYCLE
  - PRAM
  - ACCOMP_DOG
  - CAR
  - MOTOCYCLE
  - TRAILER
  default: PERSON
PersonalMode:
  description: |
    Modes which an individual powers themselves (such as walk, cycle). Provided by OJP.
  type: string
  x-extensible-enum:
  - WALK
  - CYCLE
  - TAXI
  - SELF_DRIVE_CAR
  - OTHERS_DRIVE_CAR
  - MOTORCYCLE
  - TRUCK
  - SCOOTER
  - RIDE_POOL_CAR
  - CAR_SHARING
  - CYCLE_SHARING
  - SCOOTER_SHARING
  - BICYCLE
  - ELECTRIC_BICYCLE
  - CARGO_BICYCLE
  - SCOOTER
PersonDetail:
  type: object
  additionalProperties: false
  description: |
    Personal information potentially needed at booking step. To support privacy by design,
    it is not permitted to send personal information not required to create a valid booking.
  properties:
    summary:
      description: |
        A human-readable description of the person.
      type:
      - string
      - 'null'
    firstName:
      type:
      - string
      - 'null'
    lastName:
      description: full last names of the person
      type:
      - string
      - 'null'
      examples:
      - Diaz Lopez
    firstFamilyName:
      description: first family name in case of multiple family names. The element lastName includes all family names.
      type:
      - string
      - 'null'
      examples:
      - Diaz
    secondFamilyName:
      description: second family name in case of multiple family names. The element lastName includes all family names.
      type:
      - string
      - 'null'
      examples:
      - Lopez
    postalAddress:
      $ref: ./_common.yml#/PostalAddress
      description: |
        Address of the physical person for issuing an invoice or receipt
    contact:
      $ref: ./_common.yml#/ContactDetail
    taxId:
      type:
      - string
      - 'null'
      description: Tax identification of the physical person for issuing an invoice or receipt
      examples:
      - CZ1234567890
PersonSearchRequest:
  type: object
  additionalProperties: false
  properties:
    firstName:
      type:
      - string
      - 'null'
    lastName:
      type:
      - string
      - 'null'
    dateOfBirth:
      type:
      - string
      - 'null'
      format: date
    phoneNumber:
      $ref: '#/PhoneNumber'
    email:
      type:
      - string
      - 'null'
PhoneNumber:
  description: |
    Preferably a mobile phone number, to be contacted in case changes to the booking
    Format according to E.164 The international public telecommunication numbering plan
  type:
  - string
  - 'null'
  pattern: ^\+\d{1,3}\s?\d{1,14}(\s\d{1,13})?$
  maxLength: 18
PRMNeedType:
  type: string
  x-extensible-enum:
  - NEED_PRM_SUPPORT
  - WHEELCHAIR
  - ACCOMPANYING_DOG
  - COMPANION_SEAT
  - COMPANION
Purchaser:
  description: |
    Purchaser information.
  allOf:
  - $ref: '#/PurchaserSpecification'
  - type: object
    additionalProperties: false
    properties:
      _links:
        $ref: ./_common.yml#/Links
PurchaserResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    purchaser:
      $ref: '#/Purchaser'
PurchaserSearchRequest:
  type: object
  additionalProperties: false
  properties:
    companyName:
      type:
      - string
      - 'null'
    companyRef:
      $ref: ./_common.yml#/CompanyRef
    firstName:
      type:
      - string
      - 'null'
    lastName:
      type:
      - string
      - 'null'
    dateOfBirth:
      type:
      - string
      - 'null'
      format: date
    email:
      type:
      - string
      - 'null'
    phoneNumber:
      $ref: '#/PhoneNumber'
PurchaserSpecification:
  type: object
  additionalProperties: false
  description: |
    Minimal specification of a purchaser to request booking of an offer. Exactly one of `detail` or `companyDetails` must be provided.
    Business rules for mandatory and non patchable items must be checked on the backend.
    Forward business rules for mandatory items using a requestedInformation field.
  properties:
    externalRef:
      description: |
        A stable reference to a purchaser from other elements, or from caller system. When received in input of a request, it must be echoed back in the response.
      type:
      - string
      - 'null'
    detail:
      $ref: '#/PersonDetail'
    companyDetails:
      $ref: '#/CompanyDetail'
ReductionCardAccount:
  allOf:
  - $ref: ./travel-account.yml#/AbstractTravelAccount
  - type: object
    additionalProperties: false
    required:
    - type
    properties:
      type:
        $ref: '#/ReductionCardType'
ReductionCardType:
  type: object
  additionalProperties: false
  required:
  - code
  - issuer
  - name
  properties:
    code:
      type: string
    shortCode:
      description: |
        reduction card code to be used in bar codes. The code is defined within
        the context of the issuer and is required to be very short (usually 1-4 positions).
        The code is used in ticket bar codes to indicate required checks of this reduction card during travel.
      type:
      - string
      - 'null'
    issuer:
      $ref: ./_common.yml#/CompanyRef
    validityForSale:
      description: |
        indication when a card type is usable within a sales process to obtain reductions.
      $ref: ./product.yml#/MasterDataValidity
    validityForTravel:
      description: |
        indication when a card type is usable for  a travel to obtain reductions. The date range is related to the possible start of a travel.
      $ref: ./product.yml#/MasterDataValidity
    name:
      $ref: ./_common.yml#/Text
    cardIdRequired:
      description: |
        the card id must be delivered in online sales
      type:
      - boolean
      - 'null'
      default: false
    includedCardTypes:
      description: |
        This card includes the listed cards
      type: array
      items:
        $ref: ./_common.yml#/CardTypeReference
    serviceClassTypes:
      description: |
        list of service classes where this card applies
      type: array
      items:
        $ref: ./_common.yml#/ServiceClassType
      maxItems: 4
    travelClassTypes:
      description: |
        list of travel classes where this card applies
      type: array
      items:
        $ref: ./_common.yml#/TravelClass
      maxItems: 2
    reductionsGranted:
      description: reductions that will be granted by this reduction card type
      type: array
      items:
        $ref: '#/ReductionGranted'
      minItems: 1
      maxItems: 500
    _links:
      $ref: ./_common.yml#/Links
ReductionCardTypeCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    reductionCardTypes:
      type: array
      items:
        $ref: '#/ReductionCardType'
    _links:
      $ref: ./_common.yml#/Links
ReductionGranted:
  type: object
  additionalProperties: false
  description: |
    reductions granted by a reduction card type. Either carrier or country must be provided.
  required:
  - description
  properties:
    carrier:
      $ref: ./_common.yml#/CompanyRef
    country:
      $ref: ./_common.yml#/CountryCode
    transportModes:
      description: transport modes where the reduction is granted, any mode of the carrier in case the list is not provided.
      type: array
      items:
        $ref: ./ojp/_common.yml#/Mode
    serviceBrands:
      description: ServiceBrands where the reduction is granted, any service brand of the carrier in case the list is not
        provided.
      type: array
      items:
        $ref: ./_common.yml#/ServiceBrandCode
    description:
      description: text describing the reduction granted. In the context of master data translations should be provided.
      $ref: ./_common.yml#/Text
    percentage:
      $ref: ./_common.yml#/Percentage
