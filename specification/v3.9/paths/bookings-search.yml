/bookings-search:
  post:
    tags:
    - Bookings Search
    - Search
    summary: Search for bookings based on search parameters.
    operationId: searchBookings
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptLanguage
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptNamespace
    - $ref: ../OSDM-online-api.yml#/components/parameters/page
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../OSDM-online-api.yml#/components/schemas/BookingSearchRequest
    responses:
      '200':
        description: |
          booking search results found
        content:
          application/json:
            schema:
              $ref: ../OSDM-online-api.yml#/components/schemas/BookingSearchResponse
        headers:
          Content-Language:
            schema:
              type: string
              description: |
                The language of translatable strings in the response (see RFC2616-sec14.12).
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
