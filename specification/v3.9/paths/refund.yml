/bookings/{bookingId}/refund-offers:
  post:
    tags:
    - Refund
    summary: Initiates a refund process by creating a refundOffer resource.
    description: |
      The RefundOffer contains the required information on the potential operation. One refund offer can then be
      accepted via a PATCH, deleted or left to die at the end of its lifetime.
    operationId: postRefundOffers
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptLanguage
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - $ref: ../OSDM-online-api.yml#/components/parameters/idempotencyKey
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptNamespace
    - name: bookingId
      in: path
      description: |
        id of the booking.
      required: true
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../OSDM-online-api.yml#/components/schemas/RefundOfferRequest
    responses:
      '200':
        description: |
          refund offer created
        content:
          application/json:
            schema:
              $ref: ../OSDM-online-api.yml#/components/schemas/RefundOfferCollectionResponse
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
/bookings/{bookingId}/refund-offers/{refundOfferId}/confirmation-check:
  get:
    tags:
    - Refund
    summary: Validation step (step 1 in a two phase commit process) to run before the effective patch endpoint. Provider do
      all checks to "guarantee" that refund will work.
    description: |
      Step 1 in a two phase commit process. An aggregator can use this to secure that all underlying provider systems are up and running and the provider booking is ready to be refunded.
    operationId: postPrepareRefundOffers
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptLanguage
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - $ref: ../OSDM-online-api.yml#/components/parameters/idempotencyKey
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptNamespace
    - name: bookingId
      in: path
      description: |
        id of the booking
      required: true
      schema:
        type: string
    - name: refundOfferId
      in: path
      description: |
        id of the refund offer
      required: true
      schema:
        type: string
        maxLength: 32768
    responses:
      '204':
        description: Success, verified OK
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '409':
        $ref: ../OSDM-online-api.yml#/components/responses/ConflictResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
/bookings/{bookingId}/refund-offers/{refundOfferId}:
  get:
    tags:
    - Refund
    summary: Returns the refund offer for the ids provided.
    operationId: getRefundOffers
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptLanguage
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptNamespace
    - name: bookingId
      in: path
      description: |
        id of the booking
      required: true
      schema:
        type: string
    - name: refundOfferId
      in: path
      description: |
        id of the refund offer to get.
      required: true
      schema:
        type: string
        maxLength: 32768
    responses:
      '200':
        description: |
          refund offer found
        content:
          application/json:
            schema:
              $ref: ../OSDM-online-api.yml#/components/schemas/RefundOfferResponse
        headers:
          Content-Language:
            schema:
              type: string
              description: |
                The language of translatable strings in the response (see RFC2616-sec14.12).
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
  patch:
    tags:
    - Refund
    summary: Allows to accept and confirm a refund offer.
    operationId: patchRefundOffers
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptLanguage
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - $ref: ../OSDM-online-api.yml#/components/parameters/idempotencyKey
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptNamespace
    - name: bookingId
      in: path
      description: |
        id of the booking
      required: true
      schema:
        type: string
    - name: refundOfferId
      in: path
      description: |
        id of the refund offer
      required: true
      schema:
        type: string
        maxLength: 32768
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../OSDM-online-api.yml#/components/schemas/RefundOfferPatchRequest
    responses:
      '200':
        description: |
          refund offer confirmed
        content:
          application/json:
            schema:
              $ref: ../OSDM-online-api.yml#/components/schemas/RefundOfferResponse
        headers:
          Content-Language:
            schema:
              type: string
              description: |
                The language of translatable strings in the response (see RFC2616-sec14.12).
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '409':
        $ref: ../OSDM-online-api.yml#/components/responses/ConflictResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
  delete:
    tags:
    - Refund
    summary: Deletes a refundOffer without waiting for expiry.
    description: "In case the unconfirmed refund offer is not stored in the booking \nobject the delete request must return\
      \ an ok (http 204). In case the \nrefund offer is already confirmed and can not be deleted the reply \nmust be an error\
      \ (http 409 conflict).\n"
    operationId: deleteRefundOffers
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptLanguage
      description: deprecated
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - name: bookingId
      in: path
      description: |
        id of the booking
      required: true
      schema:
        type: string
    - name: refundOfferId
      in: path
      description: |
        id of the refund offer
      required: true
      schema:
        type: string
    responses:
      '204':
        description: |
          refund offer deleted
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '409':
        $ref: ../OSDM-online-api.yml#/components/responses/ConflictResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
