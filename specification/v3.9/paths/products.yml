/products:
  get:
    tags:
    - Master Data
    - Product
    summary: Returns all products.
    operationId: getProducts
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptLanguage
      description: deprecated
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptNamespace
    - $ref: ../OSDM-online-api.yml#/components/parameters/page
    - name: productCode
      in: query
      description: the product code
      schema:
        type: string
    - name: issuingDate
      in: query
      description: To be used in combination with a productCode. Is the issuing date to take into account for product definition.
        If none is provided, today is assumed.
      schema:
        type: string
        format: date
    - name: travelDate
      description: To be used in combination with a productCode. Is the travel date to take into account for product definition.
        If none is provided, today is assumed.
      in: query
      schema:
        type: string
        format: date
    responses:
      '200':
        description: |
          Product found
        content:
          application/json:
            schema:
              $ref: ../OSDM-online-api.yml#/components/schemas/ProductCollectionResponse
        headers:
          Cache-Control:
            schema:
              type: string
              default: public, max-age=10000
              description: |
                Resource is fairly persistent and has a medium time to live to allow short-term caching.
          Content-Language:
            schema:
              type: string
              description: |
                The language of translatable strings in the response (see RFC2616-sec14.12).
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
/products/{productId}:
  get:
    tags:
    - Master Data
    - Product
    summary: Returns a product for the provided id.
    operationId: getProductsId
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptLanguage
      description: deprecated
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptNamespace
    - name: productId
      in: path
      description: |
        id of the product to get
      required: true
      schema:
        type: string
    responses:
      '200':
        description: |
          Product found
        content:
          application/json:
            schema:
              $ref: ../OSDM-online-api.yml#/components/schemas/ProductResponse
        headers:
          Cache-Control:
            schema:
              type: string
              default: public, max-age=10000
              description: |
                Resource is fairly persistent and has a medium time to live to allow short-term caching.
          Content-Language:
            schema:
              type: string
              description: |
                The language of translatable strings in the response (see RFC2616-sec14.12).
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
