/coach-deck-layouts:
  get:
    tags:
    - Master Data
    summary: Returns all coach deck layouts.
    description: |
      Retrieve the coach layout description needed for graphical reservation. The coach
      layouts can either be retrieved as a complete list or specificity for a train identified via offerId and reservationId or fareId
    operationId: getCoachDeckLayouts
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - $ref: ../OSDM-online-api.yml#/components/parameters/ifNoneMatch
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptNamespace
    responses:
      '200':
        description: |
          coach layouts
        content:
          application/json:
            schema:
              $ref: ../OSDM-online-api.yml#/components/schemas/CoachDeckLayoutCollectionResponse
        headers:
          Cache-Control:
            schema:
              type: string
              default: public, max-age=10000
            description: |
              Resource is fairly persistent and has a medium time to live to allow short-term caching.
          ETag:
            schema:
              type: string
            description: version tag
      '303':
        $ref: ../OSDM-online-api.yml#/components/responses/SeeOtherResponse
      '304':
        $ref: ../OSDM-online-api.yml#/components/responses/NotModifiedResponse
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
/coach-deck-layouts/{layoutId}:
  get:
    tags:
    - Master Data
    summary: Returns a coach deck layout for a provided id.
    description: |
      Retrieve a coach layout description needed for graphical reservation for a given layout id.
    operationId: getCoachDeckLayout
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptNamespace
    - name: layoutId
      in: path
      description: |
        id of the layout
      required: true
      schema:
        type: string
        nullable: false
    responses:
      '200':
        description: |
          coach layouts
        content:
          application/json:
            schema:
              $ref: ../OSDM-online-api.yml#/components/schemas/CoachDeckLayoutResponse
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '404':
        $ref: ../OSDM-online-api.yml#/components/responses/NotFoundResponse
      '406':
        $ref: ../OSDM-online-api.yml#/components/responses/NotAcceptableResponse
      '415':
        $ref: ../OSDM-online-api.yml#/components/responses/UnsupportedMediaTypeResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
      '503':
        $ref: ../OSDM-online-api.yml#/components/responses/ServiceUnavailableResponse
      default:
        $ref: ../OSDM-online-api.yml#/components/responses/DefaultErrorResponse
