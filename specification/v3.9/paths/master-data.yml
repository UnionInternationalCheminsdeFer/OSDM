/passenger-categories:
  get:
    tags:
    - Master Data
    - Passenger Categories
    summary: Returns all defined passenger categories.
    description: "Provider may *optionally* define passenger categories. These are usually intended for frontend (UI) usage\
      \ instead of full passenger specification entry when provider works with unified list of passenger categories. For \n\
      precise entry, or when PassengerCategory is not defined, the full passenger specification must always be supported by\
      \ the provider.\n"
    operationId: getPassengerCategories
    parameters:
    - $ref: ../OSDM-online-api.yml#/components/parameters/requestor
    - $ref: ../OSDM-online-api.yml#/components/parameters/acceptLanguage
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceParent
    - $ref: ../OSDM-online-api.yml#/components/parameters/traceState
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: ../OSDM-online-api.yml#/components/schemas/PassengerCategory
      '400':
        $ref: ../OSDM-online-api.yml#/components/responses/BadRequestResponse
      '401':
        $ref: ../OSDM-online-api.yml#/components/responses/UnauthorizedResponse
      '403':
        $ref: ../OSDM-online-api.yml#/components/responses/ForbiddenResponse
      '500':
        $ref: ../OSDM-online-api.yml#/components/responses/InternalServerErrorResponse
      '501':
        $ref: ../OSDM-online-api.yml#/components/responses/NotImplementedResponse
