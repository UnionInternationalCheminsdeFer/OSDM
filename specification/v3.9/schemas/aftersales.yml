AfterSaleCondition:
  type: object
  additionalProperties: false
  description: |
    After sale amounts for a given offer.
  properties:
    condition:
      $ref: '#/AfterSaleConditionType'
    validFrom:
      type: string
      format: date-time
      nullable: true
    validUntil:
      type: string
      format: date-time
      nullable: true
    afterSaleFee:
      $ref: ./_common.yml#/Price
    reimbursementMethod:
      $ref: ./complaint.yml#/ReimbursementMethod
AfterSaleConditionType:
  type: string
  x-extensible-enum:
  - PLACE_CHANGE
  - EXCHANGE
  - REFUND
AfterSalesConditionsLink:
  type: object
  additionalProperties: false
  required:
  - conditions
  properties:
    conditions:
      description: |
        Structured description of the after-sales conditions.
      type: array
      items:
        $ref: '#/AfterSaleCondition'
      minItems: 1
    isSupportingIndividualContracts:
      description: |
        Indicates that the after sales of this fare can be treated independently per person.
      type: boolean
      nullable: true
      default: false
    isProviderFee:
      description: |
        The after sales fees are attributed to the provider. In some business models used with fares the fees are attributed to the distributor.
      type: boolean
      default: true
AfterSalesOverrideDetails:
  description: |
    If initial after sales conditions have been overwritten this object provides details on the original
    conditions and an explanation text for the customer
  type: object
  properties:
    initialAftersalesConditions:
      type: array
      items:
        $ref: '#/AfterSaleCondition'
      deprecated: true
    initialAfterSalesConditions:
      type: array
      items:
        $ref: '#/AfterSaleCondition'
    overrideDescription:
      description: Description for the change of conditions for the customer.
      type: string
    validFrom:
      type: string
      format: date-time
      nullable: true
    validUntil:
      type: string
      format: date-time
      nullable: true
    initialExchangeableType:
      $ref: '#/ExchangeableType'
    initialRefundType:
      $ref: '#/RefundType'
CancelFulfillmentsOffer:
  type: object
  additionalProperties: false
  required:
  - id
  - createdOn
  - validFrom
  - validUntil
  - status
  - fulfillments
  properties:
    id:
      description: |
        id of the cancel fulfillments offer
      type: string
      maxLength: 32768
      nullable: false
    summary:
      description: |
        A human-readable description of the refund offer.
      type: string
      nullable: true
    createdOn:
      type: string
      format: date-time
      nullable: false
    validFrom:
      type: string
      format: date-time
      nullable: false
    validUntil:
      description: |
        time until the offer can be used
      type: string
      format: date-time
      nullable: false
    confirmedOn:
      type: string
      format: date-time
      nullable: true
    status:
      $ref: '#/CancelFulfillmentsStatus'
    fulfillments:
      type: array
      items:
        $ref: ./fulfillment.yml#/Fulfillment
      minItems: 1
    _links:
      $ref: ./_common.yml#/Links
CancelFulfillmentsOfferCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    warnings:
      deprecated: true
      $ref: ./_common.yml#/WarningCollection
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    cancelFulfillmentOffers:
      type: array
      items:
        $ref: '#/CancelFulfillmentsOffer'
    _links:
      $ref: ./_common.yml#/Links
CancelFulfillmentsOfferPatchRequest:
  type: object
  additionalProperties: false
  required:
  - status
  properties:
    status:
      $ref: '#/CancelFulfillmentsStatus'
CancelFulfillmentsOfferRequest:
  type: object
  additionalProperties: false
  properties:
    fulfillmentIds:
      type: array
      items:
        $ref: ./fulfillment.yml#/FulfillmentId
CancelFulfillmentsOfferResponse:
  type: object
  additionalProperties: false
  properties:
    warnings:
      deprecated: true
      $ref: ./_common.yml#/WarningCollection
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    cancelFulfillmentsOffer:
      $ref: '#/CancelFulfillmentsOffer'
CancelFulfillmentsStatus:
  type: string
  enum:
  - PROPOSED
  - CONFIRMED
ExchangeableType:
  description: "If set to YES the offerpart is exchangeable without a fee before the day of departure. \nNO when not exchangeable\
    \ or exchangeable with 100% fee, WITH_CONDITIONS in all other cases.\n"
  type: string
  enum:
  - 'YES'
  - 'NO'
  - WITH_CONDITION
ExchangeBreakdownItem:
  type: object
  required:
  - bookingPartIds
  - exchangeFee
  - exchangePrice
  properties:
    exchangeFee:
      $ref: ./_common.yml#/Price
    exchangePrice:
      description: |
        price of the new booking parts
      $ref: ./_common.yml#/Price
    refundableAmount:
      description: |
        amount to be paid to the purchaser in case the new products are less expensive. There can not be an amountToBePaid at the same time.
      $ref: ./_common.yml#/Price
    amountToBePaid:
      description: |
        amount to be paid by the purchaser in case the new products are more expensive. There can not be a refundableAmount at the same time.
      $ref: ./_common.yml#/Price
    bookingPartIds:
      type: array
      items:
        type: string
ExchangeOffer:
  type: object
  additionalProperties: false
  required:
  - exchangeFee
  - exchangePrice
  - fulfillments
  - offerId
  - createdOn
  - preBookableUntil
  - passengerRefs
  - admissionOfferParts
  properties:
    exchangeFee:
      $ref: ./_common.yml#/Price
    accountingRef:
      description: |
        Accounting information for the exchange fee
      $ref: ./_common.yml#/AccountingRef
    exchangePrice:
      description: |
        price of the new booking parts
      $ref: ./_common.yml#/Price
    refundableAmount:
      description: |
        amount to be paid to the purchaser in case the new products are less expensive. There can not be an amountToBePaid at the same time.
      $ref: ./_common.yml#/Price
    amountToBePaid:
      description: |
        amount to be paid by the purchaser in case the new products are more expensive. There can not be a refundableAmount at the same time.
      $ref: ./_common.yml#/Price
    appliedOverruleCode:
      $ref: ./_common.yml#/OverruleCode
    fulfillments:
      type: array
      items:
        $ref: ./fulfillment.yml#/Fulfillment
      minItems: 1
    offerId:
      type: string
      maxLength: 32768
      nullable: false
    summary:
      description: |
        A human-readable description of the offer.
      type: string
      nullable: true
    offerSummary:
      description: The offerSummary must be provided for product based offers. It is not needed for fares.
      $ref: ./offer.yml#/OfferSummary
    createdOn:
      type: string
      format: date-time
      nullable: false
    preBookableUntil:
      description: |
        time until the offer can be pre-booked, however its availability is not guaranteed
      type: string
      format: date-time
      nullable: false
    passengerRefs:
      type: array
      items:
        type: string
      minItems: 1
      nullable: false
    products:
      type: array
      items:
        $ref: ./product.yml#/Product
    tripCoverage:
      $ref: ./trip.yml#/TripCoverage
    inboundTripCoverage:
      $ref: ./trip.yml#/TripCoverage
    exchangeOfferBreakdown:
      description: |
        Breakdown of the exchange offer, including the exchange price, exchange fee, and refundable amount.
      type: array
      items:
        $ref: '#/ExchangeBreakdownItem'
    admissionOfferParts:
      type: array
      items:
        $ref: ./offer.yml#/AdmissionOfferPart
    reservationOfferParts:
      type: array
      items:
        $ref: ./offer.yml#/ReservationOfferPart
    ancillaryOfferParts:
      type: array
      items:
        $ref: ./offer.yml#/AncillaryOfferPart
    fees:
      type: array
      items:
        $ref: ./_common.yml#/Fee
    fares:
      type: array
      items:
        $ref: ./product.yml#/Fare
    _links:
      $ref: ./_common.yml#/Links
ExchangeOfferCollectionRequest:
  type: object
  additionalProperties: false
  description: |
    Defines the parameters needed to request an exchange offer, either based on either an
    existing trip (that is then passed in) plus a set of offer search
    criteria, or based on trip-search and offer search criteria. At least one
    of the trip or tripSearchCriteria must be set.
  required:
  - fulfillmentIds
  - anonymousPassengerSpecifications
  properties:
    fulfillmentIds:
      type: array
      items:
        type: string
      minItems: 1
      nullable: false
    overruleCode:
      $ref: ./_common.yml#/OverruleCode
    tripSpecifications:
      type: array
      items:
        $ref: ./trip.yml#/TripSpecification
    tripIds:
      type: array
      items:
        type: string
        maxLength: 32768
      nullable: true
    tripSearchCriteria:
      $ref: ./ojp/trip.yml#/TripSearchCriteria
    nonTripSearchCriteria:
      $ref: ./trip.yml#/NonTripSearchCriteria
    requestedSections:
      type: array
      items:
        $ref: ./trip.yml#/Section
    offerSearchCriteria:
      $ref: ./offer.yml#/OfferSearchCriteria
    anonymousPassengerSpecifications:
      type: array
      items:
        $ref: ./passenger.yml#/AnonymousPassengerSpecification
      minItems: 1
    corporateCodes:
      type: array
      items:
        $ref: ./_common.yml#/CorporateCode
    promotionCodes:
      type: array
      items:
        $ref: ./_common.yml#/PromotionCode
    requestedFulfillmentOptions:
      type: array
      items:
        $ref: ./fulfillment.yml#/FulfillmentOption
    exchangeFee:
      description: |
        In some business models the distributor has the right to define the exchange fee amount for a fare provided by the fare provider. This need to be indicated in the fare after sales rules to be applied. In this case the distributor submits the amount to the fare provider in exchange fee amount and the fare provider uses this amount to create the fees including the VAT split.
      $ref: ./_common.yml#/CurrencyAmount
    embed:
      type: array
      items:
        $ref: ./offer.yml#/OfferCollectionResponseContent
ExchangeOfferCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    warnings:
      deprecated: true
      $ref: ./_common.yml#/WarningCollection
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    exchangeOffers:
      type: array
      items:
        $ref: '#/ExchangeOffer'
    trips:
      description: |
        Two trips are returned if  round trips are exchanged.
      type: array
      items:
        $ref: ./ojp/trip.yml#/Trip
    passengers:
      type: array
      items:
        $ref: ./passenger.yml#/Passenger
    _links:
      $ref: ./_common.yml#/Links
ExchangeOfferCollectionResponseContent:
  type: string
  enum:
  - ALL
  - EXCHANGEOFFERS
  - TRIP
  - PASSENGERS
  - NONE
  default: ALL
ExchangeOperation:
  type: object
  additionalProperties: false
  required:
  - id
  properties:
    id:
      type: string
      nullable: false
    status:
      $ref: '#/ExchangeStatus'
    exchangeOffers:
      type: array
      items:
        $ref: '#/ExchangeOffer'
    ticketTimeLimit:
      type: string
      format: date-time
      nullable: true
    fulfillmentType:
      $ref: ./fulfillment.yml#/FulfillmentType
    fulfillments:
      type: array
      items:
        $ref: ./fulfillment.yml#/Fulfillment
    issuedVouchers:
      type: array
      items:
        $ref: ./_common.yml#/VoucherInformation
    trips:
      type: array
      items:
        $ref: ./ojp/trip.yml#/Trip
ExchangeOperationPatchRequest:
  type: object
  additionalProperties: false
  description: |
    Allows modifying a general setting for the booking:
     * setting the required fulfillment type, e.g. value paper
       or e-ticket and preferred fulfillment media.
       The latter is optional and relevant in some cases only.
     * Provisionally exchanging some of the fulfillments in the booking
  properties:
    requestedFulfillmentType:
      $ref: ./fulfillment.yml#/FulfillmentType
    preferredFulfillmentMedia:
      $ref: ./fulfillment.yml#/FulfillmentMediaType
    embed:
      description: |
        Influences whether referenced resources are returned in full or as references only.
      type: array
      items:
        $ref: '#/ExchangeOperationResponseContent'
ExchangeOperationRequest:
  type: object
  additionalProperties: false
  required:
  - exchangeOffers
  properties:
    exchangeOffers:
      type: array
      items:
        $ref: ./offer.yml#/OfferSelection
      minItems: 1
ExchangeOperationResponse:
  type: object
  additionalProperties: false
  properties:
    warnings:
      deprecated: true
      $ref: ./_common.yml#/WarningCollection
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    exchangeOperation:
      $ref: '#/ExchangeOperation'
ExchangeOperationResponseContent:
  description: |
    Influences whether referenced resources are returned in full or as references only.
  type: string
  enum:
  - ALL
  - EXCHANGEOPERATION
  - EXCHANGEOPERATION_EXCHANGEOFFERS
  - EXCHANGEOPERATION_FULFILLMENTS
  default: ALL
ExchangeStatus:
  type: string
  enum:
  - PREBOOKED
  - CONFIRMED
  - FULFILLED
  - ERROR
RefundOffer:
  type: object
  additionalProperties: false
  required:
  - id
  - createdOn
  - validFrom
  - validUntil
  - status
  - fulfillments
  - refundFee
  - refundableAmount
  properties:
    id:
      description: |
        id of the refund offer
      type: string
      maxLength: 32768
      nullable: false
    summary:
      description: |
        A human-readable description of the refund offer.
      type: string
      nullable: true
      example: Refund Offer for Paris-Barcelona Andre Dupont 2022-07-23
    summaryTranslations:
      description: Translations for the summary
      type: array
      items:
        $ref: ./_common.yml#/Translation
    createdOn:
      type: string
      format: date-time
      nullable: false
    validFrom:
      type: string
      format: date-time
      nullable: false
    validUntil:
      description: |
        time until the offer can be used
      type: string
      format: date-time
      nullable: false
    confirmedOn:
      type: string
      format: date-time
      nullable: true
    status:
      $ref: '#/RefundStatus'
    reimbursementStatus:
      $ref: ./complaint.yml#/ReimbursementStatus
    reimbursementDateTime:
      type: string
      format: date-time
      nullable: true
    appliedOverruleCode:
      $ref: ./_common.yml#/OverruleCode
    fulfillments:
      description: fulfillments to be refunded or replaced
      type: array
      items:
        $ref: ./fulfillment.yml#/Fulfillment
      minItems: 1
    issuedFulfillments:
      description: new fulfillments issued with this offer (only available after confirmation)
      type: array
      items:
        $ref: ./fulfillment.yml#/Fulfillment
    issuedVouchers:
      type: array
      items:
        $ref: ./_common.yml#/VoucherInformation
    refundFee:
      $ref: ./_common.yml#/Price
      description: |
        Amount kept by the carrier and/or distributor
    accountingRef:
      description: |
        Accounting information for the refund fee
      $ref: ./_common.yml#/AccountingRef
    refundableAmount:
      $ref: ./_common.yml#/Price
      description: |
        Amount refunded to the purchaser
    refundOfferBreakdown:
      description: |
        breakdown of the refund offer
      type: array
      items:
        $ref: '#/RefundOfferBreakdownItem'
    reimbursementMethod:
      $ref: ./complaint.yml#/ReimbursementMethod
    _links:
      $ref: ./_common.yml#/Links
RefundOfferBreakdownItem:
  type: object
  required:
  - refundFee
  - refundableAmount
  - bookingParts
  properties:
    refundFee:
      description: Amount kept by the carrier and/or the distributor
      $ref: ./_common.yml#/Price
    refundableAmount:
      description: Amount to be returned to the purchaser
      $ref: ./_common.yml#/Price
    bookingParts:
      type: array
      items:
        $ref: ./booking.yml#/BookingPartReference
RefundOfferCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    warnings:
      deprecated: true
      $ref: ./_common.yml#/WarningCollection
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    refundOffers:
      type: array
      items:
        $ref: '#/RefundOffer'
    _links:
      $ref: ./_common.yml#/Links
RefundOfferPatchRequest:
  type: object
  additionalProperties: false
  description: |
    Changes the refund offer to status CONFIRMED. De-confirmation by setting PROPOSED status is not supported by API.
  required:
  - status
  properties:
    status:
      $ref: '#/RefundStatus'
RefundOfferRequest:
  type: object
  additionalProperties: false
  description: |
    Request for a refund offer.
    Fulfillments can be provided in case the booking contains multiple individual fulfillments.
  required:
  - fulfillmentIds
  properties:
    fulfillmentIds:
      description: |
        ids of the fulfillments to refund
      type: array
      items:
        type: string
      minItems: 1
      nullable: false
    refundSpecifications:
      description: |
        To do a partial refund repeat the fulfillmentIds affected and point out what to refund
      type: array
      items:
        $ref: '#/RefundSpecification'
    overruleCode:
      $ref: ./_common.yml#/OverruleCode
    refundDate:
      description: |
        Indicates for passes the date taken as reference to compute possible partial refund. It is also the date taken
        as reference to invalidate the pass partially refunded.
      type: string
      format: date-time
      nullable: true
RefundOfferResponse:
  type: object
  additionalProperties: false
  properties:
    warnings:
      deprecated: true
      $ref: ./_common.yml#/WarningCollection
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    refundOffer:
      $ref: '#/RefundOffer'
RefundSpecification:
  type: object
  required:
  - fulfillmentId
  properties:
    fulfillmentId:
      description: |
        id of the fulfillment where some part(s) should be removed
      type: string
    bookingPartIds:
      description: ids of booking parts to be removed from the fulfillment
      type: array
      items:
        type: string
        maxLength: 32768
    passengerIds:
      type: array
      description: ids of passengers to be removed from the fulfillment
      items:
        type: string
    refundFee:
      description: |
        In some business models the distributor has the right to define the refund fee amount for a fare provided by the fare provider. This need to be indicated in the fare after sales rules to be applied. In this case the distributor submits the amount to the fare provider in refund fee amount and the fare provider uses this amount to create the fees including the VAT split.
      $ref: ./_common.yml#/CurrencyAmount
RefundStatus:
  type: string
  enum:
  - PROPOSED
  - CONFIRMED
RefundType:
  type: string
  enum:
  - 'YES'
  - 'NO'
  - WITH_CONDITION
ReleaseOffer:
  type: object
  additionalProperties: false
  required:
  - id
  - createdOn
  - validFrom
  - validUntil
  - status
  - fulfillments
  properties:
    id:
      description: |
        id of the release offer
      type: string
      maxLength: 32768
      nullable: false
    summary:
      description: |
        A human-readable description of the refund offer.
      type: string
      nullable: true
    createdOn:
      type: string
      format: date-time
      nullable: false
    validFrom:
      type: string
      format: date-time
      nullable: false
    validUntil:
      description: |
        time until the offer can be used
      type: string
      format: date-time
      nullable: false
    confirmedOn:
      type: string
      format: date-time
      nullable: true
    status:
      $ref: '#/ReleaseStatus'
    fulfillments:
      type: array
      items:
        $ref: ./fulfillment.yml#/Fulfillment
      minItems: 1
    appliedOverruleCode:
      $ref: ./_common.yml#/OverruleCode
    _links:
      $ref: ./_common.yml#/Links
ReleaseOfferCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    warnings:
      deprecated: true
      $ref: ./_common.yml#/WarningCollection
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    releaseOffers:
      type: array
      items:
        $ref: '#/ReleaseOffer'
    _links:
      $ref: ./_common.yml#/Links
ReleaseOfferPatchRequest:
  type: object
  additionalProperties: false
  required:
  - status
  properties:
    status:
      $ref: '#/ReleaseStatus'
ReleaseOfferRequest:
  type: object
  additionalProperties: false
  properties:
    fulfillmentIds:
      type: array
      items:
        $ref: ./fulfillment.yml#/FulfillmentId
    releaseSpecifications:
      description: |
        To do a partial release repeat the fulfillmentIds affected and point out what to release
      type: array
      items:
        $ref: '#/RefundSpecification'
    overruleCode:
      $ref: ./_common.yml#/OverruleCode
ReleaseOfferRequestAsyncResponse:
  type: object
  additionalProperties: false
  properties:
    warnings:
      deprecated: true
      $ref: ./_common.yml#/WarningCollection
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    releaseOfferIds:
      description: |
        Ids of the release offers created asynchronously. Retrieve GET release-offers/{releaseOfferId} to poll the status
      type: array
      items:
        type: string
ReleaseOfferResponse:
  type: object
  additionalProperties: false
  properties:
    warnings:
      deprecated: true
      $ref: ./_common.yml#/WarningCollection
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    releaseOffer:
      $ref: '#/ReleaseOffer'
ReleaseStatus:
  type: string
  enum:
  - PROPOSED
  - CONFIRMED
