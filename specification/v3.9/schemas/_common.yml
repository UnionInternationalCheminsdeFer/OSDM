Problem:
  type: object
  additionalProperties: false
  description: |
    Problem Details for HTTP APIs (RFC 9457) defines a 'problem detail' as a way
    to carry machine-readable details of errors in a HTTP response to avoid
    the need to define new error response formats for HTTP APIs.
    See: https://tools.ietf.org/html/rfc9457
  properties:
    code:
      description: |
        optional in version 3.1, will be made mandatory in upcoming releases
      type: string
      nullable: true
    type:
      description: |
        An absolute URI that identifies the problem type. When dereferenced,
        it SHOULD provide human-readable documentation for the problem type
        (e.g., using HTML).
      type: string
      format: uri
      nullable: true
      default: about:blank
      example: https://example.com/probs/passenger-too-young
    title:
      description: |
        A short, summary of the problem type. Written in English and readable
        for engineers (usually not suited for non technical stakeholders and
        not localized);
      type: string
      nullable: true
      example: Service Unavailable
    status:
      description: |
        The HTTP status code generated by the origin server for this occurrence
        of the problem.
      type: integer
      format: int32
      minimum: 100
      maximum: 599
      nullable: true
      example: 503
    detail:
      description: |
        A human readable explanation specific to this occurrence
        of the problem.
      type: string
      nullable: true
      example: Connection to database timed out
    instance:
      description: |
        An absolute URI that identifies the specific occurrence of the problem.
      type: string
      format: uri
      nullable: true
    pointers:
      type: array
      items:
        $ref: '#/ProblemPointer'
        nullable: true
      minItems: 0
ProblemPointer:
  type: object
  additionalProperties: false
  description: |
    Problem Details for HTTP APIs (RFC 9457) defines a 'problem detail' as a way
    to carry machine-readable details of errors in a HTTP response to avoid
    the need to define new error response formats for HTTP APIs.
    See: https://tools.ietf.org/html/rfc9457
  properties:
    code:
      description: |
        optional in version 3.1, will be made mandatory in upcoming releases
      type: string
      nullable: true
    type:
      description: |
        An absolute URI that identifies the problem type. When dereferenced,
        it SHOULD provide human-readable documentation for the problem type
        (e.g., using HTML).
      type: string
      format: uri
      nullable: true
      default: about:blank
      example: https://example.com/probs/passenger-too-young
    title:
      description: |
        A short, summary of the problem type. Written in English and readable
        for engineers (usually not suited for non technical stakeholders and
        not localized);
      type: string
      nullable: true
      example: Service Unavailable
    status:
      description: |
        The HTTP status code generated by the origin server for this occurrence
        of the problem.
      type: integer
      format: int32
      minimum: 100
      maximum: 599
      nullable: true
      example: 503
    detail:
      description: |
        A human readable explanation specific to this occurrence
        of the problem.
      type: string
      nullable: true
      example: Connection to database timed out
    instance:
      description: |
        An absolute URI that identifies the specific occurrence of the problem.
      type: string
      format: uri
      nullable: true
    requestPointer:
      description: |
        A pointer to the attribute in the request for the problem.
      type: string
      nullable: true
      example: '#/offers[1]/placeSelections[1]/reservationId'
    responsePointer:
      description: |
        A pointer to the attribute in the response for the problem.
      type: string
      nullable: true
      example: '#/booking/bookedOffers[4]/reservations[1]/id'
    originator:
      description: |
        Identifier to the origin server for this occurrence of the problem.
      type: string
      nullable: true
      example: IMS1
