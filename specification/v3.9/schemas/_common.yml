  - DIRECT_DEBIT
  - ELECTRONIC_PAYMENT
  - INVOICE
  - VOUCHER
  - TRAVEL_ACCOUNT
PersonDetail:
  type: object
  additionalProperties: false
  description: "Personal information potentially needed at booking step. To support privacy by design,\nit is not permitted\
    \ to send personal information not required to create a valid booking.\nNote that address is deprecated in favor of `postalAddress`,\
    \ and email and phoneNumber \nare deprecated in favor of the attributes in `ContactDetail`\n"
  required:
  - firstName
  - lastName
  properties:
    preferredLanguage:
      description: |
        ISO-639-1 language code
      type: string
      deprecated: true
      nullable: true
    summary:
      description: |
        A human-readable description of the person.
      type: string
      nullable: true
    firstName:
      type: string
      nullable: true
    lastName:
      description: full last names of the person
      type: string
      nullable: true
      example: Diaz Lopez
    firstFamilyName:
      description: first family name in case of multiple family names. The element lastName includes all family names.
      type: string
      nullable: false
      example: Diaz
    secondFamilyName:
      description: second family name in case of multiple family names. The element lastName includes all family names.
      type: string
      nullable: false
      example: Lopez
    email:
      type: string
      deprecated: true
      nullable: true
    phoneNumber:
      description: |
        Preferably a mobile phone number, to be contacted in case changes to the booking occur, e.g.,
        in case of interruptions.
        Format according to E.164 The international public telecommunication numbering plan
      type: string
      deprecated: true
      nullable: true
    address:
      $ref: './ojp/_common.yml#/Address'
      nullable: true
      deprecated: true
      description: |
        Deprecated in favor of `postalAddress`
    postalAddress:
      $ref: '#/PostalAddress'
      nullable: true
      description: |
        Address of the physical person for issuing an invoice or receipt
    contact:
      $ref: '#/ContactDetail'
    taxId:
      type: string
      description: Tax identification of the physical person for issuing an invoice or receipt
      nullable: true
      example: CZ1234567890
Polygon:
  type: object
