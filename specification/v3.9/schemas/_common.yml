AccountingRef:
  description: |
    reference to accounting data in case the accounting is not provided by the API provider
  type: object
  required:
  - accountingCompany
  properties:
    accountingCompany:
      $ref: '#/CompanyRef'
    accountingIds:
      description: |
        ids of accounting data used to link the booking part with accounting data in the billing send by the accounting company
      type: array
      items:
        type: string
ApiNextVersion:
  type: object
  description: |
    Next version of the API.
    The next version is used to indicate the next version of the API that is being used.
    The version is in semantic versioning format, e.g. "4.0.0" and it is a version released at osdm.io.
  properties:
    version:
      type: string
      description: |
        Version of the next API.
      example: 4.0.0
    availableAt:
      type: string
      format: url
      example: https://api.next.example.com
    availableFrom:
      type: string
      format: date-time
      description: |
        Date from which the next version is available.
      example: '2025-01-01T00:00:00+01:00'
      nullable: true
ApiVersion:
  type: object
  description: |
    Version of the API.
    The version is used to indicate the version of the API that is being used.
    The version is in semantic versioning format, e.g. "3.0.0" and it is a version released at osdm.io.
  required:
  - version
  properties:
    version:
      type: string
      description: |
        Version of the API
      example: 3.0.0
    sunset:
      type: string
      format: date-time
      description: |
        Date after which the API version will no longer be available.
      nullable: true
      example: '2024-12-31T23:59:59+01:00'
    nextVersion:
      $ref: '#/ApiNextVersion'
      nullable: true
ApplicabilityType:
  type: string
  x-extensible-enum:
  - BOOKING
  - TRIP
  - OFFERPART
  - SEAT_SELECTION: (https://osdm.io/spec/processes/#SeatSelectionFees)
BackOfficeStatus:
  description: |
    Status of the request sent to the back office.
    Valid Values:
    - 'INITIATED'
    - 'EVALUATING'
    - 'DECIDED'
    - 'SETTLED'
    - 'INFORMATION_MISSING'
    - 'REQUEST_UPDATED': Additional information, i.e. documents have been provided which should trigger reevaluation.
  type: string
  enum:
  - INITIATED
  - EVALUATING
  - DECIDED
  - SETTLED
  - INFORMATION_MISSING
  - REQUEST_UPDATED
BankAccountReference:
  type: object
  additionalProperties: false
  description: |
    bank account
  properties:
    iban:
      description: |
        IBAN to be used in Europe
      type: string
      pattern: '[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}'
      nullable: true
    accountId:
      description: |
        bank account id to be used outside of EU
      type: string
      nullable: true
    bankIdCode:
      $ref: '#/BankIdCode'
    bankId:
      type: string
      nullable: true
    ownerName:
      type: string
      nullable: true
      example: John Doe
BankIdCode:
  type: string
  x-extensible-enum:
  - SWIFT
BarCodeType:
  description: |
    Item according to IRS 90918-9: FCB, TLB, SSB
    Values from the [Barcode Type Code List](https://osdm.io/spec/catalog-of-code-lists/#BarcodeType)
    Listed values here are examples.
  type: string
  x-extensible-enum:
  - FCB
  - TLB
  - SSB
  - DOSIPAS
Calendar:
  type: object
  additionalProperties: false
  properties:
    from:
      type: string
      format: date-time
      nullable: true
    until:
      type: string
      format: date-time
      nullable: true
    dates:
      description: |
        dates included in the calendar. In case no dates are provided the range is assumed to be valid. The date-time format is used to provide an offset to UTC per date.
      type: array
      items:
        type: string
        format: date-time
      nullable: true
    utcOffset:
      description: |
        offset to UTC in minutes (number of minutes to be added to get UTC dates)
      type: integer
      format: int32
      nullable: true
CardReference:
  type: object
  additionalProperties: false
  description: |
    Number and issuer are needed to identify a travel account, the code identifies a reduction card.
  required:
  - type
  properties:
    code:
      description: |
        Code of the card type according to issuer. E.g. BahnCard50.
        Predefined values from the [Reduction Card Code List](https://osdm.io/spec/catalog-of-code-lists/#ReductionCard)
      type: string
      nullable: true
    number:
      description: |
        Number identifying the travel account, need issuer to be unique.
      type: string
      nullable: true
    issuer:
      $ref: '#/CompanyRef'
    type:
      $ref: ./travel-account.yml#/TravelAccountType
    chipCardContentFormat:
      type: string
      x-extensible-enum:
      - CALYPSO-ABT
      - CALYPSO-CBT
    chipCardContent:
      description: |
        base64 encoded content of the chip card. This is in some scenarios needed to validate whether the new ticket will be compatible with the tickets already on the card.
      type: string
      format: byte
      maxLength: 4194304
      nullable: true
CardTypeReference:
  type: object
  additionalProperties: false
  required:
  - code
  properties:
    issuer:
      $ref: '#/CompanyRef'
    code:
      type: string
      nullable: false
    cardName:
      type: string
      nullable: true
CompanyRef:
  type: string
  description: "Identifies a company. For rail, a RICS company code or compatible ERA company code are used. \nE.g.: 'urn:uic:rics:1185:000011'\n"
  nullable: false
Condition:
  type: object
  additionalProperties: false
  description: |
    Describes sales, usage and after sales conditions applicable to the product.  See after sales conditions for individual after sales amounts. The language of the text is controlled by the accept-language header, i.e. supporting English is a must.
  required:
  - type
  - description
  properties:
    type:
      $ref: '#/ConditionType'
    description:
      description: |
        human readable documentation of the text.
      type: string
      minLength: 1
      nullable: false
    descriptionTranslations:
      description: Translations of the description and shortDescription
      type: array
      items:
        $ref: '#/Translation'
    shortDescription:
      description: |
        short description of the condition no longer than 64 characters
      type: string
      nullable: true
ConditionType:
  type: string
  x-extensible-enum:
  - PRE_SALE
  - SALE
  - TRAVEL
  - PLACE_CHANGE
  - FULFILLMENT
  - EXCHANGE
  - REFUND
ContactDetail:
  type: object
  additionalProperties: false
  description: |
    Contact information needed to contact a person. Either an email or a phone number needs to be provided. Note: address and postalAddress are deprecated
  properties:
    summary:
      description: |
        A human-readable description of the contact.
      type: string
      nullable: true
    preferredLanguage:
      description: |
        ISO-639-1 language code
      type: string
      nullable: true
    email:
      type: string
      nullable: true
    phoneNumber:
      description: |
        Preferably a mobile phone number, to be contacted in case changes to the booking occur, e.g., in case of delays or interruptions.
        Format according to E.164 The international public telecommunication numbering plan
      type: string
      nullable: true
    address:
      type: string
      nullable: true
      deprecated: true
    postalAddress:
      $ref: '#/PostalAddress'
      nullable: true
      deprecated: true
ContextType:
  type: string
  enum:
  - OFFER
  - BOOKING
CorporateCode:
  type: object
  additionalProperties: false
  description: |
    The corporate code is a token that reduces the price of an offer or enables  offers that are not available without it. Needs with a commercial agreement between parties.
  required:
  - code
  - issuer
  properties:
    code:
      description: |
        The corporate code issued by the referenced company.
      type: string
      nullable: false
      example: 123-232
    beneficiary:
      description: |
        The name of the party that benefits from the corporate code, intended to be presented to the end user.
      type: string
      nullable: true
      example: Siemens
    issuer:
      $ref: '#/CompanyRef'
CountryCode:
  type: string
  description: |
    ISO 3166-1 alpha-2 2 character country code
  nullable: false
  example: DE
Currency:
  type: string
  description: |
    ISO 4217 currency codes
  nullable: false
  example: CHF
CurrencyAmount:
  type: object
  description: amount in a currency used when not VAT can be provided
  additionalProperties: false
  required:
  - currency
  - amount
  properties:
    currency:
      $ref: '#/Currency'
    amount:
      description: |
        amount in cents
      type: integer
      format: int32
    scale:
      description: |
        scale of the amount - the number of positions after the comma
      type: integer
      nullable: true
      format: int32
      default: 2
CurrencyConversion:
  description: |
    details on a currency conversion applied
  required:
  - originalCurrency
  - originalAmount
  properties:
    description:
      description: |
        description of the conversion, e.g. rate, rounding rules, reference to rules
      type: string
    originalCurrency:
      $ref: '#/Currency'
    originalAmount:
      description: |
        amount in cents
      type: integer
      format: int32
      nullable: false
    scale:
      description: |
        scale of the amount - the number of positions after the comma
      type: integer
      format: int32
      nullable: true
      default: 2
    appliedRate:
      type: number
    originalVats:
      type: array
      items:
        $ref: '#/VAT'
DateRange:
  type: object
  additionalProperties: false
  properties:
    startTime:
      type: string
      format: date-time
      nullable: true
    endDate:
      type: string
      format: date-time
      nullable: true
DistributionMode:
  description: "booking parts in product mode are provided as complete products where the tickets and \nconditions are prepared\
    \ by the OSDM provider. Booking parts in fare mode need to be assembled \ninto tickets on the OSDM client side. In fare\
    \ mode the conditions are defined on the client \nside the restrictions on conditions and combinability laid down in the\
    \ booking part (fare). \nBy definition admissions and ancillaries are in PRODUCT_MODE and fares are in _MODE. Reservation\
    \ \nmight be in PRODUCT_MODE or in FARE_MODE. Offers in FARE_MODE must not be provided unless they are\nrequested in the\
    \ offer part type list.\n"
  type: string
  enum:
  - PRODUCT_MODE
  - FARE_MODE
  default: PRODUCT_MODE
Event:
  type: object
  additionalProperties: false
  description: |
    Record of an action that occurred in the life cycle of the booking.
  required:
  - id
  - timestamp
  - type
  - details
  properties:
    id:
      description: |
        id of the event
      type: string
      nullable: false
    timestamp:
      description: |
        timestamp of the event
      type: string
      format: date-time
      nullable: false
    type:
      $ref: '#/EventType'
    details:
      $ref: '#/EventDetail'
EventDetail:
  type: object
  additionalProperties: false
  required:
  - summary
  - requestor
  - change
  - resource
  properties:
    summary:
      description: |
        human readable description of the event
      type: string
      nullable: false
    requestor:
      description: |
        Contains detailed information about who is calling the API. It can include information such as channel, organization, sales unit or workstation id and be used to configure e.g. the fare range provided to the caller. The content of the string is part of a bilateral contract by the two parties and not standardized by OSDM. It is recommend to encrypt the information transferred.
      type: string
      nullable: false
    change:
      $ref: '#/HistoryStatus'
    resource:
      $ref: '#/Resource'
EventType:
  type: string
  enum:
  - BOOKING_REAL_TIME_EVENT_OCCURRED
  - BOOKING_REACCOMMODATED
  - BOOKING_TRIP_CHANGED
  - BOOKING_TRIP_CONFIRMED
  - FULFILLMENT_AVAILABLE
  - DOCUMENT_AVAILABLE
  - FULFILLMENT_REFUNDED
  - FULFILLMENT_EXCHANGED
  - FULFILLMENT_CONTROLLED
  - ACCOMMODATION_RELEASED
  - PURCHASER_CHANGED
  - PASSENGER_CHANGED
  - REFUND_INITIATED
  - EXCHANGE_INITIATED
ExcludedTimeRange:
  type: object
  additionalProperties: false
  description: |
    time ranges excluded from the validity (e.g. off peak fulfillments)
  required:
  - from
  - until
  - scope
  properties:
    from:
      description: |
        minutes of the day in the time zone of travel
      type: integer
      format: int32
      nullable: false
    until:
      description: |
        minutes of the day in the time zone of travel
      type: integer
      format: int32
      nullable: false
    scope:
      $ref: ./fare.yml#/ExclusionScope
Fee:
  type: object
  additionalProperties: false
  description: |
    Fees are used to represent additional costs for services or products. In contrast to other offer parts in OSDM, the customer is not free whether to choose a fee or not: fees are generated and applied to other services or products by the providing system.
  required:
  - id
  - price
  properties:
    id:
      type: string
      maxLength: 32768
      nullable: false
    summary:
      description: |
        A human-readable description of the fee.
      type: string
      nullable: true
    price:
      $ref: '#/Price'
    applicability:
      $ref: '#/ApplicabilityType'
    transactionContext:
      $ref: '#/TransactionContextType'
    isProviderFee:
      description: |
        The after sales fees are attributed to the provider. In some business models used with fares the fees are attributed to the distributor.
      type: boolean
      default: true
    status:
      $ref: '#/FeeStatus'
    distributorBookingRef:
      description: |
        reference to the booking in the downstream distributor system
      type: string
      nullable: true
    refundable:
      $ref: ./aftersales.yml#/RefundType
    conditions:
      description: |
        Structured description of the sales or after-sales conditions.
      type: array
      items:
        $ref: '#/Condition'
    productCode:
      description: |
        The product code expressed in the provider system (could be a
        mapping from an even lower-level provider).
      type: string
      nullable: true
      deprecated: true
    productRef:
      type: string
      description: |
        Reference to the Product representing the Fee
    accountingRef:
      $ref: '#/AccountingRef'
FeeStatus:
  type: string
  enum:
  - PREBOOKED
  - CONFIRMED
  - REFUNDED
Gender:
  description: |
    The gender of the passenger, which is important in the case of night trains.
    Values from the [Gender Code List](https://osdm.io/spec/catalog-of-code-lists/#Gender)
  type: string
  nullable: true
  enum:
  - MALE
  - FEMALE
  - X
GeneralAttribute:
  type: object
  additionalProperties: false
  required:
  - text
  properties:
    text:
      type: string
      nullable: false
    textTranslations:
      description: Translation of the text attribute
      type: array
      items:
        $ref: '#/Translation'
    code:
      type: string
      nullable: true
    url:
      type: string
      nullable: true
HistoryStatus:
  type: string
  enum:
  - PREBOOKED
  - ON_HOLD
  - CONFIRMED
  - FULFILLED
  - CANCELLED
  - RELEASED
  - REFUNDED
  - EXCHANGED
  - EXCHANGE_ONGOING
  - ERROR
  - AVAILABLE
  - CHECKED_IN
IdentificationCard:
  type: object
  additionalProperties: false
  description: |
    Person identification information  to be exchanged for border control if legally required.

    It is not allowed to send personal information not required in the offer reply.
    It is legally not allowed to send these personal data already in the offer request.
  required:
  - id
  - type
  properties:
    id:
      description: |
        Identifier on the document.
      type: string
      nullable: false
    type:
      description: |
        Refer to code list for values
      type: string
      nullable: false
    name:
      description: |
        ICAO transliteration identical as written in the document
      type: string
      nullable: true
    nationality:
      description: |
        ISO 3166-1 alpha-2 2 character country code
      type: string
      nullable: true
    birthCity:
      type: string
      nullable: true
    issuingCity:
      description: |
        place where the document is issued
      type: string
      nullable: true
    residenceCity:
      type: string
      nullable: true
    birthCountryCode:
      $ref: '#/CountryCode'
    issuingCountryCode:
      $ref: '#/CountryCode'
    residenceCountryCode:
      $ref: '#/CountryCode'
    issuingDate:
      type: string
      format: date-time
      nullable: true
    gender:
      $ref: '#/Gender'
    expirationDate:
      type: string
      format: date
      nullable: true
Latitude:
  type: number
  format: double
  description: |
    Latitude from equator. -90 (South) to +90 (North). Decimal degrees. e.g. 56.356.
  minimum: -90
  maximum: 90
  nullable: false
  example: 47.37818
LegacyAccountingIdentifier:
  type: object
  additionalProperties: false
  description: |
    identifier of the fare in the current 301 accounting file
  required:
  - serialId
  properties:
    serialId:
      description: |
        sequential number of regional validities
      type: integer
      format: int32
      minimum: 0
      maximum: 99999
      nullable: false
    addId:
      description: |
        Sequential number of regional validities (leading positions in case the series
        is too short).
      type: integer
      format: int32
      minimum: 0
      maximum: 99
      nullable: true
    tariffId:
      description: |
        Tariff id for the old series format.
      type: integer
      format: int32
      minimum: 0
      maximum: 9999
      nullable: true
LegacyReservationParameter:
  type: object
  additionalProperties: false
  description: |
    reservation parameter to support the UIC 90918-1 interface for booking
  required:
  - travelClass
  - serviceLevelCode
  - serviceCode
  properties:
    travelClass:
      description: |
        90918-1 class code in reservation
      type: string
      nullable: false
    serviceLevelCode:
      description: |
        service level code defined in UIC 90918-1
      type: string
      nullable: false
    serviceCode:
      description: |
        service code to be used in reservation
      type: string
      nullable: false
    berthType:
      description: |
        berth type code in UIC 90918-1 to be used in reservation
      type: string
      nullable: true
    coachTypeCode:
      description: |
        coach type code in UIC 90918-1 to be used in reservation
      type: string
      nullable: true
    compartmentTypeCode:
      description: |
        compartment type code in UIC 90918-1 to be used in reservation
      type: string
      nullable: true
    tariffs:
      description: |
        tariff according to UIC 90918-1 to be used for booking
      type: array
      items:
        $ref: '#/LegacyReservationTariff'
LegacyReservationTariff:
  type: object
  additionalProperties: false
  description: |
    Legacy tariff code and number of items or persons in case UIC 90918-1 is used for booking.
  properties:
    number:
      description: |
        number of items with this tariff code
      type: integer
      format: int32
      nullable: true
    code:
      description: |
        legacy tariff code
      type: integer
      format: int32
      nullable: true
LegAttribute:
  type: object
  additionalProperties: false
  description: |
    Attributes that are not valid on the whole service, but only on section of a trip made on a single mode without interchange between boarding and alighting.
  required:
  - text
  properties:
    text:
      description: |
        Text of the attribute to be shown to the user.
      type: string
      nullable: false
    code:
      description: |
        Internal code of the attribute. Can be used for detection of double occurrences. Refers to Service Facilities / Leg Attributes from the Catalog of Code Lists
      type: string
      nullable: true
    fromStopSeqNumber:
      description: |
        The attribute is valid from the stop point with this sequence number within the leg. If missing it is valid from the beginning of the leg.
      type: integer
      format: int32
      minimum: 0
      nullable: true
    toStopSeqNumber:
      description: |
        The attribute is valid to the stop point (inclusively) with this sequence number within the leg. If missing it is valid to the end of the leg.
      type: integer
      format: int32
      minimum: 0
      nullable: true
Line:
  type: object
  additionalProperties: false
  description: |
    terminalStation - in case the product requires a destination within the zone (e.g. local ticket
    to go to the main rail station).
    entryStation - Station to enter the zone in case the product requires to enter the zone via a
    specific station (e.g. local zone ticket to start from the main rail station).
  required:
  - carrier
  properties:
    binaryLineId:
      description: |
        Id to support local traffic standards (e.g. VDV,...).
      type: string
      format: byte
      nullable: true
    carrier:
      $ref: '#/CompanyRef'
    city:
      type: integer
      format: int32
      nullable: true
    entryStation:
      $ref: ./ojp/trip.yml#/StopPlace
    lineIds:
      type: array
      items:
        type: string
      nullable: true
    terminalStation:
      $ref: ./ojp/trip.yml#/StopPlace
    nutsCode:
      description: |
        Nomenclature des units territoriales statistiques
         COMMISSION REGULATION (EU) No 31/2011
      type: string
      nullable: true
LineNumber:
  type: string
  description: |
    Especially on regional traffic, a vehicle is defined by a line number.
    E.g. the line numbers of 'S 52' or 'B 19'.
  nullable: true
  example: 52, 19
Links:
  type: array
  description: "A collection of hypermedia links associated with this resource.\nThese links facilitate navigation and discovery\
    \ of related resources, \nfollowing HATEOAS principles.\n"
  items:
    type: object
    additionalProperties: false
    description: |
      The underlying system may provide links for pagination of links pointing on
      further information (such as HTML download links, web sites or extended APIs).
      Mechanism to add flexible extensions specific to an underlying system. Implemented
      the JSON-HAL specification.
    required:
    - rel
    - href
    properties:
      rel:
        description: |
          the 'rel' field in HATEOAS navigation.
        type: string
        nullable: false
        example: self
      href:
        description: "Allows to provide a value to the link, for example id of the targeted \nresource or displayable representation\
          \ for the link.\n"
        type: string
        maxLength: 32768
        format: uri
        nullable: false
      type:
        description: |
          Hint to indicate the media type expected when dereferencing the target resource.
        type: string
        nullable: true
        example: application/json
      value:
        description: "Allows to provide a value to the link, for example id of the targeted \nresource or displayable representation\
          \ for the link.\n"
        type: string
        maxLength: 32768
        nullable: true
Longitude:
  type: number
  format: double
  description: |
    Longitude from Greenwich Meridian. -180 (West) to +180 (East). Decimal degrees. eg 2.356.
  minimum: -180
  maximum: 180
  nullable: false
  example: 8.54021
NamedCompany:
  type: object
  additionalProperties: false
  description: |
    Provides the reference and name of a company.
  required:
  - ref
  properties:
    ref:
      $ref: '#/CompanyRef'
    name:
      description: |
        Textual representation of the carrier to be displayed unless the application is able to indicate the name by the carrier references.
      type: string
      nullable: true
      example: RhB
OfferOverviewRoute:
  type: object
  properties:
    price:
      $ref: '#/Price'
    travelClass:
      $ref: '#/TravelClass'
    flexibility:
      $ref: ./offer.yml#/Flexibility
    startDateTime:
      type: string
      format: date-time
      nullable: false
    routeSpecification:
      $ref: ./trip.yml#/RouteSpecification
OfferOverviewTrip:
  type: object
  required:
  - price
  - tripIds
  properties:
    price:
      $ref: '#/Price'
    tripIds:
      type: array
      items:
        type: string
    travelClass:
      $ref: '#/TravelClass'
    flexibility:
      $ref: ./offer.yml#/Flexibility
OverruleCode:
  description: "Reason for and type of an after sale, code list in IRS 90918-10.\nThe PRM_SUPPORT_UNAVAILABLE overrule code\
    \ shall only be used by the UIC PRM ABT tool.\nValues from the [Overrule Codes Code List](https://osdm.io/spec/catalog-of-code-lists/#OverruleCode)\n\
    Listed values here are examples.   \n- 'CONNECTION_BROKEN'\n- 'DEATH'\n- 'EQUIPMENT_FAILURE'\n- 'PAYMENT_FAILURE'\n- 'PRM_SUPPORT_UNAVAILABLE'\n\
    - 'SALES_STAFF_ERROR'\n- 'STOP_NOT_SERVED'\n- 'STRIKE'\n- 'TECHNICAL_FAILURE'\n- 'TICKET_NOT_USED'\n- 'INABILITY_TO_TRAVEL':\
    \ Inability to travel due to accident or sickness.\n- 'EXTERNAL_COMPENSATION': Offer has been compensated outside of the\
    \ provider system in another way.\n- 'DISRUPTION': Inability to operate due to disruption.\n- 'JOURNEY_OBSOLETE': Due\
    \ to external factors it's senseless to start the trip, thus the travel is obsolete.\n- 'CERTIFIED_MEDICAL_CONDITION':\
    \ A medical certificate certifies that the passenger is unable to travel.\n- 'DELAY_COMPENSATION': Allows to override\
    \ conditions in context of passenger rights regulation (PRR).\n"
  type: string
  x-extensible-enum:
  - CONNECTION_BROKEN
  - DEATH
  - EQUIPMENT_FAILURE
  - PAYMENT_FAILURE
  - PRM_SUPPORT_UNAVAILABLE
  - SALES_STAFF_ERROR
  - STOP_NOT_SERVED
  - STRIKE
  - TECHNICAL_FAILURE
  - TICKET_NOT_USED
  - INABILITY_TO_TRAVEL
  - EXTERNAL_COMPENSATION
  - DISRUPTION
  - JOURNEY_OBSOLETE
  - CERTIFIED_MEDICAL_CONDITION
  - DELAY_COMPENSATION
PaymentMethod:
