VAT:
  description: |
    The VAT structure details a VAT amount (in case of international travel, there may be multiple VAT structures).
    The netAmount is the amount before adding the VAT; the grossAmount is the amount including VAT, where
    the amount is the actual VAT being described here. So the equation netAmount + amount = grossAmount holds.
    Furthermore, the equation netAmount * percentage = amount also holds, but is susceptible to possible rounding
    errors.
    All the grossAmounts of the VAT structures should add up to the overall amount of the enclosing price structure.
    The currency is inherited from the currency of the associated price.
  type: object
  additionalProperties: false
  required:
  - countryCode
  - amount
  properties:
    countryCode:
      $ref: '#/CountryCode'
    amount:
      description: |
        VAT amount in cents
      type: integer
      format: int32
      nullable: false
      example: 5
    scale:
      description: |
        scale of the amount - the number of positions after the comma
      type: integer
      format: int32
      nullable: true
      default: 2
    netAmount:
      description: |
        amount before adding VAT
      type: integer
      format: int32
      nullable: false
      example: 5
    netAmountScale:
      description: |
        scale of the netAmount - the number of positions after the comma
      type: integer
      format: int32
      nullable: true
      default: 2
    grossAmount:
      description: |
        total amount after adding VAT in cents
      type: integer
      format: int32
      nullable: false
      example: 5
    grossAmountScale:
      description: |
        scale of the grossAmount - the number of positions after the comma
      type: integer
      format: int32
      nullable: true
      default: 2
    percentage:
      type: number
      format: float
      nullable: true
    taxId:
      type: string
      nullable: true
    vatOnInvoice:
      type: boolean
      nullable: true
      default: false
    taxIdOnInvoice:
      type: boolean
      nullable: true
      default: false
    scope:
      $ref: '#/VatScope'
VatScope:
  description: |
    scope where the VAT applies.
    Values from the [Tax Scope Code List](https://osdm.io/spec/catalog-of-code-lists/#VatScope)
    Listed values here are examples.
  type: string
  x-extensible-enum:
  - INTERNATIONAL
  - NATIONAL
  - SHORT_DISTANCE
  - LONG_DISTANCE
  - NOT_REGISTERED
VoucherInformation:
  type: object
  additionalProperties: false
  required:
  - issuer
  - code
  properties:
    issuer:
      $ref: '#/CompanyRef'
    code:
      description: |
        voucher code provided by the issuer
      type: string
      nullable: false
Warning:
  type: object
  additionalProperties: false
  deprecated: true
  description: |
    This element can be used to pass non-blocking information or events,
    such as a price difference with the initially offered price at booking time.
    It is inspired on the JSon problem structure.

    This structure has been deprecated and is replaced by the Problem structure.
  required:
  - code
  properties:
    code:
      type: string
      nullable: false
    type:
      description: |
        An absolute URI that identifies the warning type. When dereferenced,
        it SHOULD provide human-readable documentation for the problem type
        (e.g., using HTML).
      type: string
      format: uri
      nullable: true
      default: about:blank
      example: https://example.com/warns/price-updated
    detail:
      description: |
        A human readable explanation specific to this occurrence of the
        warning.
      type: string
      nullable: true
      example: The price of the given offer part has been updated during the booking operation
    instance:
      description: |
        An absolute URI that identifies the specific occurrence of the warning.
      type: string
      format: uri
      nullable: true
      example: offers/offer1234
WarningCollection:
  type: object
  additionalProperties: false
  deprecated: true
  description: |
    List of warnings. This structure has been deprecated and replaced by the problems array.
  required:
  - warnings
  properties:
    warnings:
      type: array
      items:
        $ref: '#/Warning'
      minItems: 1

