Alight:
  type: object
  additionalProperties: false
  description: |
    Describes the situation at a stop or station at which the passenger alights from a Leg
    of a trip including time-related information. Provided by OJP.
  required:
  - stopPlaceRef
  - stopPlaceName
  - serviceArrival
  properties:
    stopPlaceRef:
      $ref: '#/StopPlaceRef'
    stopPlaceName:
      type: string
      nullable: false
      example: Luzern
    plannedStopPointName:
      description: |
        Name of the bay/quay/terminal where to board/alight from the vehicle. According to
        planned timetable.
      type: string
      nullable: true
      example: 3
    estimatedStopPointName:
      description: |
        Name of the bay/quay/terminal where to board the vehicle. As to the latest realtime status.
      type: string
      nullable: true
      example: 8
    serviceArrival:
      $ref: ../_common.yml#/ServiceTime
    status:
      $ref: '#/StopCallStatus'
BaseTripPolicyFilter:
  type: object
  additionalProperties: false
  description: |
    Policies that control the trip search behavior for both public and individual transport.
    Provided by OJP.
  properties:
    noSingleStep:
      description: |
        The user is not able to climb one step, i.e. wheel chair.
      type: boolean
      nullable: true
      default: false
    noSight:
      description: |
        The user is not able to see.
      type: boolean
      nullable: true
      default: false
Board:
  type: object
  additionalProperties: false
  description: |
    Describes the the situation at a stop or station at which the passenger boards a Leg
    of a trip including time-related information. Provided by OJP.
  required:
  - stopPlaceRef
  - stopPlaceName
  - serviceDeparture
  properties:
    stopPlaceRef:
      $ref: '#/StopPlaceRef'
    stopPlaceName:
      type: string
      nullable: false
      example: Luzern
    plannedStopPointName:
      description: |
        Name of the bay/quay/terminal where to board/alight from the vehicle. According to
        planned timetable.
      type: string
      nullable: true
      example: 3
    estimatedStopPointName:
      description: |
        Name of the bay/quay/terminal where to board the vehicle. As to the latest realtime status.
      type: string
      nullable: true
      example: 8
    serviceDeparture:
      $ref: ../_common.yml#/ServiceTime
    status:
      $ref: '#/StopCallStatus'
ContinuousLeg:
  type: object
  additionalProperties: false
  description: |
    A leg of a journey that is not bound to a timetable. Provided by OJP.
  required:
  - start
  - end
  - service
  properties:
    start:
      $ref: ./place.yml#/Place
    end:
      $ref: ./place.yml#/Place
    service:
      $ref: ./continuous-service.yml#/ContinuousService
    timeWindowStart:
      description: |
        Time at which window begins.
      type: string
      format: date-time
      nullable: true
    timeWindowEnd:
      description: |
        Time at which window ends.
      type: string
      format: date-time
      nullable: true
    duration:
      description: |
        Duration of this leg according to user preferences like walk speed.
      type: string
      format: duration
      nullable: true
      example: PT10M
    situationFullRefs:
      type: array
      items:
        $ref: ./_common.yml#/SituationFullRef
    co2Emission:
      $ref: ../_common.yml#/Quantity
DatedJourney:
  type: object
  additionalProperties: false
  description: |
    Vehicle journey that runs at a specific date. Provided by OJP.
  required:
  - vehicleNumbers
  - carriers
  properties:
    operatingDayRef:
      $ref: '#/OperationDayRef'
    mode:
      $ref: ./_common.yml#/Mode
    productCategory:
      $ref: ./product.yml#/ProductCategory
    publishedServiceName:
      description: |
        Line name or service description as known to the public, f.e. '512', 'S8'
        or 'Circle Line' or 'ICE 488'.
      type: string
      nullable: true
      example: S1
    vehicleNumbers:
      type: array
      items:
        $ref: ../transportable.yml#/VehicleNumber
      minItems: 1
    lineNumbers:
      type: array
      items:
        $ref: ../_common.yml#/LineNumber
    serviceStatus:
      $ref: ./_common.yml#/ServiceStatus
    situationFullRefs:
      type: array
      items:
        $ref: ./_common.yml#/SituationFullRef
    carriers:
      type: array
      items:
        $ref: ../_common.yml#/NamedCompany
      minItems: 1
    attributes:
      type: array
      items:
        $ref: ../_common.yml#/GeneralAttribute
Intermediate:
  type: object
  additionalProperties: false
  description: |
    Describes the situation at a stop or station that lies between the Board and
    Alight stop or station including time-related information. Provided by OJP.
  required:
  - stopPlaceRef
  - stopPlaceName
  - serviceArrival
  - serviceDeparture
  properties:
    stopPlaceRef:
      $ref: '#/StopPlaceRef'
    stopPlaceName:
      type: string
      nullable: false
      example: Luzern
    plannedStopPointName:
      description: |
        Name of the bay/quay/terminal where to board/alight from the vehicle. According to
        planned timetable.
      type: string
      nullable: true
      example: 3
    estimatedStopPointName:
      description: |
        Name of the bay/quay/terminal where to board the vehicle. As to the latest realtime status.
      type: string
      nullable: true
      example: 8
    serviceArrival:
      $ref: ../_common.yml#/ServiceTime
    serviceDeparture:
      $ref: ../_common.yml#/ServiceTime
    status:
      $ref: '#/StopCallStatus'
JourneyRef:
  type: string
  description: |
    Reference to a journey. Provided by OJP.
  nullable: true
  example: ServiceJourney:1
NotVia:
  type: object
  additionalProperties: false
  description: |
    Not-via restrictions for a trip, i.e. scheduled stop points or stop places that the trip is not allowed to pass through.  Provided by OJP.
  properties:
    notViaPlace:
      type: array
      items:
        $ref: ./place.yml#/PlaceRef
OperatingDays:
  type: object
  additionalProperties: false
  description: |
    Day of public transport operation of which the characteristics are defined in a specific
    service calendar and which may last more than 24 hours. Provided by OJP.
  required:
  - from
  - until
  - pattern
  properties:
    from:
      description: |
        Start date of period
      type: string
      format: date-time
      nullable: false
    until:
      description: |
        End date of period
      type: string
      format: date-time
      nullable: false
    pattern:
      description: |
        Bit pattern for operating days between start date and end date.
        The length of the pattern is equal to the number of days from
        start date to end date. A bit value of '1' indicates that an event
        actually happens on the day that is represented by the bit position.
      type: string
      nullable: false
OperationDayRef:
  type: string
  description: |
    Reference to an operating day. Provided by OJP.
  nullable: true
  example: OperatingDay:12345
StopCallStatus:
  type: object
  additionalProperties: false
  description: |
    Status properties for the vehicle call at this stop. Provided by OJP.
  properties:
    order:
      description: |
        Sequence number of this stop in the service pattern of the journey.
      type: integer
      format: int32
      minimum: 0
      nullable: true
    requestStop:
      description: |
        The vehicle journey calls at this stop only on demand.
      type: boolean
      nullable: true
      default: false
    unplannedStop:
      description: |
        This stop has not been planned by the planning department.
      type: boolean
      nullable: true
      default: false
    notServicedStop:
      description: |
        The vehicle will not call at this stop despite earlier planning.
      type: boolean
      nullable: true
      default: false
    noBoardingAtStop:
      description: |
        Boarding will not be allowed at this stop of this journey.
      type: boolean
      nullable: true
      default: false
    noAlightingAtStop:
      description: |
        Alighting will not be allowed at this stop of this journey.
      type: boolean
      nullable: true
      default: false
    isBorderPoint:
      description: |
        Indicates whether the stop is recognized by the system as a border point between two or more countries.
      type: boolean
      nullable: true
      default: false
StopPlace:
  description: |
    A place extended by accessibility limitation properties and some attributes of the associated equipment,
    comprising one or more places where vehicles may stop and where passengers may board or leave vehicles
    or prepare their trip, and which will usually have one or more wellknown names. Provided by OJP.
  allOf:
  - $ref: ./place.yml#/Place
  - type: object
    additionalProperties: false
    required:
    - name
    properties:
      name:
        description: |
          Name of this stop place for use in passenger information.
        type: string
        nullable: false
        example: Zürich HB
      nameTranslations:
        description: Translations for the name
        type: array
        items:
          $ref: ../_common.yml#/Translation
StopPlaceRef:
  description: |
    Reference to a Stop Place using URNs to define code.
    For UIC see UIC MERITS/TAP-TSI station codes. Provided by OJP.
  allOf:
  - $ref: ./place.yml#/PlaceRef
  - type: object
    additionalProperties: false
    required:
    - stopPlaceRef
    properties:
      stopPlaceRef:
        type: string
        nullable: false
        example: urn:uic:stn:8503000
TimedLeg:
  type: object
  additionalProperties: false
  description: |
    A leg which is bound to a timetabled schedule. Corresponds to a ride. Provided by OJP.
  required:
  - start
  - end
  - service
  properties:
    start:
      $ref: '#/Board'
    intermediates:
      type: array
      items:
        $ref: '#/Intermediate'
    end:
      $ref: '#/Alight'
    service:
      $ref: '#/DatedJourney'
    operatingDays:
      $ref: '#/OperatingDays'
    operatingDaysDescription:
      description: |
        Textual description of the operation days, e.g. 'Monday to Friday' or 'not on holidays'.
      type: string
      nullable: true
    duration:
      type: string
      format: duration
      nullable: true
    co2Emission:
      $ref: ../_common.yml#/Quantity
    attributes:
      type: array
      items:
        $ref: ../_common.yml#/LegAttribute
TransferLeg:
  type: object
  additionalProperties: false
  description: |
    A leg which links other legs of a trip where a transfer between different places is required.
    Provided by OJP.
  required:
  - start
  - end
  properties:
    continuousMode:
      $ref: ./continuous-service.yml#/ContinuousMode
    transferMode:
      $ref: ./_common.yml#/TransferMode
    start:
      $ref: ./place.yml#/PlaceRef
    end:
      $ref: ./place.yml#/PlaceRef
    timeWindowStart:
      description: |
        Time at which window begins.
      type: string
      format: date-time
      nullable: true
    timeWindowEnd:
      description: |
        Time at which window ends.
      type: string
      format: date-time
      nullable: true
    duration:
      description: |
        Overall duration of this interchange.
      type: string
      format: duration
      nullable: true
      example: PT20M
    situationFullRefs:
      type: array
      items:
        $ref: ./_common.yml#/SituationFullRef
    co2Emission:
      $ref: ../_common.yml#/Quantity
Trip:
  type: object
  additionalProperties: false
  description: |
    A complete trip from origin to destination. Provided by OJP.
  required:
  - id
  - duration
  - startTime
  - endTime
  - transfers
  - legs
  properties:
    id:
      description: |
        Id of this trip for referencing purposes. Unique within a trip list.
      type: string
      maxLength: 32768
      nullable: false
    externalRef:
      description: |
        External reference of this trip for referencing purposes.
      type: string
      nullable: true
    summary:
      description: |
        A human-readable description of the trip.
      type: string
      nullable: true
    duration:
      description: |
        Overall duration of the trip
      type: string
      format: duration
      nullable: false
      example: PT20M
    direction:
      $ref: '../trip.yml#/TripDirectionType'
    origin:
      $ref: ./place.yml#/PlaceRef
    originName:
      description: Name of the origin place
      type: string
      nullable: true
    destination:
      $ref: ./place.yml#/PlaceRef
    destinationName:
      description: Name of the destination place
      type: string
      nullable: true
    startTime:
      description: |
        Departure time at origin.
      type: string
      format: date-time
      nullable: false
    endTime:
      description: |
        Arrival time at destination
      type: string
      format: date-time
      nullable: false
    transfers:
      description: |
        Number of interchanges
      type: integer
      format: int32
      minimum: 0
      nullable: false
    distance:
      description: |
        Distance in meters over the the complete trip, i.e., including transfer legs.
      type: integer
      format: int32
      minimum: 0
      nullable: true
    legs:
      description: |
        Legs ot the trip
      type: array
      items:
        $ref: '#/TripLeg'
      minItems: 1
    operatingDays:
      $ref: '#/OperatingDays'
    operatingDaysDescription:
      description: |
        Textual description of the operation days, e.g. 'Monday to Friday' or 'Not on holidays'.
      type: string
      nullable: true
    situationFullRefs:
      type: array
      items:
        $ref: ./_common.yml#/SituationFullRef
    tripStatus:
      $ref: '../trip.yml#/TripStatus'
    _links:
      $ref: ../_common.yml#/Links
TripChangeCriteria:
  type: object
  additionalProperties: false
  description: |
    Trip change request structure. Provided by OJP.
  properties:
    TripResult:
      $ref: '../trip.yml#/TripResult'
TripCollectionResponse:
  type: object
  additionalProperties: false
  description: |
    Trip response structure. Provided by OJP.
  required:
  - id
  properties:
    warning:
      deprecated: true
      $ref: ../_common.yml#/WarningCollection
    problems:
      type: array
      items:
        $ref: ../_common.yml#/Problem
    id:
      type: string
      nullable: false
    trips:
      type: array
      items:
        $ref: '#/Trip'
    tripSummaries:
      type: array
      items:
        $ref: '#/TripSummary'
    _links:
      $ref: ../_common.yml#/Links
TripDataFilter:
  type: object
  additionalProperties: false
  description: |
    Data to be included/excluded from search, f.e. modes, carriers. Provided by OJP.
  properties:
    ptModeFilter:
      $ref: ./_common.yml#/ModeFilter
    carrierFilter:
      $ref: ./_common.yml#/CarrierFilter
    serviceBrandFilter:
      $ref: ./_common.yml#/ServiceBrandFilter
    vehicleFilter:
      $ref: ../transportable.yml#/VehicleFilter
TripLeg:
  type: object
  additionalProperties: false
  description: |
    A single stage of a trip that is made without change of MODE or service (ie:
    between each interchange). Provided by OJP.
  required:
  - id
  properties:
    id:
      description: |
        Id of this trip leg. Unique within trip result. A seqId is a leg id.
      type: string
      nullable: false
    externalRef:
      description: |
        External reference of this tripLeg for referencing purposes.
      type: string
      nullable: true
    timedLeg:
      $ref: '#/TimedLeg'
    transferLeg:
      $ref: '#/TransferLeg'
    continuousLeg:
      $ref: '#/ContinuousLeg'
TripMobilityFilter:
  type: object
  additionalProperties: false
  description: |
    Base mobility options to be applied for both public and individual transport.
    Provided by OJP.
  properties:
    bikeTransport:
      description: |
        The user wants to carry a bike on public transport.
      type: boolean
      nullable: true
      default: false
    walkSpeed:
      description: |
        Deviation from average walk speed in percent. 100% percent is average speed.
      type: integer
      format: int32
      nullable: true
      default: 100
    additionalTransferTime:
      description: |
        Additional time added to all transfers (also to transfers between individual to
        public transport).
      type: string
      format: duration
      nullable: true
      example: 0S
    minimalTransferTime:
      type: string
      format: duration
      nullable: true
TripParameters:
  type: object
  additionalProperties: false
  description: |
    Options to control the search behavior and response contents.
    number of results > either number of results or number of results before and after are used.
    Provided by OJP.
  properties:
    dataFilter:
      $ref: '#/TripDataFilter'
    policyFilter:
      $ref: '#/BaseTripPolicyFilter'
    mobilityFilter:
      $ref: '#/TripMobilityFilter'
    numberOfResults:
      type: integer
      format: int32
      nullable: true
      default: 5
      deprecated: true
      description: |
        Deprecated in 3.7.0 as it is getting removed in OJP to avoid inconsistency.
    numberOfResultsBefore:
      type: integer
      format: int32
      nullable: true
      default: 0
    numberOfResultsAfter:
      type: integer
      format: int32
      nullable: true
      default: 5
    ignoreRealtimeData:
      type: boolean
      nullable: true
      default: false
    transferLimit:
      description: |
        The maximum number of interchanges the user will accept per trip.
      type: integer
      format: int32
      minimum: 0
      nullable: true
    itModesToCover:
      $ref: ./_common.yml#/IndividualMode
TripSearchCriteria:
  type: object
  additionalProperties: false
  description: |
    Trip request structure. Provided by OJP.
  required:
  - origin
  - destination
  properties:
    departureTime:
      description: |
        Needs to be in local date time format of the stop. Exactly one of `departureTime` or `arrivalTime` must be provided.
      type: string
      format: date-time
      nullable: true
    arrivalTime:
      description: |
        Needs to in be local date time format of the stop. Exactly one of `departureTime` or `arrivalTime` must be provided.
      type: string
      format: date-time
      nullable: true
    origin:
      $ref: ./place.yml#/PlaceRef
    destination:
      $ref: ./place.yml#/PlaceRef
    vias:
      description: "Ordered series of points where the journey must pass through. If more\nthan one via point is given all\
        \ of them must be obeyed - in the correct\norder. The server is allowed to replace a via stop by equivalent stops.\n\
        \nTripDataFilters given at a via apply to the section after that via. To apply a TripDataFilter for \nthe first section\
        \ (between the origin and the first via), use the TripDataFilter within the\nTripParameters structure.\n"
      type: array
      items:
        $ref: '#/TripVia'
    parameters:
      $ref: '#/TripParameters'
    embed:
      description: |
        Influences whether referenced resources are returned in full or as references only. Proposed default ALL
      type: array
      items:
        $ref: '../trip.yml#/TripsCollectionResponseContent'
    returnSearchParameters:
      $ref: '../trip.yml#/ReturnSearchParameters'
    notVias:
      type: array
      items:
        $ref: '#/NotVia'
TripSpecificationSummary:
  type: object
  additionalProperties: false
  description: "Trip specification summary. Provided by OJP. \nIt requires the id of an already existing trip to change and\
    \ specifies the parameters which must be used to generate the new trip.\n"
  required:
  - id
  properties:
    id:
      description: |
        The id of an already existing trip to change.
      type: string
      maxLength: 32768
      nullable: false
    origin:
      $ref: ./place.yml#/PlaceRef
    destination:
      $ref: ./place.yml#/PlaceRef
TripSummary:
  type: object
  additionalProperties: false
  description: |
    Trip summary. Provided by OJP.
  required:
  - id
  properties:
    id:
      description: |
        Id of this trip for referencing purposes. Unique within trip response.
      type: string
      maxLength: 32768
      nullable: false
    summary:
      type: string
      nullable: true
    externalRef:
      type: string
      nullable: true
    startTime:
      description: |
        Departure time at origin.
      type: string
      format: date-time
      nullable: true
    endTime:
      description: |
        Arrival time at destination.
      type: string
      format: date-time
      nullable: true
    duration:
      description: |
        Overall duration of the trip.
      type: string
      format: duration
      nullable: true
    origin:
      $ref: ./place.yml#/PlaceRef
    originName:
      type: string
      nullable: true
      description: Name of the origin place
    destination:
      $ref: ./place.yml#/PlaceRef
    destinationName:
      type: string
      nullable: true
      description: Name of the destination place
    transfers:
      type: integer
      format: int32
      nullable: true
    distance:
      type: integer
      format: int32
      nullable: true
TripVia:
  type: object
  additionalProperties: false
  description: |
    Via restrictions for a trip. Provided by OJP.
    A TripDataFilter given applies to the section after this via.
  required:
  - viaPlace
  properties:
    viaPlace:
      $ref: ./place.yml#/PlaceRef
    dwellTime:
      description: |
        desired dwell time at the via place
      type: string
      format: duration
      nullable: true
      example: PT30M
    dataFilter:
      $ref: '#/TripDataFilter'

