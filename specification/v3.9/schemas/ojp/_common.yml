Address:
  description: |
    A descriptive data associated with a place that can be used to describe the unique geographical context of a
    place for the purposes of identifying it. may be refined as either a road address, a postal address or both.
    Provided by OJP.
  allOf:
  - $ref: ./place.yml#/Place
  - type: object
    additionalProperties: false
    properties:
      name:
        description: |
          Name or description of address for use in passenger information.
        type: string
        nullable: true
        example: Oude Trambaan 7, 2265CA Leidschendam, Nederland
      nameTranslations:
        description: Translations for the name
        type: array
        items:
          $ref: '../_common.yml#/Translation'
      code:
        description: |
          id of the address
        type: string
        nullable: true
        example: NL:1916200000022621
      countryName:
        description: |
          Country of the address.
        type: string
        nullable: true
        example: The Netherlands
      countryCode:
        $ref: '../_common.yml#/CountryCode'
      postCode:
        description: |
          Postal code of the address.
        type: string
        nullable: true
        example: 2265CA
      city:
        description: |
          City name
        type: string
        nullable: true
        example: Leidschendam
      topographicPlaceName:
        description: |
          TopographicPlace name of the address. If set it should at least contain the city name.
        type: string
        nullable: true
        example: Leidschendam
      street:
        description: |
          Street name of the address. Can also contain the house number.
        type: string
        nullable: true
        example: Oude Trambaan
      houseNumber:
        description: |
          House number of the address. House number can either be in this separate field, or can be
          contained in the street field.
        type: string
        nullable: true
        example: 7
AddressRef:
  description: |
    Reference to an Address.
  allOf:
  - $ref: ./place.yml#/PlaceRef
  - type: object
    additionalProperties: false
    required:
    - addressRef
    properties:
      addressRef:
        type: string
        nullable: false
CarrierFilter:
  type: object
  additionalProperties: false
  description: |
    Filter for in/exclusion of carriers. Provided by OJP.
  properties:
    exclude:
      description: |
        Whether carrier in list are to include or exclude from search.
      type: boolean
      nullable: true
      default: true
    carriers:
      description: |
        Reference to carrier
      type: array
      items:
        $ref: '../_common.yml#/CompanyRef'
GeoPosition:
  type: object
  additionalProperties: false
  description: |
    WGS84 coordinates position. Provided by OJP.
  required:
  - longitude
  - latitude
  properties:
    longitude:
      $ref: '../_common.yml#/Longitude'
    latitude:
      $ref: '../_common.yml#/Latitude'
GeoPositionRef:
  description: |
    Reference to a GeoPosition consisting of latitude and longitude.
  allOf:
  - $ref: ./place.yml#/PlaceRef
  - type: object
    additionalProperties: false
    required:
    - latitude
    - longitude
    properties:
      latitude:
        $ref: '../_common.yml#/Latitude'
      longitude:
        $ref: '../_common.yml#/Longitude'
IndividualMode:
  description: |
    Modes which an individual powers themselves (such as walk, cycle). Provided by OJP.
  type: string
  x-extensible-enum:
  - WALK
  - CYCLE
  - TAXI
  - SELF_DRIVE_CAR
  - OTHERS_DRIVE_CAR
  - MOTORCYCLE
  - TRUCK
  - SCOOTER
  - RIDE_POOL_CAR
  - CAR_SHARING
  - CYCLE_SHARING
  - SCOOTER_SHARING
  - BICYCLE
  - ELECTRIC_BICYCLE
  - CARGO_BICYCLE
  - SCOOTER
Mode:
  type: object
  additionalProperties: false
  description: |
    A method of transportation such as bus, rail, etc. Provided by OJP.
  required:
  - ptMode
  properties:
    ptMode:
      $ref: '../_common.yml#/PTMode'
    name:
      description: |
        Name of the mode
      type: string
      nullable: true
      example: rail
    shortName:
      description: |
        Short name or acronym of the mode
      type: string
      nullable: true
      example: S
    description:
      description: |
        Additional text that further describes the mode
      type: string
      nullable: true
ModeFilter:
  type: object
  additionalProperties: false
  description: |
    List of public transport modes to include or exclude. Provided by OJP.
  properties:
    exclude:
      description: |
        Whether modes in list are to include or exclude from search.
      type: boolean
      nullable: true
      default: true
    transportModes:
      description: |
        List of Transport modes to include/exclude.
      type: array
      items:
        $ref: '#/Mode'
OsmTag:
  type: object
  additionalProperties: false
  description: |
    Structure of an Open Street Map tag. Provided by OJP.
  required:
  - tag
  - value
  properties:
    tag:
      description: |
        Name of Open Street Map tag (amenity, leisure, tourism, bike, ...)
      type: string
      nullable: false
      example: name
    value:
      description: |
        Value for Open Street Map tag (charging_station, hostel, yes, ...)
      type: string
      nullable: false
      example: Rozenrust
ServiceBrandFilter:
  type: object
  additionalProperties: false
  description: |
    Filter for in/exclusion of service brands. Provided by OJP.
  properties:
    exclude:
      description: |
        Whether service brand in list are to include or exclude from search.
      type: boolean
      nullable: true
      default: true
    serviceBrands:
      description: |
        Reference to service brand codes
      type: array
      items:
        $ref: '../_common.yml#/ServiceBrandCode'
ServiceStatus:
  type: object
  additionalProperties: false
  description: |
    Parameters which describe the current status of a dated vehicle journey.
    Provided by OJP.
  properties:
    unplanned:
      description: |
        Whether this trip is an additional one that has not been planned.
      type: boolean
      nullable: true
      default: false
    cancelled:
      description: |
        Whether this trip is cancelled and will not be run.
      type: boolean
      nullable: true
      default: false
    deviation:
      description: |
        Whether this trip deviates from the planned service pattern.
      type: boolean
      nullable: true
      default: false
    occupancy:
      description: |
        Passenger load status on vehicle. If omitted, not known.
        Equivalent to siri:OccupancyEnumeration which describes three values:
        'full', 'seatingAvailable' and 'standingAvailable'.
      type: string
      nullable: true
SituationFullRef:
  type: string
  description: |
    Reference to situation message. Message details might be found in response
    context or through other communication channels. Provided by OJP.
  nullable: true
TransferMode:
  description: |
    Modes dedicated to perform transfers. Provided by OJP.
  type: string
  x-extensible-enum:
  - WALK
  - PARK_AND_RIDE
  - BIKE_AND_RIDE
  - CAR_HIRE
  - BIKE_HIRE
  - PROTECTED_CONNECTION
  - GUARANTEED_CONNECTION
  - REMAIN_IN_VEHICLE
  - CHANGE_WITHIN_VEHICLE
  - CHECK_IN
  - CHECK_OUT
