openapi: 3.0.3

info:
  title: OJP Fare Service API
  version: 1.0.0
  description: |
    Request and response definitions for general, stop-specific and trip-specific fare information (converted from OJP_Fare.xsd).

    This API is part of the Open Journey Planning (OJP) standard defined by the VDV. For more information, see http://www.vdv.de/ojp.

    The OJP Fare Service API allows clients to query fare information for specific stops, places, or trips. It supports various types of fare requests and provides detailed fare results, including pricing, conditions, and applicable zones.

    The following endpoints are defined:

     - [Process](#process)
     - [Model](#model)
     - [Getting Started](#getting-started)

  contact:
    name: VDV/OJP
    url: http://www.vdv.de/ojp
    email: info@vdv.de
  license:
    name: CC BY 4.0
    url: https://creativecommons.org/licenses/by/4.0/

servers:
  - url: https://api.example.com/ojp
    description: OJP Fare Service

tags:
  - name: Fare Requests
    description: Fare information queries
  - name: Fare Results
    description: Fare calculation results

paths:
  /fares:
    post:
      tags:
        - Fare Requests
      summary: Query fare information
      description: |
        Submit a fare request (stop, place, static, trip, or multi-trip)
      operationId: postFareRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FareRequest'
      responses:
        '200':
          description: Successful fare response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FareResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
        '406':
          description: Not acceptable
        '415':
          description: Unsupported media type
        '500':
          description: Server error
        '501':
          description: Not implemented
        '503':
          description: Service unavailable

components:
  schemas:
    FareRequest:
      type: object
      discriminator:
        propertyName: type
      required:
        - type
      oneOf:
        - $ref: '#/components/schemas/StopFareRequest'
        - $ref: '#/components/schemas/PlaceFareRequest'
        - $ref: '#/components/schemas/StaticFareRequest'
        - $ref: '#/components/schemas/TripFareRequest'
        - $ref: '#/components/schemas/MultiTripFareRequest'
      properties:
        params:
          $ref: '#/components/schemas/FareParam'
          description: Parameter to filter the response contents

    StopFareRequest:
      type: object
      description: A request for stop-related FARE information
      required:
        - type
        - stopPointRef
      properties:
        type:
          type: string
          enum:
            - StopFareRequest
        stopPointRef:
          type: string
          description: Reference to the stop point (SIRI StopPointRef)
        date:
          type: string
          format: date
          description: Date for which to retrieve Fare information

    PlaceFareRequest:
      type: object
      description: A request for place-related FARE information
      required:
        - type
        - place
      properties:
        type:
          type: string
          enum:
            - PlaceFareRequest
        place:
          $ref: '#/components/schemas/Place'
          description:
            Place to get FAREs from (usually use only StopPoint, StopPlace and
            PointOfInterest)
        date:
          type: string
          format: date
          description: Date for which to retrieve Fare information
        fareProductRefs:
          type: array
          items:
            type: string
          description:
            Reference to FareProducts. If not specified, responds with all
            available fare products

    StaticFareRequest:
      type: object
      description: General Fare information request. May depend on date
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - StaticFareRequest
        date:
          type: string
          format: date
          description: Date for which to retrieve Fare information
        fareProductRefs:
          type: array
          items:
            type: string
          description:
            Reference to FareProducts. If not specified, responds with all
            available fare products

    TripFareRequest:
      type: object
      description: Request to calculate the FARE information of a single trip
      required:
        - type
        - trip
      properties:
        type:
          type: string
          enum:
            - TripFareRequest
        tripContext:
          $ref: '#/components/schemas/ResponseContext'
          description:
            Context to hold trip related objects that occur frequently
        trip:
          $ref: '#/components/schemas/Trip'
          description: A complete trip from origin to destination

    MultiTripFareRequest:
      type: object
      description:
        Request to calculate aggregated FARE information of multiple single
        trips
      required:
        - type
        - trips
      properties:
        type:
          type: string
          enum:
            - MultiTripFareRequest
        tripContext:
          $ref: '#/components/schemas/ResponseContext'
          description:
            Context to hold trip related objects that occur frequently
        trips:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Trip'
          description:
            Multiple complete trips from multiple origins and multiple
            destinations

    FareParam:
      type: object
      description: Parameter to filter the response contents
      properties:
        includeDetails:
          type: boolean
          default: true
        language:
          type: string
          example: en

    # ==================== Response Definitions ====================

    FareResponse:
      type: object
      description: Fare response structure
      properties:
        fareResponseContext:
          $ref: '#/components/schemas/ResponseContext'
          description:
            Context to hold fare response objects that occur frequently
        fareResults:
          type: array
          items:
            $ref: '#/components/schemas/FareResult'
          description: Fare result elements

    FareResult:
      type: object
      description: Wrapper element for Fare results
      required:
        - id
      properties:
        id:
          type: string
          description: ID of this result
        errorConditions:
          type: array
          items:
            $ref: '#/components/schemas/OJPError'
          description: Problems related to this FARE result
        fareEstimated:
          type: boolean
          default: true
          description: Whether the fare is only estimated by the service
        result:
          oneOf:
            - $ref: '#/components/schemas/StopFareResult'
            - $ref: '#/components/schemas/PlaceFareResult'
            - $ref: '#/components/schemas/StaticFareResult'
            - $ref: '#/components/schemas/TripFareResult'
            - $ref: '#/components/schemas/MultiTripFareResult'
          discriminator:
            propertyName: type

    StopFareResult:
      type: object
      description: Stop-related Fare information result
      properties:
        type:
          type: string
          enum:
            - StopFareResult
        tariffZoneLists:
          type: array
          items:
            $ref: '#/components/schemas/TariffZoneListInArea'
          description:
            One or more lists of Fare zones that belong to a Fare authority/area

    PlaceFareResult:
      type: object
      description: PLACE-related Fare information result
      properties:
        type:
          type: string
          enum:
            - PlaceFareResult
        place:
          $ref: '#/components/schemas/Place'
          description:
            The involved PLACE (usually a StopPoint, StopPlace or
            PointOfInterest)
        fareProducts:
          type: array
          items:
            $ref: '#/components/schemas/FareProduct'
          description:
            Different FARE PRODUCTs that may be available with related
            information
        staticInfoUrls:
          type: array
          items:
            $ref: '#/components/schemas/WebLink'
          description: URL to information pages on the web

    StaticFareResult:
      type: object
      description: General Fare information result
      properties:
        type:
          type: string
          enum:
            - StaticFareResult
        fareProducts:
          type: array
          items:
            $ref: '#/components/schemas/FareProduct'
          description:
            Different FARE PRODUCTs that may be available with related
            information
        staticInfoUrls:
          type: array
          items:
            $ref: '#/components/schemas/WebLink'
          description: URL to information pages on the web

    TripFareResult:
      type: object
      description: Fare and FareProducts for a given trip
      properties:
        type:
          type: string
          enum:
            - TripFareResult
        tripFareProductReferences:
          type: array
          items:
            $ref: '#/components/schemas/TripFareProductReference'
          description: Trip fare product references
        fareProducts:
          type: array
          items:
            $ref: '#/components/schemas/FareProduct'
          description: FareProducts valid for the trip
        passedZones:
          $ref: '#/components/schemas/TariffZoneListInArea'
          description: The set of passed zones
        staticInfoUrls:
          type: array
          items:
            $ref: '#/components/schemas/WebLink'
          description: URL to Fare information pages on the web

    MultiTripFareResult:
      type: object
      description: Fare and FareProducts for multiple trips
      properties:
        type:
          type: string
          enum:
            - MultiTripFareResult
        tripFareProductReferences:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TripFareProductReference'
          description: Non-empty list of trip references
        fareProducts:
          type: array
          items:
            $ref: '#/components/schemas/FareProduct'
          description: Zero or more FareProducts valid for the referenced trips
        passedZones:
          $ref: '#/components/schemas/TariffZoneListInArea'
          description: The set of passed zones
        staticInfoUrls:
          type: array
          items:
            $ref: '#/components/schemas/WebLink'
          description: URL to Fare information pages on the web

    TripFareProductReference:
      type: object
      description: Element that connects FareProducts to trips
      required:
        - fareProductRef
        - fromTripIdRef
        - toTripIdRef
      properties:
        fareProductRef:
          type: string
          description: Reference to a FareProduct
        fromTripIdRef:
          type: string
          description: Identifies the "valid from" trip
        fromLegIdRef:
          type: string
          description:
            Identifies the "valid from" LEG (if missing, valid from first LEG)
        toTripIdRef:
          type: string
          description: Identifies the "valid to" trip
        toLegIdRef:
          type: string
          description:
            Identifies the "valid to" LEG (if missing, valid to last LEG)

    # ==================== Supporting Data Structures ====================

    Place:
      type: object
      description:
        A geographic place (StopPoint, StopPlace, Address, Coordinates, or
        PointOfInterest)
      properties:
        stopPoint:
          $ref: '#/components/schemas/StopPoint'
        stopPlace:
          $ref: '#/components/schemas/StopPlace'
        address:
          $ref: '#/components/schemas/Address'
        pointOfInterest:
          $ref: '#/components/schemas/PointOfInterest'
        coordinates:
          $ref: '#/components/schemas/Coordinates'

    StopPoint:
      type: object
      description: A specific stop point in the network
      properties:
        stopPointRef:
          type: string
          description: Reference to the stop point
        name:
          type: string
          description: Name of the stop point

    StopPlace:
      type: object
      description: A stop place
      properties:
        stopPlaceRef:
          type: string
          description: Reference to the stop place
        name:
          type: string
          description: Name of the stop place

    Address:
      type: object
      description: An address
      properties:
        street:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string

    PointOfInterest:
      type: object
      description: A point of interest
      properties:
        poiRef:
          type: string
        name:
          type: string

    Coordinates:
      type: object
      description: Geographic coordinates
      required:
        - latitude
        - longitude
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double

    Trip:
      type: object
      description: A complete trip from origin to destination
      required:
        - id
        - startTime
        - endTime
        - legs
      properties:
        id:
          type: string
          description: Unique trip identifier
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        legs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Leg'
          description: Trip legs/segments

    Leg:
      type: object
      description: A leg or segment of a trip
      required:
        - id
      properties:
        id:
          type: string
          description: Unique leg identifier within the trip
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        from:
          $ref: '#/components/schemas/Place'
        to:
          $ref: '#/components/schemas/Place'
        mode:
          type: string
          enum:
            - foot
            - bike
            - car
            - taxi
            - bus
            - tram
            - train
            - metro
            - ferry
          description: Mode of transport

    FareProduct:
      type: object
      description: A fare product with pricing and conditions
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Unique fare product identifier
        name:
          type: string
          description: Name of the fare product
        description:
          type: string
          description: Detailed description
        price:
          $ref: '#/components/schemas/Price'
        validityPeriod:
          $ref: '#/components/schemas/ValidityPeriod'
        passengerCategories:
          type: array
          items:
            type: string
          description: Applicable passenger categories
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'

    Price:
      type: object
      description: Price information
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          format: double
        currency:
          type: string
          description: ISO 4217 currency code
          example: EUR

    ValidityPeriod:
      type: object
      description: Time period in which the fare product is valid
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time

    Condition:
      type: object
      description: A condition or constraint for using the fare product
      properties:
        description:
          type: string
        type:
          type: string

    TariffZoneListInArea:
      type: object
      description: A list of Fare zones belonging to a Fare authority/area
      required:
        - tariffZones
      properties:
        fareAuthorityRef:
          type: string
          description: Reference to the fare authority
        fareAuthorityName:
          type: string
          description: Name of the fare authority
        tariffZones:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TariffZone'
          description: Tariff zones in this area

    TariffZone:
      type: object
      description: A tariff zone
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string

    WebLink:
      type: object
      description: A web link to additional information
      required:
        - url
      properties:
        url:
          type: string
          format: uri
        description:
          type: string
        language:
          type: string
          example: en

    ResponseContext:
      type: object
      description: Context to hold response objects that occur frequently
      properties:
        situations:
          type: array
          items:
            $ref: '#/components/schemas/Situation'
        operators:
          type: array
          items:
            $ref: '#/components/schemas/Operator'
        extensions:
          type: object

    Situation:
      type: object
      description: A disruption or service alert
      properties:
        id:
          type: string
        severity:
          type: string
          enum:
            - low
            - medium
            - high
        description:
          type: string
        affectedStops:
          type: array
          items:
            type: string

    Operator:
      type: object
      description: A transport operator
      properties:
        operatorRef:
          type: string
        name:
          type: string
        url:
          type: string
          format: uri

    OJPError:
      type: object
      description: Error or warning condition in response
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
        severity:
          type: string
          enum:
            - warning
            - error
          default: warning

    ObjectId:
      type: string
      description: Identifier for a NeTEx object

    TripObjectId:
      type: string
      description: Identifier for a Trip object

    LegObjectId:
      type: string
      description: Identifier for a Leg object
