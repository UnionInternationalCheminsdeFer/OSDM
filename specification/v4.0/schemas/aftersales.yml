AfterSaleCondition:
  type: object
  additionalProperties: false
  description: |
    After sale amounts for a given offer.
  properties:
    condition:
      $ref: '#/AfterSaleConditionType'
    validFrom:
      type:
      - string
      - 'null'
      format: date-time
    validUntil:
      type:
      - string
      - 'null'
      format: date-time
    afterSaleFee:
      $ref: ./_common.yml#/Price
    reimbursementMethod:
      $ref: ./complaint.yml#/ReimbursementMethod
AfterSaleConditionType:
  type: string
  x-extensible-enum:
  - PLACE_CHANGE
  - EXCHANGE
  - REFUND
AfterSalesOverrideDetails:
  description: |
    If initial after sales conditions have been overwritten this object provides details on the original
    conditions and an explanation text for the customer
  type: object
  properties:
    initialAftersalesConditions:
      type: array
      items:
        $ref: '#/AfterSaleCondition'
    overrideDescription:
      description: Description for the change of conditions for the customer.
      type: string
    validFrom:
      type:
      - string
      - 'null'
      format: date-time
    validUntil:
      type:
      - string
      - 'null'
      format: date-time
    initialExchangeableType:
      $ref: '#/ExchangeableType'
    initialRefundType:
      $ref: '#/RefundType'
CancelFulfillmentsOffer:
  type: object
  additionalProperties: false
  required:
  - id
  - createdOn
  - validFrom
  - validUntil
  - status
  - fulfillments
  properties:
    id:
      description: |
        id of the cancel fulfillments offer
      type: string
      maxLength: 32768
    summary:
      description: |
        A human-readable description of the refund offer.
      type:
      - string
      - 'null'
    createdOn:
      type: string
      format: date-time
    validFrom:
      type: string
      format: date-time
    validUntil:
      description: |
        time until the offer can be used
      type: string
      format: date-time
    confirmedOn:
      type:
      - string
      - 'null'
      format: date-time
    status:
      $ref: '#/CancelFulfillmentsStatus'
    fulfillments:
      type: array
      items:
        $ref: ./fulfillment.yml#/Fulfillment
      minItems: 1
    _links:
      $ref: ./_common.yml#/Links
CancelFulfillmentsOfferCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    cancelFulfillmentOffers:
      type: array
      items:
        $ref: '#/CancelFulfillmentsOffer'
    _links:
      $ref: ./_common.yml#/Links
CancelFulfillmentsOfferPatchRequest:
  type: object
  additionalProperties: false
  required:
  - status
  properties:
    status:
      $ref: '#/CancelFulfillmentsStatus'
CancelFulfillmentsOfferRequest:
  type: object
  additionalProperties: false
  properties:
    fulfillmentIds:
      type: array
      items:
        $ref: ./fulfillment.yml#/FulfillmentId
CancelFulfillmentsOfferResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    cancelFulfillmentsOffer:
      $ref: '#/CancelFulfillmentsOffer'
CancelFulfillmentsStatus:
  type: string
  enum:
  - PROPOSED
  - CONFIRMED
ConditionSpecification:
  type: object
  additionalProperties: false
  description: |
    Describes sales, usage and after sales conditions applicable to the product.  See after sales conditions for individual after sales amounts. The language of the text is controlled by the accept-language header, i.e. supporting English is a must.
  required:
  - type
  - description
  properties:
    type:
      $ref: ./_common.yml#/ConditionType
    description:
      description: |
        human readable documentation of the text.
      $ref: ./_common.yml#/Text
    shortDescription:
      description: |
        short description of the condition no longer than 64 characters
      $ref: ./_common.yml#/Text
ConfirmedRefund:
  type: object
  additionalProperties: false
  required:
  - id
  - createdOn
  - confirmedOn
  - refundedFulfillments
  - refundedAmount
  properties:
    id:
      description: |
        id of the confirmed refund
      type: string
      maxLength: 32768
    summary:
      description: |
        A human-readable description of the refund.
      type:
      - string
      - 'null'
      examples:
      - Refund for Paris-Barcelona Andre Dupont 2022-07-23
    createdOn:
      type: string
      format: date-time
    confirmedOn:
      type: string
      format: date-time
    reimbursementStatus:
      $ref: ./complaint.yml#/ReimbursementStatus
    reimbursementDateTime:
      type:
      - string
      - 'null'
      format: date-time
    reimbursementMethod:
      $ref: ./complaint.yml#/ReimbursementMethod
    appliedOverruleCode:
      $ref: ./_common.yml#/OverruleCode
    refundedFulfillments:
      description: |
        fulfillments to be refunded or replaced. This might differ from the requested refund specification in case the original request did not include all related fulfillments or booking parts. It must also incude the references to booking parts and passenger ids which can be omitted in teh request in case all part or passengers related to a fulfillment are refunded.
      type: array
      items:
        $ref: '#/RefundedFulfillmentSpecification'
      minItems: 1
    issuedFulfillmentIds:
      description: |
        IDs of the new fulfillments issued with this refund
      type: array
      items:
        type: string
    issuedVouchers:
      type: array
      items:
        $ref: ./_common.yml#/VoucherInformation
    refundFeeRefs:
      description: |
        reference to Applied Fees covering the refund fee. Providing the reference
        is mandatory when the refund was confirmed and a fee has been applied
      type: array
      items:
        type: string
        maxLength: 1024
    refundedAmount:
      $ref: ./_common.yml#/Price
      description: |
        Amount refunded to the purchaser
    refundBreakdown:
      description: |
        breakdown of the refund
      type: array
      items:
        $ref: '#/RefundBreakdownItem'
    _links:
      $ref: ./_common.yml#/Links
ConfirmedRelease:
  type: object
  additionalProperties: false
  required:
  - id
  - createdOn
  - confirmedOn
  - releasedFulfillments
  properties:
    id:
      description: |
        id of the release
      type: string
      maxLength: 32768
    summary:
      description: |
        A human-readable description of the release.
      type:
      - string
      - 'null'
      examples:
      - 'Released: Paris-Barcelona Andre Dupont 2022-07-23'
    createdOn:
      type: string
      format: date-time
    confirmedOn:
      type: string
      format: date-time
    appliedOverruleCode:
      $ref: ./_common.yml#/OverruleCode
    releasedFulfillments:
      description: |
        fulfillments to be refunded or replaced. This might differ from the requested refund specification in case the original request did not include all related fulfillments or booking parts. It must also incude the references to booking parts and passenger ids which can be omitted in teh request in case all part or passengers related to a fulfillment are refunded.
      type: array
      items:
        $ref: '#/RefundedFulfillmentSpecification'
      minItems: 1
    _links:
      $ref: ./_common.yml#/Links
ExchangeableType:
  description: "If set to YES the offerpart is exchangeable without a fee before the day of departure. \nNO when not exchangeable\
    \ or exchangeable with 100% fee, WITH_CONDITIONS in all other cases.\n"
  type: string
  enum:
  - 'YES'
  - 'NO'
  - WITH_CONDITION
ExchangeBreakdownItem:
  type: object
  required:
  - bookingPartIds
  - exchangeFee
  - exchangePrice
  properties:
    exchangeFee:
      $ref: ./_common.yml#/Price
    exchangePrice:
      description: |
        price of the new booking parts
      $ref: ./_common.yml#/Price
    refundableAmount:
      description: |
        amount to be paid to the purchaser in case the new products are less expensive. There can not be an amountToBePaid at the same time.
      $ref: ./_common.yml#/Price
    amountToBePaid:
      description: |
        amount to be paid by the purchaser in case the new products are more expensive. There can not be a refundableAmount at the same time.
      $ref: ./_common.yml#/Price
    bookingPartIds:
      type: array
      items:
        type: string
ExchangeOffer:
  type: object
  additionalProperties: false
  required:
  - exchangeFee
  - exchangePrice
  - refundableAmount
  - fulfillmentRefs
  - offerId
  - createdOn
  - preBookableUntil
  - admissionOfferParts
  properties:
    exchangeFee:
      $ref: ./_common.yml#/Price
    accountingRef:
      description: |
        Accounting information for the exchange fee
      $ref: ./_common.yml#/AccountingRef
    exchangePrice:
      description: |
        price of the new booking parts
      $ref: ./_common.yml#/Price
    refundableAmount:
      description: |
        amount to be paid to the purchaser in case the new products are less expensive. There can not be an amountToBePaid at the same time.
      $ref: ./_common.yml#/Price
    amountToBePaid:
      description: |
        amount to be paid by the purchaser in case the new products are more expensive. There can not be a refundableAmount at the same time.
      $ref: ./_common.yml#/Price
    appliedOverruleCode:
      $ref: ./_common.yml#/OverruleCode
    fulfillmentRefs:
      type: array
      items:
        $ref: ./fulfillment.yml#/FulfillmentRefs
      minItems: 1
    offerId:
      type: string
      maxLength: 32768
    summary:
      description: |
        A human-readable description of the offer.
      type: string
    offerSummary:
      description: The offerSummary must be provided for product based offers. It is not needed for fares.
      $ref: ./offer.yml#/OfferSummary
    createdOn:
      type: string
      format: date-time
    preBookableUntil:
      description: |
        time until the offer can be pre-booked, however its availability is not guaranteed
      type: string
      format: date-time
    passengerRefs:
      description: |
        providing the passengerRefs is required for passenger transport. There are uses cases (e.g. sale of merchandising articles) where no passenger is involved. Only in these cases it is allowed to omit the passengerRefs.
      type: array
      items:
        type: string
      minItems: 1
    products:
      description: |
        products must be provided in case they are referenced. Some offer parts (e.g. fares)
        do not have products assigned.
      type: array
      items:
        $ref: ./product.yml#/Product
    tripCoverage:
      type: array
      items:
        $ref: ./trip.yml#/TripCoverage
    exchangeOfferBreakdown:
      description: |
        Breakdown of the exchange offer, including the exchange price, exchange fee, and refundable amount.
      type: array
      items:
        $ref: '#/ExchangeBreakdownItem'
    admissionOfferParts:
      type: array
      items:
        $ref: ./offer.yml#/AdmissionOfferPart
    reservationOfferParts:
      type: array
      items:
        $ref: ./offer.yml#/ReservationOfferPart
    ancillaryOfferParts:
      type: array
      items:
        $ref: ./offer.yml#/AncillaryOfferPart
    fees:
      type: array
      items:
        $ref: ./_common.yml#/Fee
    fares:
      type: array
      items:
        $ref: ./offer.yml#/FareOfferPart
    _links:
      $ref: ./_common.yml#/Links
ExchangeOfferCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    exchangeOffers:
      type: array
      items:
        $ref: '#/ExchangeOffer'
    trips:
      description: |
        Two trips are returned if  round trips are exchanged.
      type: array
      items:
        $ref: ./ojp/trip.yml#/Trip
    tripContext:
      $ref: ./trip.yml#/TripContext
    passengers:
      type: array
      items:
        $ref: ./person.yml#/Passenger
    _links:
      $ref: ./_common.yml#/Links
ExchangeOfferCollectionResponseContent:
  type: string
  enum:
  - ALL
  - EXCHANGEOFFERS
  - TRIP
  - PASSENGERS
  - NONE
  default: ALL
ExchangeOfferRequest:
  description: |
    Request exchange offers
  type: object
  additionalProperties: false
  required:
  - exchangeParts
  - exchangeParams
  properties:
    exchangeParts:
      description: |
        the fulfillments or booking parts that should be exchanged.
        The listed parts are an indication. It might be necessary to exchange more parts as there are dependencies to other pats via fulfillments. It is up to the provider to evaluate these dependencies.
      type: array
      maxItems: 1024
      items:
        $ref: '#/ExchangeParts'
    exchangeParams:
      $ref: '#/ExchangeOfferRequestParameter'
    exchangePassengers:
      $ref: '#/ExchangePassengersOfferRequestSpecification'
    exchangeService:
      $ref: '#/ExchangeServiceOfferRequestSpecification'
    exchangeTrip:
      $ref: '#/ExchangeTripOfferRequestSpecification'
ExchangeOfferRequestParameter:
  type: object
  additionalProperties: false
  description: |
    Basic request parameters for all exchange offer requests.
  properties:
    overruleCode:
      $ref: ./_common.yml#/OverruleCode
    corporateCodes:
      type: array
      items:
        $ref: ./_common.yml#/CorporateCode
    promotionCodes:
      type: array
      items:
        $ref: ./_common.yml#/PromotionCode
    offerMode:
      $ref: ./offer.yml#/OfferMode
    currency:
      $ref: ./_common.yml#/Currency
    requestedFulfillmentOptions:
      type: array
      items:
        $ref: ./fulfillment.yml#/FulfillmentOption
    exchangeFee:
      description: |
        In some business models the distributor has the right to define the exchange fee amount for a fare provided by the fare prvider. This need to be indicated in the fare after sales rules to be applied. In this case the ditributor submits the amount to the fare provider in exchange fee amount and the fare provider uses this amount to create the fees including the VAT split.
      $ref: ./_common.yml#/CurrencyAmount
    embed:
      type: array
      items:
        $ref: ./offer.yml#/OfferCollectionResponseContent
ExchangeOperation:
  type: object
  additionalProperties: false
  required:
  - id
  properties:
    id:
      type: string
    status:
      $ref: '#/ExchangeStatus'
    exchangeOffers:
      type: array
      items:
        $ref: '#/ExchangeOffer'
    appliedFeesRefs:
      description: |
        references to the fees applied with this exchange operation. It is mandatory to
        provide the refs when the fees have been applied.
      type: array
      items:
        type: string
        maxLength: 1024
    ticketTimeLimit:
      type:
      - string
      - 'null'
      format: date-time
    fulfillmentRefs:
      description: |
        references to the fulfillments affeted by the exchange operation.
      type: array
      items:
        $ref: ./fulfillment.yml#/FulfillmentRefs
    issuedVouchers:
      type: array
      items:
        $ref: ./_common.yml#/VoucherInformation
    trips:
      type: array
      items:
        $ref: ./ojp/trip.yml#/Trip
ExchangeOperationPatchRequest:
  type: object
  additionalProperties: false
  description: |
    Allows modifying a general setting for the booking:
     * setting the required fulfillment type, e.g. value paper
       or e-ticket and preferred fulfillment media.
       The latter is optional and relevant in some cases only.
     * Provisionally exchanging some of the fulfillments in the booking
  properties:
    requestedFulfillmentType:
      $ref: ./fulfillment.yml#/FulfillmentType
    preferredFulfillmentMedia:
      $ref: ./fulfillment.yml#/FulfillmentMediaType
    usedPaymentMethods:
      type: array
      items:
        $ref: ./_common.yml#/PaymentMethod
    embed:
      description: |
        Influences whether referenced resources are returned in full or as references only.
      type: array
      items:
        $ref: '#/ExchangeOperationResponseContent'
ExchangeOperationRequest:
  type: object
  additionalProperties: false
  required:
  - exchangeOffers
  properties:
    exchangeOffers:
      type: array
      items:
        $ref: ./offer.yml#/OfferSelection
      minItems: 1
    promotionCodes:
      type: array
      items:
        $ref: ./_common.yml#/PromotionCode
ExchangeOperationResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    exchangeOperation:
      $ref: '#/ExchangeOperation'
    appliedFees:
      description: "applied fees referenced in the exchange operation. Providing the applied fees is \nmandatory in case the\
        \ an exchange operation is returned. The applied fees are stored in the booking and are returned here additionally\
        \ for convenience.\n"
      type: array
      items:
        $ref: ./_common.yml#/AppliedFee
ExchangeOperationResponseContent:
  description: |
    Influences whether referenced resources are returned in full or as references only.
  type: string
  enum:
  - ALL
  - EXCHANGEOPERATION
  - EXCHANGEOPERATION_EXCHANGEOFFERS
  - EXCHANGEOPERATION_FULFILLMENTS
  default: ALL
ExchangeParts:
  description: specification of parts to be exchanged
  type: object
  properties:
    fulfillmentId:
      description: |
        ids of the fulfillments where some part(s) should be exchanged
      type: string
      maxLength: 32768
    bookingPartIds:
      description: |
        Ids of booking parts to be exchanged. The new offers will not contain these parts.
        In case no booking parts are provided all booking parts will be exchanged.
      type: array
      maxItems: 1024
      items:
        type: string
        maxLength: 32768
ExchangePassengersOfferRequestSpecification:
  description: |
    specification to remove, add and exchange passengers
  type: object
  additionalProperties: false
  properties:
    addedPassengerSpecifications:
      description: specifications of new passengers to be added
      type: array
      items:
        $ref: ./person.yml#/AnonymousPassengerSpecification
    removedPassengerIds:
      type: array
      description: |
        Ids of passengers to be exchanged. The new offers will not contain these passengers.
        In case no passengers refs are provided all passengers on the fulfillment will be exchanged.
      maxItems: 1024
      items:
        type: string
ExchangeServiceOfferRequestSpecification:
  description: |
    specification to exchange the service level or travel class
  type: object
  additionalProperties: false
  properties:
    flexibilities:
      description: |
        Defines the flexibility levels desired of the fares returned.
        This refers to the after sales flexibility levels as defined in IRS-90918-10
      type: array
      items:
        $ref: ./offer.yml#/Flexibility
    travelClasses:
      description: |
        The classes returned might be different from the requested classes.
      type: array
      items:
        $ref: ./_common.yml#/TravelClass
    serviceClassTypes:
      description: |
        The classes returned might be different from the requested classes.
      type: array
      items:
        $ref: ./_common.yml#/ServiceClassType
      maxItems: 4
ExchangeStatus:
  type: string
  enum:
  - PREBOOKED
  - CONFIRMED
  - FULFILLED
  - ERROR
ExchangeTripOfferRequestSpecification:
  description: |
    specification to exchange a trip
  type: object
  additionalProperties: false
  properties:
    tripSpecifications:
      type:
      - array
      - 'null'
      items:
        $ref: ./trip.yml#/TripSpecification
    inboundTripSpecifications:
      type:
      - array
      - 'null'
      items:
        $ref: ./trip.yml#/TripSpecification
    tripSearchCriteria:
      $ref: ./ojp/trip.yml#/TripSearchCriteria
    nonTripSearchCriteria:
      $ref: ./trip.yml#/NonTripSearchCriteria
    requestedSections:
      type: array
      items:
        $ref: ./trip.yml#/Section
FareAfterSalesRules:
  type: object
  additionalProperties: false
  properties:
    isSupportingIndividualContracts:
      description: |
        Indicates that the after sales of this fare can be treated independently per person.
      type:
      - boolean
      - 'null'
      default: false
    isProviderFee:
      description: |
        The after sales fees are attributed to the provider. In some business models used with fares the fees are attributed to the distributor.
      type: boolean
      default: true
RefundBreakdownItem:
  type: object
  required:
  - refundFee
  - refundAmount
  - bookingParts
  properties:
    refundFee:
      description: Amount kept by the carrier and/or the distributor
      $ref: ./_common.yml#/Price
    refundAmount:
      description: Amount to be returned to the purchaser
      $ref: ./_common.yml#/Price
    bookingParts:
      type: array
      items:
        $ref: ./booking.yml#/BookingPartReference
RefundedFulfillmentSpecification:
  type: object
  description: |
    description of fulfillments, booking parts and passenger ids included in a refund.
  required:
  - fulfillmentId
  properties:
    fulfillmentId:
      description: |
        id of the fulfillment where some part(s) should be removed
      type: string
    fulfillmentSummary:
      description: A human-readable description of the fulfillment.
      type: string
    bookingPartIds:
      description: ids of booking parts to be removed from the fulfillment
      type: array
      items:
        type: string
        maxLength: 32768
    passengerIds:
      type: array
      description: ids of passengers to be removed from the fulfillment
      items:
        type: string
RefundOffer:
  type: object
  additionalProperties: false
  required:
  - id
  - createdOn
  - validFrom
  - validUntil
  - status
  - refundedFulfillments
  - refundFee
  - refundableAmount
  properties:
    id:
      description: |
        id of the refund offer
      type: string
      maxLength: 32768
    summary:
      description: |
        A human-readable description of the refund offer.
      type:
      - string
      - 'null'
      examples:
      - Refund Offer for Paris-Barcelona Andre Dupont 2022-07-23
    createdOn:
      type: string
      format: date-time
    validFrom:
      type: string
      format: date-time
    validUntil:
      description: |
        time until the offer can be used
      type: string
      format: date-time
    status:
      $ref: '#/RefundStatus'
    reimbursementStatus:
      $ref: ./complaint.yml#/ReimbursementStatus
    appliedOverruleCode:
      $ref: ./_common.yml#/OverruleCode
    refundedFulfillments:
      description: |
        fulfillments to be refunded or replaced. This might differ from the requested refund specification in case the original request did not include all related fulfillments or booking parts. It must also incude the references to booking parts and passenger ids which can be omitted in teh request in case all part or passengers related to a fulfillment are refunded.
      type: array
      items:
        $ref: '#/RefundedFulfillmentSpecification'
      minItems: 1
    refundFee:
      $ref: ./_common.yml#/Price
      description: |
        Total Amount kept by the carrier and/or distributor
    refundableAmount:
      $ref: ./_common.yml#/Price
      description: |
        Amount refunded to the purchaser
    refundOfferBreakdown:
      description: |
        breakdown of the refund offer
      type: array
      items:
        $ref: '#/RefundBreakdownItem'
    reimbursementMethod:
      $ref: ./complaint.yml#/ReimbursementMethod
    _links:
      $ref: ./_common.yml#/Links
RefundOfferCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    refundOffers:
      type: array
      items:
        $ref: '#/RefundOffer'
    _links:
      $ref: ./_common.yml#/Links
RefundOfferPatchRequest:
  type: object
  additionalProperties: false
  description: |
    Changes the refund offer to status CONFIRMED. De-confirmation by setting PROPOSED status is not supported by API.
  required:
  - status
  properties:
    status:
      $ref: '#/RefundStatus'
RefundOfferRequest:
  type: object
  additionalProperties: false
  description: |
    Request for a refund offer.
    Fulfillments can be provided in case the booking contains multiple individual fulfillments.
  required:
  - refundSpecifications
  properties:
    refundSpecifications:
      description: |
        Specification of Fulfillment IDs to refund.
        To do a partial refund, include booking part IDs to refund from the fulfillment.
      type: array
      items:
        $ref: '#/RefundSpecification'
      minItems: 1
    overruleCode:
      $ref: ./_common.yml#/OverruleCode
    refundDate:
      description: |
        Indicates for passes the date taken as reference to compute possible partial refund. It is also the date taken
        as reference to invalidate the pass partially refunded.
      type:
      - string
      - 'null'
      format: date-time
RefundOfferResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    refundOffer:
      $ref: '#/RefundOffer'
    appliedFees:
      description: "applied fees referenced in the refund offer. Providing the applied fees is \nmandatory in case the refund\
        \ offer is confirmed. The applied fees are stored in the booking and are returned here additionally for convenience.\n"
      type: array
      items:
        $ref: ./_common.yml#/AppliedFee
RefundSpecification:
  type: object
  required:
  - fulfillmentId
  properties:
    fulfillmentId:
      description: |
        id of the fulfillment where some part(s) should be removed
      type: string
    bookingPartIds:
      description: ids of booking parts to be removed from the fulfillment
      type: array
      items:
        type: string
        maxLength: 32768
    passengerIds:
      type: array
      description: ids of passengers to be removed from the fulfillment
      items:
        type: string
    refundFee:
      description: |
        In some business models the distributor has the right to define the refund fee amount for a fare provided by the fare prvider. This need to be indicated in the fare after sales rules to be applied. In this case the ditsributor submits the amount to the fare provider in refund fee amount and the fare provider uses this amount to create the fees including the VAT split.
      $ref: ./_common.yml#/CurrencyAmount
RefundStatus:
  type: string
  enum:
  - PROPOSED
  - CONFIRMED
RefundType:
  type: string
  enum:
  - 'YES'
  - 'NO'
  - WITH_CONDITION
ReleaseOffer:
  type: object
  additionalProperties: false
  required:
  - id
  - createdOn
  - validFrom
  - validUntil
  - releasedFulfillments
  properties:
    id:
      description: |
        id of the release offer
      type: string
      maxLength: 32768
    summary:
      description: |
        A human-readable description of the release offer.
      type:
      - string
      - 'null'
    createdOn:
      type: string
      format: date-time
    validFrom:
      type: string
      format: date-time
    validUntil:
      description: |
        time until the offer can be used
      type: string
      format: date-time
    releasedFulfillments:
      description: |
        fulfillments to be refunded or replaced. This might differ from the requested refund specification in case the original request did not include all related fulfillments or booking parts. It must also incude the references to booking parts and passenger ids which can be omitted in teh request in case all part or passengers related to a fulfillment are refunded.
      type: array
      items:
        $ref: '#/RefundedFulfillmentSpecification'
      minItems: 1
    appliedOverruleCode:
      $ref: ./_common.yml#/OverruleCode
    _links:
      $ref: ./_common.yml#/Links
ReleaseOfferCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    releaseOffers:
      type: array
      items:
        $ref: '#/ReleaseOffer'
    _links:
      $ref: ./_common.yml#/Links
ReleaseOfferPatchRequest:
  type: object
  additionalProperties: false
  required:
  - status
  properties:
    status:
      $ref: '#/ReleaseStatus'
ReleaseOfferRequest:
  type: object
  additionalProperties: false
  properties:
    releaseSpecifications:
      description: |
        To do a partial release provide the fulfillmentIds affected and point out what to release
      type: array
      items:
        $ref: '#/ReleaseSpecification'
    overruleCode:
      $ref: ./_common.yml#/OverruleCode
ReleaseOfferResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    releaseOffer:
      $ref: '#/ReleaseOffer'
ReleaseSpecification:
  type: object
  required:
  - fulfillmentId
  properties:
    fulfillmentId:
      description: |
        id of the fulfillment where some part(s) should be removed
      type: string
    bookingPartIds:
      description: ids of booking parts to be removed from the fulfillment
      type: array
      items:
        type: string
        maxLength: 32768
    passengerIds:
      type: array
      description: ids of passengers to be removed from the fulfillment
      items:
        type: string
ReleaseStatus:
  type: string
  enum:
  - PROPOSED
  - CONFIRMED
