Alight:
  type: object
  additionalProperties: false
  description: |
    Describes the situation at a stop or station at which the passenger alights from a Leg
    of a trip including time-related information. Provided by OJP.
  required:
  - stopPlaceRef
  - stopPlaceName
  - serviceArrival
  properties:
    stopPlaceRef:
      $ref: '#/StopPlaceRef'
    stopPlaceName:
      type: string
      examples:
      - Luzern
    plannedStopPointName:
      description: |
        Name of the bay/quay/terminal where to board/alight from the vehicle. According to
        planned timetable.
      type:
      - string
      - 'null'
      examples:
      - '3'
    estimatedStopPointName:
      description: |
        Name of the bay/quay/terminal where to board the vehicle. As to the latest realtime status.
      type:
      - string
      - 'null'
      examples:
      - '8'
    serviceArrival:
      $ref: ../_common.yml#/ServiceTime
    serviceArrivalFormation:
      $ref: ../transportable.yml#/ServiceFormation
    status:
      $ref: '#/StopCallStatus'
Board:
  type: object
  additionalProperties: false
  description: |
    Describes the the situation at a stop or station at which the passenger boards a Leg
    of a trip including time-related information. Provided by OJP.
  required:
  - stopPlaceRef
  - stopPlaceName
  - serviceDeparture
  properties:
    stopPlaceRef:
      $ref: '#/StopPlaceRef'
    stopPlaceName:
      type: string
      examples:
      - Luzern
    plannedStopPointName:
      description: |
        Name of the bay/quay/terminal where to board/alight from the vehicle. According to
        planned timetable.
      type:
      - string
      - 'null'
      examples:
      - '3'
    estimatedStopPointName:
      description: |
        Name of the bay/quay/terminal where to board the vehicle. As to the latest realtime status.
      type:
      - string
      - 'null'
      examples:
      - '8'
    serviceDeparture:
      $ref: ../_common.yml#/ServiceTime
    serviceDepartureFormation:
      $ref: ../transportable.yml#/ServiceFormation
    status:
      $ref: '#/StopCallStatus'
ContinuousLeg:
  type: object
  additionalProperties: false
  description: |
    A leg of a journey that is not bound to a timetable. Provided by OJP.
  required:
  - start
  - end
  - service
  properties:
    start:
      $ref: ./place.yml#/Place
    end:
      $ref: ./place.yml#/Place
    service:
      $ref: ./continuous-service.yml#/ContinuousService
    description:
      description: human readable description of the leg
      type: string
    timeWindowStart:
      description: |
        Time at which window begins.
      type:
      - string
      - 'null'
      format: date-time
    timeWindowEnd:
      description: Time at which window ends.
      type:
      - string
      - 'null'
      format: date-time
    duration:
      description: |
        Duration of this leg according to user preferences like walk speed.
      type:
      - string
      - 'null'
      format: duration
      examples:
      - PT10M
    pathGuidance:
      $ref: ../place.yml#/PathGuidance
    situationFullRefs:
      type: array
      items:
        $ref: ./_common.yml#/SituationRef
    co2Emission:
      $ref: ../_common.yml#/Quantity
DatedJourney:
  type: object
  additionalProperties: false
  description: |
    Vehicle journey that runs at a specific date. Provided by OJP.
  required:
  - vehicleNumbers
  - carriers
  properties:
    operatingDayRef:
      $ref: '#/OperationDayRef'
    mode:
      $ref: ./_common.yml#/Mode
    productCategory:
      $ref: ./product.yml#/ProductCategory
    publishedServiceName:
      description: |
        Line name or service description as known to the public
      type:
      - string
      - 'null'
      examples:
      - S1
      - Circle Line
      - ICE 488
    vehicleNumbers:
      type: array
      items:
        $ref: ../transportable.yml#/VehicleNumber
      minItems: 1
    lineNumbers:
      type: array
      items:
        $ref: ../_common.yml#/LineNumber
    serviceStatus:
      $ref: ./_common.yml#/ServiceStatus
    situationFullRefs:
      type: array
      items:
        $ref: ./_common.yml#/SituationRef
    carriers:
      description: "the carrier might not be provided be in case the dated journey is used in a request as part of trip specification.\
        \ \nIn case the trip specification is therefore ambiguous the provider might reply with an error.\n"
      type: array
      items:
        $ref: ../_common.yml#/NamedCompany
    attributes:
      type: array
      items:
        $ref: ../_common.yml#/GeneralAttribute
Intermediate:
  type: object
  additionalProperties: false
  description: |
    Describes the situation at a stop or station that lies between the Board and
    Alight stop or station including time-related information. Provided by OJP.
  required:
  - stopPlaceRef
  - stopPlaceName
  - serviceArrival
  - serviceDeparture
  properties:
    stopPlaceRef:
      $ref: '#/StopPlaceRef'
    stopPlaceName:
      type: string
      examples:
      - Luzern
    plannedStopPointName:
      description: |
        Name of the bay/quay/terminal where to board/alight from the vehicle. According to
        planned timetable.
      type:
      - string
      - 'null'
      examples:
      - '3'
    estimatedStopPointName:
      description: |
        Name of the bay/quay/terminal where to board the vehicle. As to the latest realtime status.
      type:
      - string
      - 'null'
      examples:
      - '8'
    serviceArrival:
      $ref: ../_common.yml#/ServiceTime
    serviceArrivalFormation:
      $ref: ../transportable.yml#/ServiceFormation
    serviceDeparture:
      $ref: ../_common.yml#/ServiceTime
    serviceDepartureFormation:
      $ref: ../transportable.yml#/ServiceFormation
    status:
      $ref: '#/StopCallStatus'
OperatingDays:
  type: object
  additionalProperties: false
  description: |
    Day of public transport operation of which the characteristics are defined in a specific
    service calendar and which may last more than 24 hours. Provided by OJP.
  required:
  - from
  - until
  - pattern
  properties:
    from:
      description: |
        Start date of period
      type: string
      format: date-time
    until:
      description: |
        End date of period
      type: string
      format: date-time
    pattern:
      description: |
        Bit pattern for operating days between start date and end date.
        The length of the pattern is equal to the number of days from
        start date to end date. A bit value of '1' indicates that an event
        actually happens on the day that is represented by the bit position.
      type: string
OperationDayRef:
  type:
  - string
  - 'null'
  description: |
    Reference to an operating day. Provided by OJP.
  examples:
  - OperatingDay:12345
StopCallStatus:
  type: object
  additionalProperties: false
  description: |
    Status properties for the vehicle call at this stop. Provided by OJP.
  properties:
    order:
      description: |
        Sequence number of this stop in the service pattern of the journey.
      type:
      - integer
      - 'null'
      format: int32
      minimum: 0
    requestStop:
      description: |
        The vehicle journey calls at this stop only on-demand.
      type:
      - boolean
      - 'null'
      default: false
    unplannedStop:
      description: |
        This stop has not been planned by the planning department.
      type:
      - boolean
      - 'null'
      default: false
    notServicedStop:
      description: |
        The vehicle will not call at this stop despite earlier planning.
      type:
      - boolean
      - 'null'
      default: false
    noBoardingAtStop:
      description: |
        Boarding will not be allowed at this stop of this journey.
      type:
      - boolean
      - 'null'
      default: false
    noAlightingAtStop:
      description: |
        Alighting will not be allowed at this stop of this journey.
      type:
      - boolean
      - 'null'
      default: false
    isBorderPoint:
      description: |
        Indicates whether the stop is recognized by the system as a border point between two or more countries.
      type:
      - boolean
      - 'null'
      default: false
    attributes:
      type: array
      items:
        $ref: ../_common.yml#/GeneralAttribute
StopPlace:
  description: |
    A place extended by accessibility limitation properties and some attributes of the associated equipment,
    comprising one or more places where vehicles may stop and where passengers may board or leave vehicles
    or prepare their trip, and which will usually have one or more wellknown names. Provided by OJP.
  allOf:
  - $ref: ./place.yml#/Place
StopPlaceRef:
  description: |
    Reference to a Stop Place using URNs to define code.
    For UIC see UIC MERITS/TAP-TSI station codes. Provided by OJP.
  allOf:
  - $ref: ./place.yml#/PlaceRef
  - type: object
    additionalProperties: false
    required:
    - stopPlaceRef
    properties:
      stopPlaceRef:
        type: string
        examples:
        - urn:uic:stn:8503000
TimedLeg:
  type: object
  additionalProperties: false
  description: |
    A leg which is bound to a timetabled schedule. Corresponds to a ride. Provided by OJP.
  required:
  - start
  - end
  - service
  properties:
    start:
      $ref: '#/Board'
    intermediates:
      type: array
      items:
        $ref: '#/Intermediate'
    end:
      $ref: '#/Alight'
    service:
      $ref: '#/DatedJourney'
    operatingDays:
      $ref: '#/OperatingDays'
    operatingDaysDescription:
      description: |
        Textual description of the operation days, e.g. 'Monday to Friday' or 'not on holidays'.
      type:
      - string
      - 'null'
    duration:
      type:
      - string
      - 'null'
      format: duration
    legTrack:
      $ref: ../trip.yml#/LegTrack
    parallelServices:
      type: array
      items:
        $ref: ../transportable.yml#/ParallelService
    co2Emission:
      $ref: ../_common.yml#/Quantity
    attributes:
      type: array
      items:
        $ref: ../_common.yml#/GeneralAttribute
TransferLeg:
  type: object
  additionalProperties: false
  description: |
    A leg which links other legs of a trip where a transfer between different places is required.
    Provided by OJP.
  required:
  - start
  - end
  properties:
    type:
      $ref: ../trip.yml#/TransferType
    start:
      $ref: ./place.yml#/PlaceRef
    end:
      $ref: ./place.yml#/PlaceRef
    description:
      description: human readable description of the leg
      type: string
    timeWindowStart:
      description: |
        Time at which window begins.
      type:
      - string
      - 'null'
      format: date-time
    timeWindowEnd:
      description: |
        Time at which window ends.
      type:
      - string
      - 'null'
      format: date-time
    duration:
      description: |
        Overall duration of this interchange.
      type:
      - string
      - 'null'
      format: duration
      examples:
      - PT20M
    feasibility:
      $ref: ../trip.yml#/TripFeasibility
    attributes:
      type: array
      items:
        $ref: ../_common.yml#/GeneralAttribute
    pathGuidance:
      $ref: ../place.yml#/PathGuidance
    situationRefs:
      type: array
      items:
        $ref: ./_common.yml#/SituationRef
    co2Emission:
      $ref: ../_common.yml#/Quantity
Trip:
  type: object
  additionalProperties: false
  description: |
    A complete trip from origin to destination. Provided by OJP.
  required:
  - id
  - duration
  - direction
  - startTime
  - endTime
  - transfers
  - legs
  properties:
    id:
      description: |
        Id of this trip for referencing purposes. Unique within a trip list.
      type: string
      maxLength: 32768
    externalRef:
      description: |
        External reference of this trip for referencing purposes.
      type:
      - string
      - 'null'
    summary:
      description: |
        A human-readable description of the trip.
      type:
      - string
      - 'null'
    duration:
      description: |
        Overall duration of the trip
      type: string
      format: duration
      examples:
      - PT20M
    direction:
      $ref: ../trip.yml#/TripDirectionType
    origin:
      $ref: ./place.yml#/PlaceRef
    originName:
      description: Name of the origin place
      type:
      - string
      - 'null'
    destination:
      $ref: ./place.yml#/PlaceRef
    destinationName:
      description: Name of the destination place
      type:
      - string
      - 'null'
    startTime:
      description: |
        Departure time at origin.
      type: string
      format: date-time
    endTime:
      description: |
        Arrival time at destination
      type: string
      format: date-time
    transfers:
      description: |
        Number of interchanges
      type: integer
      format: int32
      minimum: 0
    distance:
      description: |
        Distance in meters over the the complete trip, i.e., including transfer legs.
      $ref: ../_common.yml#/Distance
    legs:
      description: |
        Legs ot the trip
      type: array
      items:
        $ref: '#/TripLeg'
      minItems: 1
    operatingDays:
      $ref: '#/OperatingDays'
    operatingDaysDescription:
      description: |
        Textual description of the operation days, e.g. 'Monday to Friday' or 'Not on holidays'.
      type:
      - string
      - 'null'
    feasibility:
      $ref: ../trip.yml#/TripFeasibility
    situationFullRefs:
      type: array
      items:
        $ref: ./_common.yml#/SituationRef
    tripStatus:
      $ref: ../trip.yml#/TripStatus
    isAlternativeTrip:
      description: |
        indication that this trip was found due to the request parameter to search for alternatives
      type: boolean
    _links:
      $ref: ../_common.yml#/Links
TripChangeCriteria:
  type: object
  additionalProperties: false
  description: |
    Trip change request structure. Provided by OJP.
  required:
  - tripResult
  properties:
    tripChangeParameter:
      $ref: ../trip.yml#/TripChangeParameter
    tripResult:
      $ref: ../trip.yml#/TripResult
    tripContext:
      $ref: ../trip.yml#/TripContext
TripCollectionResponse:
  type: object
  additionalProperties: false
  description: |
    Trip response structure. Provided by OJP.
  required:
  - id
  properties:
    problems:
      type: array
      items:
        $ref: ../_common.yml#/Problem
    id:
      type: string
    trips:
      type: array
      items:
        $ref: '#/Trip'
    tripSummaries:
      type: array
      items:
        $ref: '#/TripSummary'
    tripContext:
      $ref: ../trip.yml#/TripContext
    _links:
      $ref: ../_common.yml#/Links
TripDataFilter:
  type: object
  additionalProperties: false
  description: |
    Data to be included/excluded from search, f.e. modes, carriers. Provided by OJP.
  properties:
    ptModeFilter:
      $ref: ./_common.yml#/ModeFilter
    carrierFilter:
      $ref: ./_common.yml#/CarrierFilter
    serviceBrandFilter:
      $ref: ./_common.yml#/ServiceBrandFilter
    vehicleFilter:
      $ref: ../transportable.yml#/VehicleFilter
TripLeg:
  type: object
  additionalProperties: false
  description: "A single stage of a trip that is made without change of service by the traveller (ie:\nbetween each interchange).\
    \ \nNote: The OJP Leg follows a slightly different semantic and allows legs to be split due to technical reasons like\
    \ a change of service formation. This is not allowed in OSDM. The Leg in OSDM is the Leg in the traveler perspective on\
    \ which he dooes not need to change to a different physical service. The servide itself might change its name, attributes\
    \ or formation within the leg.\n"
  required:
  - id
  properties:
    id:
      description: |
        Id of this trip leg. Unique within trip result. A seqId is a leg id.
      type: string
    externalRef:
      description: |
        External reference of this leg for referencing purposes.
      type:
      - string
      - 'null'
    timedLeg:
      $ref: '#/TimedLeg'
    transferLeg:
      $ref: '#/TransferLeg'
    continuousLeg:
      $ref: '#/ContinuousLeg'
    changed:
      description: indicates that the leg was changed via a trip change request
      type: boolean
TripMobilityFilter:
  type: object
  additionalProperties: false
  description: |
    Base mobility options to be applied for both public and individual transport.
    Provided by OJP.
  properties:
    baseMobilityFilter:
      description: mobility filters to be applied for public and individual transport
      $ref: ../trip.yml#/TripMobilityFilterItems
    bikeTransport:
      description: |
        The user wants to carry a bike on public transport.
      type:
      - boolean
      - 'null'
      default: false
    walkSpeed:
      description: |
        Deviation from average walk speed in percent. 100% percent is average speed.
      type: integer
      format: int32
      default: 100
    additionalTransferTime:
      description: |
        Additional time added to all transfers (also to transfers between individual to
        public transport).
      type:
      - string
      - 'null'
      format: duration
      examples:
      - PT0S
    minimalTransferTime:
      type:
      - string
      - 'null'
      format: duration
TripParameters:
  type: object
  additionalProperties: false
  description: |
    Options to control the search behavior and response contents.
    Provided by OJP.
  properties:
    dataFilter:
      $ref: '#/TripDataFilter'
    policyFilter:
      $ref: ../trip.yml#/TripPolicyFilter
    mobilityFilter:
      $ref: '#/TripMobilityFilter'
    contentFilter:
      $ref: ../trip.yml#/TripContentFilter
TripSearchCriteria:
  type: object
  additionalProperties: false
  description: |
    Trip request structure. Provided by OJP.
  required:
  - origin
  - destination
  properties:
    departureTime:
      description: |
        Needs to be in local date time format of the stop. Exactly one of `departureTime` or `arrivalTime` must be provided.
      type:
      - string
      - 'null'
      format: date-time
    arrivalTime:
      description: |
        Needs to be in local date time format of the stop. Exactly one of `departureTime` or `arrivalTime` must be provided.
      type:
      - string
      - 'null'
      format: date-time
    origin:
      $ref: ./place.yml#/PlaceRef
    destination:
      $ref: ./place.yml#/PlaceRef
    vias:
      description: "Ordered series of points where the journey must pass through. If more\nthan one via point is given all\
        \ of them must be obeyed - in the correct\norder. The server is allowed to replace a via stop by equivalent stops.\n\
        \nTripDataFilters given at a via apply to the section after that via. To apply a TripDataFilter for \nthe first section\
        \ (between the origin and the first via), use the TripDataFilter within the\nTripParameters structure.\n"
      type: array
      items:
        $ref: '#/TripVia'
    notVias:
      type: array
      items:
        $ref: ./place.yml#/PlaceRef
    noChangeAt:
      type: array
      items:
        $ref: ./place.yml#/PlaceRef
    parameters:
      $ref: '#/TripParameters'
    embed:
      description: |
        Influences whether referenced resources are returned in full or as references only. Proposed default ALL
      type: array
      items:
        $ref: ../trip.yml#/TripsCollectionResponseContent
    returnSearchParameters:
      $ref: ../trip.yml#/ReturnSearchParameters
TripSpecificationSummary:
  type: object
  additionalProperties: false
  description: "Trip specification summary. Provided by OJP. \nIt requires the id of an already existing trip to change and\
    \ specifies the parameters which must be used to generate the new trip.\n"
  required:
  - id
  properties:
    id:
      description: The id of an already existing trip to change.
      type: string
      maxLength: 32768
    origin:
      $ref: ./place.yml#/PlaceRef
    destination:
      $ref: ./place.yml#/PlaceRef
TripSummary:
  type: object
  additionalProperties: false
  description: |
    Trip summary. Provided by OJP.
  required:
  - id
  properties:
    id:
      description: |
        Id of this trip for referencing purposes. Unique within trip response.
      type: string
      maxLength: 32768
    summary:
      type:
      - string
      - 'null'
    externalRef:
      type:
      - string
      - 'null'
    startTime:
      description: |
        Departure time at origin.
      type:
      - string
      - 'null'
      format: date-time
    endTime:
      description: |
        Arrival time at destination.
      type:
      - string
      - 'null'
      format: date-time
    duration:
      description: |
        Overall duration of the trip.
      type:
      - string
      - 'null'
      format: duration
    origin:
      $ref: ./place.yml#/PlaceRef
    originName:
      type:
      - string
      - 'null'
      description: Name of the origin place.
    destination:
      $ref: ./place.yml#/PlaceRef
    destinationName:
      type:
      - string
      - 'null'
      description: Name of the destination place.
    transfers:
      type:
      - integer
      - 'null'
      format: int32
    distance:
      $ref: ../_common.yml#/Distance
TripVia:
  type: object
  additionalProperties: false
  description: |
    Via restrictions for a trip. Provided by OJP.
    A TripDataFilter given applies to the section after this via.
  required:
  - viaPlace
  properties:
    viaPlace:
      $ref: ./place.yml#/PlaceRef
    dwellTime:
      description: |
        desired dwell time at the via place
      type:
      - string
      - 'null'
      format: duration
      examples:
      - PT30M
    dataFilter:
      $ref: '#/TripDataFilter'
