      $ref: ./_common.yml#/Links
ProductResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    product:
      $ref: '#/Product'
ProductSearchRequest:
  type: object
  additionalProperties: false
  description: |
    Search criteria to search for products
  properties:
    id:
      description: |
        id of the product
      type:
      - string
      - 'null'
    types:
      type: array
      items:
        $ref: '#/ProductType'
    codes:
      description: |
        The product codees to be searched.
      type: array
      items:
        type: string
    flexibilities:
      type: array
      items:
        $ref: ./offer.yml#/Flexibility
    serviceClasses:
      type: array
      items:
        $ref: ./_common.yml#/ServiceClass
    travelClasses:
      type: array
      items:
        $ref: ./_common.yml#/TravelClass
    fulfillmentOptions:
      type: array
      items:
        $ref: ./fulfillment.yml#/FulfillmentOption
    productTags:
      description: product tags associated with the product
