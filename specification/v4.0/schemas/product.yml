  - ADMISSION_MULTI_RIDE
  - ADMISSION_POINT2POINT
  - UPGRADE_PASS
  - UPGRADE_MULTI_RIDE
  - UPGRADE_POINT2POINT
  - RESERVATION
  - ANCILLARY_SERVICE
  - ANCILLARY_ITEM
  - REDUCTION_CARD
