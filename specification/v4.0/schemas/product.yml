GeneralAttributeMasterData:
  type: object
  additionalProperties: false
  required:
  - text
  - code
  properties:
    text:
      description: text to be displayed to the user
      $ref: ./_common.yml#/Text
    code:
      type:
      - string
      - 'null'
    key:
      type:
      - string
      - 'null'
    value:
      type:
      - string
      - 'null'
    facilities:
      type: array
      items:
        $ref: ./offer.yml#/GroupedFacilityItem
    mandatory:
      description: true = mandatory to be displayed to the user
      type: boolean
    importance:
      description: importance as percentage
      $ref: ./_common.yml#/Percentage
    _links:
      $ref: ./_common.yml#/Links
MasterDataValidity:
  type: object
  description: "Validity of masterdata. The dates might relate to the sales date or the travel date. It indicates the validity\
    \ of masterdata \nnot the validity of offers, bookings or fulfiullments related to the master data. \nWhen related to\
    \ the sales process on historic data it is related to the createdOn timestamp of the booking part.\nWhen related to the\
    \ travel it indicates the validity of masterdata related to the travel (e.g. product definitions, zone definition). \n\
    The dates related to the trael date must be provided in the offset format.\n"
  required:
  - validFrom
  - validUntil
  properties:
    validFrom:
      description: |
        start of the validity (inclusive)
      type: string
      format: date-time
      examples:
      - '2024-12-31T00:00:00+01:00'
    validUntil:
      description: |
        end of the validity (exclusive)
      type: string
      format: date-time
      examples:
      - '2025-12-31T00:00:00+01:00'
Product:
  type: object
  additionalProperties: false
  description: |
    Structured description of the product, its name, comfort and sales / after-sales conditions
  required:
  - id
  - code
  - owner
  - flexibility
  properties:
    id:
      description: |
        id of the product
      type: string
    summary:
      description: |
        A human-readable description of the product.
      type:
      - string
      - 'null'
    type:
      $ref: '#/ProductType'
    code:
      description: |
        The product code expressed in the provider system (could be a
        mapping from an even lower-level provider).
      type: string
      examples:
      - PT00AD
    description:
      description: |
        Textual description of the product.
      type:
      - string
      - 'null'
    owner:
      $ref: ./_common.yml#/CompanyRef
    conditions:
      description: |
        Structured description of the sales or after-sales conditions.
      type: array
      items:
        $ref: ./_common.yml#/Condition
    flexibility:
      $ref: ./offer.yml#/Flexibility
    serviceClass:
      $ref: ./_common.yml#/ServiceClass
    travelClass:
      $ref: ./_common.yml#/TravelClass
    fulfillmentOptions:
      type: array
      items:
        $ref: ./fulfillment.yml#/FulfillmentOption
    isTrainBound:
      type:
      - boolean
      - 'null'
      default: false
    isReturnProduct:
      type:
      - boolean
      - 'null'
      default: false
    serviceConstraintText:
      type:
      - string
      - 'null'
    carrierConstraintText:
      type:
      - string
      - 'null'
    descriptiveTexts:
      type: array
      items:
        $ref: ./_common.yml#/TextElement
    tariff:
      description: |
        Mapping to Tariff 42 of IRS-90918-3 (Hermes/Hosa). Helps the H2O converter in mapping
        offers to a requested tariff. See legacyReservationParameter.tariff in OSDM offline.
      type:
      - string
      - 'null'
    combinationTags:
      type: array
      items:
        $ref: ./offer.yml#/CombinationTag
    productTags:
      description: product tags associated with the product that can be used to search for offers. This can be omitted outside
        of the product master data service
      type:
      - array
      - 'null'
      items:
        type: string
    _links:
      $ref: ./_common.yml#/Links
ProductCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    products:
