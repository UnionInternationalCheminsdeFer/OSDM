AccessFeature:
  description: types of features for a guidance path transition, provided by OJP 2.0
  type: string
  x-extensible-enum:
  - ELEVATOR
  - SERIES_OF_STAIRS
  - SINGLE_STEP
  - SERIES_OF_SINGLE_STEPS
  - ESCALATOR
  - TRAVELATOR
  - RAMP
  - FOOT_PATH
  - SHUTTLE
  - OTHER
  - UNKNOWN
AccessFeatureStatus:
  description: status values of guidance path access features, provided by OJP 2.0
  type: string
  x-extensible-enum:
  - UNKNOWN
  - AVAILABLE
  - PARTIALLY_AVAILABLE
  - NOT_AVAILABLE
AccessibilityFeature:
  description: accessibility features, provided by OJP 2.0
  type: string
  x-extensible-enum:
  - LOW_FLOOR_ACCESS
  - STEP_FREE_ACCESS
  - ACCESS_WITH_STEPS
  - SLIDING_STEP
  - RAISED_KERB
  - NARROW_ENTRANCE
  - WHEEL_CHAIR_LIFT
  - MANUAL_RAMP
  - AUTOMATIC_RAMP
  - SUITABLE_FOR_WHEELCHAIRS
  - SUITABLE_FOR_UNASSISTED_WHEELCHAIRS
  - SUITABLE_FOR_SEVERELY_DISABLED
  - SUITABLE_FOR_PUSH_CHAIRS
  - SUITABLE_FOR_BICYCLES
  - TACTILE_PLATFORM_EDGES
  - TACTILE_GUIDING_STRIPS
  - TACTILE_ORAUDITORY_SIGNS
  - VISUALSIGNS
  - ELEVATOR_WITH_TACTILE_BUTTONS
  - ELEVATOR_WITH_ACOUSTIC_ANNOUNCEMENTS
  - AUDIO_INFORMATION
  - AUDIO_FOR_HEARING_IMPAIRED
  - VISUAL_DISPLAYS
  - DISPLAYS_FOR_VISUALLY_IMPAIRED
  - LARGE_PRINT_TIMETABLES
  - BOARDING_ASSISTANCE
  - ONBOARD_ASSISTANCE
  - UNACCOMPANIED_MINOR_ASSISTANCE
  - BARRIER
  - VALIDATOR
AccommodationSubType:
  type: string
  description: "Accommodation sub type definition out of the \n[Accommodation Sub Type Code List](https://osdm.io/spec/catalog-of-code-lists/#PlaceProperty)\n\
    Listed values here are examples.\n"
  default: ANY_SEAT
  x-extensible-enum:
  - ANY_SEAT
  - BISTRO
  - BICYCLE
  - BICYCLE_LOW
  - BICYCLE_MIDDLE
  - BICYCLE_HIGH
  - BUSINESS
  - BUSINESS_COMFORT
  - CABIN8
  - CAR_LARGE
  - CAR_SMALL
  - CARRE
  - CHILDREN_AREA
  - CLUB
  - CLUB_2
  - CLUB_4
  - COMPARTMENT
  - COUCHETTE_2
  - COUCHETTE_4
  - COUCHETTE_5
  - COUCHETTE_6
  - COUCHETTE_COMFORT_4
  - COUCHETTE_COMFORT_5
  - COUCHETTE_COMFORT_6
  - COUCHETTE_PRM_2
  - COUCHETTE_PRM_3
  - COUCHETTE_PRM_4
  - DOUBLE
  - DOUBLE_WC
  - DOUBLE_SWC
  - DOUBLE_S
  - EASY_ACCESS
  - EXCELLENCE
  - FAMILY
  - FRONT_VIEW
  - HISTORIC_COACH
  - KIOSQUE
  - MINI_SUITE
  - MOTOR_CYCLE
  - MOTOR_CYCLE_SC
  - NEAR_ANIMALS
  - NEAR_ASSISTANT_DOG_AREA
  - NEAR_DINING
  - NEAR_PLAY_AREA
  - NEAR_BICYCLE_AREA
  - NEAR_WHEELCHAIR
  - OPEN_SPACE
  - PANORAMA
  - PRAM
  - PRAM_WITH_SEAT
  - PREMIUM
  - RESTAURANT
  - SALON
  - SILENCE
  - SINGLE
  - SINGLE_WC
  - SINGLE_SWC
  - SLEEPERETTE
  - SOLO
  - SOLO_COM
  - SPECIAL_SLEEPER
  - TANDEM
  - TOURIST_SLEEPER_2
  - TOURIST_SLEEPER_3
  - TOURIST_SLEEPER_3_WC
  - TOURIST_SLEEPER_3_SWC
  - TOURIST_SLEEPER_4
  - WHEELCHAIR
  - WHEELCHAIR_AND_SEAT
  - WHEELCHAIR_NO_SEAT
  - WITH_ANIMALS
  - WITH_SMALL_CHILDREN
  - WITHOUT_ANIMALS
AccommodationType:
  type: string
  description: "Accommodation type definition out of the \n[Accommodation Type Code List](https://osdm.io/spec/catalog-of-code-lists/#AccomodationType)\n\
    Listed values here are examples.\n"
  default: SEAT
  x-extensible-enum:
  - SEAT
  - COUCHETTE
  - BERTH
  - VEHICLE
  - STORAGE
AvailabilityStatus:
  description: |
    status of the place or coach
  type: string
  enum:
  - ALLOCATED
  - FREE
  - RESTRICTED
  default: FREE
AvailablePlace:
  type: object
  additionalProperties: false
  description: |
    Describes the details of the available places.
  required:
  - accommodationType
  - accommodationSubType
  - legCoverage
  properties:
    accommodationType:
      $ref: '#/AccommodationType'
    accommodationSubType:
      $ref: '#/AccommodationSubType'
    placeProperties:
      description: |
        Selectable place properties for the offer. For AccommodationSubType=ANY_SEAT all available and bookable properties need to be returned to give a sales tool a list of possible selections.
      type:
      - array
      - 'null'
      items:
        $ref: '#/PlaceProperty'
    numericAvailability:
      description: |
        For the AccommodationSubType=ANY_SEAT the total amount of places for the combination of AccommodationType and AccommodationSubType needs to returned.
      type:
      - integer
      - 'null'
      format: int32
    legCoverage:
      $ref: ./trip.yml#/TripLegCoverage
AvailablePlacePreferences:
  type: object
  additionalProperties: false
  properties:
    preferenceGroups:
      description: |
        possible preferences to be requested in reservation without changing the fare
      type: array
      items:
        $ref: '#/PlacePreferenceGroup'
    graphicalReservation:
      description: |
        graphical reservation is supported, interface type 'WITH_FEE', 'NO', (https://osdm.io/spec/processes/#SeatSelectionFees)
      type:
      - string
      - 'null'
      x-extensible-enum:
      - WITHOUT_FEE
      - WITH_FEE
      - 'NO'
BoardingPositionAssignment:
  type: object
  additionalProperties: false
  description: |
    position where a service part stops
  properties:
    aimedQuayName:
      description: |
        last communicated quai, used to indicate platform changes if different from estimated quay
      type: string
    estimatedQuaiName:
      type: string
    actualQuaiName:
      type: string
    aimedQuaySectionName:
      description: last communicated quai section, used to indicate platform changes if different from estimated quai
      type: string
    estimatedQuaiSectionName:
      type: string
    actualQuaiSectionName:
      type: string
BorderRadius:
  type: object
  additionalProperties: false
  description: |
    Rounds the corners of an element's border edge.
  properties:
    topLeft:
      type:
      - integer
      - 'null'
      format: int32
    topRight:
      type:
      - integer
      - 'null'
      format: int32
    bottomRight:
      type:
      - integer
      - 'null'
      format: int32
    bottomLeft:
      type:
      - integer
      - 'null'
      format: int32
CoachAvailability:
  type: object
  additionalProperties: false
  required:
  - number
  - travelDirection
  properties:
    number:
      description: |
        Coach number
      type: string
    travelDirection:
      $ref: ./_common.yml#/TravelDirectionType
    noPassageToNextCoach:
      description: |
        Indicates that there is no passage to the next coach.
      type:
      - boolean
      - 'null'
      default: false
    decks:
      description: |
        The decks of a coach ordered in ascending order from the lowest to the highest deck. Optional as for some coaches (especially special/not reservable coach types) no coach layout might exist.
      type: array
      items:
        $ref: '#/DeckAvailability'
CoachDeckLayout:
  type: object
  additionalProperties: false
  description: |
    A deck of a coach.
  required:
  - name
  - dimension
  - id
  - deckLevel
  properties:
    name:
      type: string
      maxLength: 255
    dimension:
      $ref: '#/GridDimension'
    lowFloorEntry:
      description: |
        Typically set on the lowest deck. Empty if unknown.
      type:
      - boolean
      - 'null'
    id:
      type: string
    deckLevel:
      $ref: '#/CoachDeckLevel'
    placeGroups:
      description: |
        Groups places. No place groups might exist for special coach types (e.g. traction units without seats).
      type: array
      items:
        $ref: '#/PlaceGroup'
    graphicElements:
      type: array
      items:
        $ref: '#/GraphicElement'
    serviceIcons:
      type: array
      items:
        $ref: ./_common.yml#/ServiceIcon
CoachDeckLayoutCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    coachDeckLayouts:
      type: array
      items:
        $ref: '#/CoachDeckLayout'
    _links:
      $ref: ./_common.yml#/Links
CoachDeckLayoutResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    coachDeckLayout:
      $ref: '#/CoachDeckLayout'
CoachDeckLevel:
  type: string
  x-extensible-enum:
  - SINGLE_DECK
  - LOWER_DECK
  - MIDDLE_DECK
  - UPPER_DECK
CompartmentAvailability:
  type: object
  additionalProperties: false
  description: |
    Area within a coach deck that holds places.
  required:
  - serviceClass
  - accommodationType
  - accommodationSubType
  - places
  - isSelectable
  properties:
    serviceClass:
      $ref: ./_common.yml#/ServiceClassType
    accommodationType:
      $ref: '#/AccommodationType'
    accommodationSubType:
      $ref: '#/AccommodationSubType'
    places:
      description: |
        Seats or bicycle hooks in a coach compartment that are covered by a requested reservation fare/offerPart/bookingPart. No place availabilities must be returned for places that are NOT covered by a requested offer.
      type: array
      items:
        $ref: '#/SpecificPlaceAvailability'
      minItems: 1
    isSelectable:
      description: |
        Indicates whether the compartment is selectable as a whole only.
      type: boolean
      default: false
    number:
      description: |
        Compartment number as indicated at the compartment in the coach. A compartment number must be set if the compartment is selectable as a whole only.
      type:
      - string
      - 'null'
    status:
      $ref: '#/AvailabilityStatus'
    reservationRefs:
      description: |
        reservationRefs must be set if the compartment is selectable as a whole only
      type: array
      items:
        type: string
    selectionFee:
      $ref: ./_common.yml#/SelectionFee
CompartmentPreSelection:
  type: object
  additionalProperties: false
  description: |
    A preselected compartment
  required:
  - coach
  - compartment
  properties:
    coach:
      description: |
        Coach number
      type: string
    compartment:
      description: |
        Compartment number as indicated at the compartment in the coach.
      type: string
DeckAvailability:
  type: object
  additionalProperties: false
  description: |
    A coach deck
  properties:
    layoutId:
      description: |
        Identifies the coach deck layout. It is recommended to import coach deck layout master data periodically by calling GET /coach-deck-layouts
      type:
      - string
      - 'null'
    compartments:
      description: |
        Only compartments that match a requested place restriction must be returned (e.g. only return bike hook compartments if availabilities for a bicycle reservation offer were requested). Empty if the whole deck contains no compartments (e.g. traction unit) or no places that matches a requested place restriction.
      type: array
      items:
        $ref: '#/CompartmentAvailability'
FlexibleStopAreaAssignment:
  type: object
  additionalProperties: false
  description: |
    flexible are for boarding, e.g. a pickup area for cars
  properties:
    aimedAreaName:
      description: last communicated area, used to indicate platform changes if different from estimated quai
      type: string
    estimatedAreaName:
      type: string
    actualAreaName:
      type: string
    area:
      $ref: ./_common.yml#/Polygon
GraphicElement:
  type: object
  additionalProperties: false
  description: |
    An element in the coach deck layout (e.g. table, stair, toilet etc.).
  required:
  - rectangle
  - orientation
  - code
  properties:
    rectangle:
      $ref: '#/RectangleGeometry'
    orientation:
      $ref: '#/Orientation'
    code:
      $ref: '#/GraphicElementCode'
GraphicElementCode:
  type: string
  description: |
    See https://osdm.io/spec/catalog-of-code-lists/#GraphicsItems
  examples:
  - DRIVER_AREA
GridDimension:
  type: object
  additionalProperties: false
  description: |
    Describes the dimension of a grid element.
  required:
  - width
  - height
  properties:
    width:
      type: integer
      format: int32
    height:
      type: integer
      format: int32
    borderRadius:
      $ref: '#/BorderRadius'
GridPosition:
  type: object
  additionalProperties: false
  description: |
    Describes the position in a 3D grid on which the element must be placed. The grid origin (x=0, y=0) is on the top left, the x coordinate increases to the right, the y coordinate increases downwards and the z coordinate increases towards the foreground.
  required:
  - x
  - y
  - z
  properties:
    x:
      type: integer
      format: int32
    y:
      type: integer
      format: int32
    z:
      type: integer
      format: int32
NamedPlaceRef:
  type: object
  additionalProperties: false
  description: |
    formation of a service at a stop on arrival or departure
  required:
  - placeRef
  - name
  properties:
    placeRef:
      $ref: ./ojp/place.yml#/PlaceRef
    name:
      type: string
Orientation:
  type: integer
  format: int32
  description: |
    Orientation angle in degrees
  default: 0
  examples:
  - 90
PathGuidance:
  type: object
  description: |
    Guidance on a path, provided by OJP 2.0
  additionalProperties: false
  required:
  - sections
  properties:
    sections:
      type: array
      items:
        $ref: '#/PathGuidanceSection'
      minItems: 1
PathGuidanceAdvice:
  description: types of a guidance advices, provided by OJP 2.0
  type: string
  x-extensible-enum:
  - ORIGIN
  - DESTINATION
  - CONTINUE
  - KEEP
  - TURN
  - LEAVE
  - ENTER
  - ENTER_ROUNDABOUT
  - STAY_IN_ROUNDABOUT
  - LEAVE_ROUNDABOUT
  - ENTER_BUILD_UP_AREA
  - LEAVE_BUILD_UP_AREA
  - FREEWAY_ACCESS_RAMP
  - UNKNOWN_LANE_CHOICE
  - LEFT_LANE
  - MIDDLE_LANE
  - RIGHT_LANE
  - UNKNOWN_TURNING_KIND
PathGuidanceFollow:
  description: |
    path guidance follow advice, provided by OJP 2.0
  additionalProperties: false
  properties:
    followSignName:
      type: string
    followRoadName:
      type: string
    followDirectionName:
      type: string
    followExit:
      type: string
PathGuidancePathLink:
  description: |
    guidance path link decribing change of level, provided by OJP 2.0
  additionalProperties: false
  properties:
    transition:
      $ref: '#/PathGuidanceTransition'
    accessFeature:
      $ref: '#/AccessFeature'
    accessFeatureCount:
      type: integer
      format: int32
      minimum: 0
    accessFeatureStatus:
      $ref: '#/AccessFeatureStatus'
    accessibilityFeatures:
      type: array
      items:
        $ref: '#/AccessibilityFeature'
    situationRefs:
      type: array
      items:
        $ref: ./ojp/_common.yml#/SituationRef
    from:
      $ref: '#/PathGuidancePathLinkEnd'
    to:
      $ref: '#/PathGuidancePathLinkEnd'
PathGuidancePathLinkEnd:
  description: end or start of a guidance path link, provided by OJP 2.0
  additionalProperties: false
  properties:
    id:
      $ref: ./ojp/place.yml#/PlaceRef
    name:
      type: string
    code:
      description: public code in case one is provided
      type: string
PathGuidanceSection:
  type: object
  description: |
    Section on a guidance for a path, provided by OJP 2.0
  additionalProperties: false
  properties:
    track:
      $ref: ./trip.yml#/LegTrackSection
    turnDescription:
      type: string
    turnAction:
      $ref: '#/PathGuidanceTurnAction'
    advice:
      $ref: '#/PathGuidanceAdvice'
    roadName:
      type: string
    follow:
      $ref: '#/PathGuidanceFollow'
    directionHint:
      type: string
    absoluteBearing:
      description: azimuth, 0 = north
      type: integer
      format: int32
      minimum: 0
      maximum: 360
    situationRefs:
      type: array
      items:
        $ref: ./ojp/_common.yml#/SituationRef
    pathLink:
      $ref: '#/PathGuidancePathLink'
PathGuidanceTransition:
  description: types of a guidance path transition, provided by OJP 2.0
  type: string
  x-extensible-enum:
  - UP
  - DOWN
  - LEVEL
  - UP_AND_DOWN
  - DOWN_AND_UP
PathGuidanceTurnAction:
  description: types of a turn, provided by OJP 2.0
  type: string
  x-extensible-enum:
  - STRAIGHT-ON
  - HALF_RIGHT
  - RIGHT
  - SHARP_RIGHT
  - UTURN
  - SHARP_LEFT
  - LEFT
  - HALF_LEFT
  - UP
  - DOWN
  - GENERIC_TURN_ACTION
PlaceAllocation:
  type: object
  additionalProperties: false
  description: |
    Describes the details of the reserved place(s).
  required:
  - accommodationType
  - accommodationSubType
  - reservedPlaces
  - legCoverage
  properties:
    accommodationType:
      $ref: '#/AccommodationType'
    accommodationSubType:
      $ref: '#/AccommodationSubType'
    reservedPlaces:
      description: |
        Reserved places in a confirmed reservation.
        Reserved Place inludes multiple places, however there might be multiple objects needed in case:
        - places are in separate coaches, then one object per coach is needed
        - places have different place properties that need to be shown (e.g. 5 Places in family compartment + 4 other places)
        - optional: group places by compartments (in case compartments are indicated on the train)
      type: array
      items:
        $ref: ./offer.yml#/ReservedPlace
      minItems: 1
    legCoverage:
      $ref: ./trip.yml#/TripLegCoverage
PlaceAvailabilityCollectionResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    availablePlaces:
      type: array
      items:
        $ref: '#/AvailablePlace'
    _links:
      $ref: ./_common.yml#/Links
PlaceAvailabilityMapRequest:
  type: object
  additionalProperties: false
  description: |
    Reservation offer/bookingParts or reservation fares for which place availabilities shall be returned.
  required:
  - placeRestrictions
  properties:
    placeRestrictions:
      type: array
      items:
        $ref: '#/PlaceRestriction'
      minItems: 1
PlaceAvailabilityMapResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    vehicle:
      $ref: ./transportable.yml#/VehicleAvailability
PlaceGroup:
  type: object
  additionalProperties: false
  description: "A place group groups places by service class and optionally by accommodation sub type. A place group not necessarily\
    \ needs to be visualized (e.g. as a rectangle). Visualization can be done using ServiceIcons and GraphicElements.\n \n\
    Nevertheless, a place group can be useful for rendering of coach decks/places for which no place availabilities were returned,\
    \ as further information (service class, accommodation sub type) can be displayed .\n \nIf availabilities were returned\
    \ for a certain place, travel class and accommodation sub type values returned in the availability response must be displayed\
    \ (they replace the static travel class / accommodation sub type defined on the place group). Reason: travel class and\
    \ accommodation sub type values can dynamically change for each vehicle run.\n \nExample 1: Class upgrade\nA customer\
    \ with a second class reservation ticket might be placed on a first class seat.\n \nExample 2: New/more specific AccommodationSubType\n\
    AccommodationSubType=BUSINESS defined in static master data might be changed into AccommodationSubType=BUSINESS_COMFORT\
    \ on certain vehicle runs.\n"
  required:
  - serviceClass
  - places
  properties:
    serviceClass:
      $ref: ./_common.yml#/ServiceClassType
    accommodationType:
      $ref: '#/AccommodationType'
    accommodationSubType:
      $ref: '#/AccommodationSubType'
    places:
      description: |
        Seats or bicycle hooks in a coach compartment.
      type: array
      items:
        $ref: '#/PlaceLayout'
      minItems: 1
PlaceLayout:
  type: object
  additionalProperties: false
  description: |
    A place (e.g. a seat or bicycle hook)
  required:
  - number
  - rectangle
  - orientation
  properties:
    number:
      description: |
        The place number (unique per coach deck).
      type: string
    rectangle:
      $ref: '#/RectangleGeometry'
    orientation:
      $ref: '#/Orientation'
    placeProperties:
      description: |
        Static place properties
      type: array
      items:
        $ref: '#/PlaceProperty'
PlaceMasterData:
  type: object
  additionalProperties: false
  description: |
    A geographic place of any type which may be specified as the origin or destination of a trip. Provided by OJP.
  discriminator:
    propertyName: objectType
  required:
  - objectType
  - id
  - name
  properties:
    objectType:
      description: Attribute is used as discriminator for inheritance between data types.
      type: string
    name:
      description: |
        Name of this stop place for use in passenger information. Including optional translations.
      $ref: ./_common.yml#/Text
    id:
      description: |
        id  defining the place. The code is provided as URN, relative URNs are allowed with base path urn:uic:stn '0850000'
      type: string
      examples:
      - urn:uic:stn:8500000
    alternativeIds:
      description: "For a place with ids in different reference systems, the alternative ids can be returned. \nThe reference\
        \ system is encoded in the string. E.g.: 'urn:uic:std:80000', 'x_swe:stn:10000', 'ch:1:sloid:343434'\n"
      type:
      - array
      - 'null'
      items:
        type: string
    geoPosition:
      $ref: ./ojp/_common.yml#/GeoPosition
    modes:
      description: |
        List of Transport modes calling the place.
      type: array
      items:
        $ref: ./ojp/_common.yml#/Mode
    ref:
      description: |
        Reference to another a place, e.g. to link address information. Provided by OJP.
      $ref: ./ojp/place.yml#/PlaceRef
    attributes:
      type: array
      items:
        $ref: ./product.yml#/GeneralAttributeMasterData
    area:
      description: area of the place described as a polygon of geo-coordinates
      $ref: ./_common.yml#/Polygon
    _links:
      $ref: ./_common.yml#/Links
PlacePreferenceGroup:
  type: object
  additionalProperties: false
  required:
  - preferenceGroup
  - preferences
  properties:
    preferenceGroup:
      description: |
        Values from the [Reservation Preference Group Code List](https://osdm.io/spec/catalog-of-code-lists/#ReservationPreferenceGroup)
      type: string
      x-extensible-enum:
      - COMPARTMENT_TYPE
      - SPECIAL_COMPARTMENT_TYPE
      - PLACE_OR_COMPARTMENT_POSITION
      - PLACE_OR_COMPARTMENT_ALIGNMENT
      - PLACE_OR_COMPARTMENT_FEATURE
      - PLACE_OR_COMPARTMENT_LOCATION
    preferences:
      description: "Place preferences in the group. \nValues from the [Place Property Code List](https://osdm.io/spec/catalog-of-code-lists/#PlaceProperty)\n"
      type: array
      items:
        type: string
      minItems: 1
      x-extensible-enum:
      - AISLE_SEAT
      - AIR-CONDITIONED
      - BISTRO
      - BICYCLE
      - BICYCLE_LOW
      - BICYCLE_MIDDLE
      - BICYCLE_HIGH
      - BUSINESS
      - BUSINESS_COMFORT
      - CABIN8
      - CARRE
      - CHILDREN_AREA
      - CLUB_2
      - CLUB_4
      - COMPARTMENT
      - CONNECTING_DOOR
      - EASY_ACCESS
      - FACE_2_FACE
      - EXCELLENCE
      - FAMILY
      - FRONT_VIEW
      - HISTORIC_COACH
      - INCLUDING_MEAL
      - INCLUDING_DRINK
      - KIOSQUE
      - LADIES
      - LOWER_BED
      - LOWER_DECK
