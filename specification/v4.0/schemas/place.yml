PlaceResponse:
  type: object
  additionalProperties: false
  required:
  - places
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    places:
      type: array
      items:
        $ref: ./ojp/place.yml#/Place
      minItems: 1
    _links:
      $ref: ./_common.yml#/Links
PlaceRestriction:
  type: object
  additionalProperties: false
  description: |
    Reservation based place selection criteria. Each requested place selection criterion will only be considered if it is covered by the referenced reservation offerPart/bookingPart. E.g. place selection criterion serviceClass=HIGH will only be considered if reservationRef references a first/high class offer.
  required:
  - reservationRef
  properties:
    reservationRef:
      type: string
    serviceClass:
      $ref: ./_common.yml#/ServiceClassType
    accommodationSubTypes:
      description: |
        Specifies the accommodation sub types for which place availabilities shall be returned.
      type: array
      items:
        $ref: '#/AccommodationSubType'
PlaceSelection:
  type: object
  additionalProperties: false
  description: |
    Place selection options and selected options in an offer
    - reference place for adjacent reservation
    - selected optional place properties
    - selected places from a graphical place selection
  required:
  - reservationId
  properties:
    reservationId:
      type: string
    referencePlace:
      $ref: '#/SelectedReferencePlace'
    accommodations:
      type: array
      items:
        $ref: '#/SelectedAccommodation'
    places:
      type: array
      items:
        $ref: '#/SelectedPlace'
PlacesMasterDataResponse:
  description: master data on places
  type: object
  additionalProperties: false
  required:
  - places
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    places:
      type: array
      items:
        $ref: '#/PlaceMasterData'
      minItems: 1
RectangleGeometry:
  type: object
  additionalProperties: false
  description: |
    Describes a two-dimensional rectangle
  required:
  - position
  - dimension
  properties:
    position:
      $ref: '#/GridPosition'
    dimension:
      $ref: '#/GridDimension'
SelectedAccommodation:
  type: object
  additionalProperties: false
  description: |
    Place selection of places for reservation linked to passengers.
  required:
  - passengerRefs
  - accommodationType
  - accommodationSubType
  properties:
    passengerRefs:
      description: |
        Id of the passenger
      type: array
      items:
        type: string
      minItems: 1
    accommodationType:
      $ref: '#/AccommodationType'
    accommodationSubType:
      $ref: '#/AccommodationSubType'
    placeProperties:
      description: |
        Properties of places as defined in 90810-10.
        selection from the optional place properties provided in the offer
      type:
      - array
      - 'null'
      items:
        $ref: '#/PlaceProperty'
SelectedPlace:
  type: object
  additionalProperties: false
  description: |
    selected place in case of graphical booking
  required:
  - coachNumber
  - placeNumber
  - passengerRef
  properties:
    coachNumber:
      type: string
    placeNumber:
      type: string
    passengerRef:
      description: |
        Id of the passenger
      type: string
SelectedReferencePlace:
  type: object
  additionalProperties: false
  description: |
    reference place for an adjacent reservation
  required:
  - coachNumber
  - placeNumber
  properties:
    coachNumber:
      type: string
    placeNumber:
      type: string
SpecificPlaceAvailability:
  type: object
  additionalProperties: false
  description: |
    Availability status of a specific place.
  required:
  - number
  - reservationRefs
  properties:
    number:
      description: |
        Place number as indicated at the place in the coach.
      type: string
    status:
      $ref: '#/AvailabilityStatus'
    reservationRefs:
      description: |
        References requested reservation offerParts/bookingParts that allow the selection of the place.
        This allows clients to link place availabilities with the corresponding reservation fare/offerPart/bookingPart. E.g. link a bicycle hook with a bicycle reservationOfferPart.
      type: array
      items:
        type: string
      minItems: 1
    selectionFee:
      $ref: ./_common.yml#/SelectionFee
