AlightSpecification:
  type: object
  additionalProperties: false
  description: |
    Minimal alight specification
  required:
  - stopPlaceRef
  - serviceArrival
  properties:
    stopPlaceRef:
      $ref: ./ojp/trip.yml#/StopPlaceRef
    replacedPlaceRef:
      description: reference to the original place in case of a replacement (e.g. bus stop of a replacement bus for a train)
      $ref: ./ojp/trip.yml#/StopPlaceRef
    serviceArrival:
      $ref: ./_common.yml#/ServiceTime
BoardSpecification:
  type: object
  additionalProperties: false
  description: |
    Minimal board specification.
  required:
  - stopPlaceRef
  - serviceDeparture
  properties:
    stopPlaceRef:
      $ref: ./ojp/trip.yml#/StopPlaceRef
    replacedPlaceRef:
      description: reference to the original place in case of a replacement (e.g. bus stop of a replacement bus for a train)
      $ref: ./ojp/trip.yml#/StopPlaceRef
    serviceDeparture:
      $ref: ./_common.yml#/ServiceTime
IntermediateSpecification:
  type: object
  additionalProperties: false
  description: |
    Minimal intermediate specification.
  required:
  - stopPlaceRef
  - serviceArrival
  - serviceDeparture
  properties:
    stopPlaceRef:
      $ref: ./ojp/trip.yml#/StopPlaceRef
    serviceArrival:
      $ref: ./_common.yml#/ServiceTime
    serviceDeparture:
      $ref: ./_common.yml#/ServiceTime
LegTrack:
  type: object
  additionalProperties: false
  description: |
    geographic view of the leg
  properties:
    sections:
      type: array
      items:
        $ref: '#/LegTrackSection'
LegTrackSection:
  type: object
  additionalProperties: false
  description: |
    geographic view of the leg
  properties:
    start:
      $ref: ./ojp/place.yml#/PlaceRef
    positions:
      type: array
      items:
        $ref: ./ojp/_common.yml#/GeoPosition
    end:
      $ref: ./ojp/place.yml#/PlaceRef
    duration:
      type: string
      format: duration
    distance:
      $ref: ./_common.yml#/Distance
      minimum: 0
NonTripSearchCriteria:
  type: object
  additionalProperties: false
  description: "Defines the requested validity when searching specifically for a non-trip Offer. \n\nThe geographical validity\
    \ can either be specified by a list of nutsCodes, by a list of places (e.g. stations) with the semantics that trips between\
    \ either of any of the listed stations are covered (e.g. Frankfurt (Main) Hbf, Friedberg(Hess) and Hanau Hbf, which would\
    \ imply that any travel between these stations is to be covered), or a list of zones (e.g. with carrier urn:vdv:rmv, the\
    \ zones with the ids 50, 2501 and 3001 would cover the same area as the list of stations above).\n"
  properties:
    validFrom:
      type:
      - integer
      - 'null'
      format: date-time
    nutsCodes:
      description: |
        Nomenclature des units territoriales statistiques COMMISSION REGULATION (EU) No 31/2011
      type:
      - array
      - 'null'
      items:
        type: string
    zones:
      type: array
      items:
        $ref: ./fare.yml#/ZoneDefinition
    places:
      type: array
      items:
        $ref: ./ojp/place.yml#/PlaceRef
ReturnSearchParameters:
  type: object
  additionalProperties: false
  description: |
    This property can be used in case a return trip is being requested.
    This will allow to benefit from return-specific fares or product
  properties:
    outboundOfferIds:
      description: |
        Needs to be provided when creating the collection of inbound travels so that the provider
        can relate the inbound travels to the outbound travels context.
      type:
      - array
      - 'null'
      items:
        type: string
        maxLength: 32768
    outboundTripIds:
      description: |
        Needs to be provided when creating collection of offers covering both
        outbound and inbound (return) journey.
      type:
      - array
      - 'null'
      items:
        type: string
        maxLength: 32768
    departureTime:
      description: |
        Needs to be in local date time format of the stop. Exactly one of `departureTime` or `arrivalTime` must be provided.
      type:
      - string
      - 'null'
      format: date-time
    arrivalTime:
      description: |
        Needs to be in local date time format of the stop. Exactly one of `departureTime` or `arrivalTime` must be provided.
      type:
      - string
      - 'null'
      format: date-time
    origin:
      $ref: ./ojp/place.yml#/PlaceRef
    destination:
      $ref: ./ojp/place.yml#/PlaceRef
    vias:
      description: "Ordered series of points where the journey must pass through. If more\nthan one via point is given all\
        \ of them must be obeyed - in the correct\norder. The server is allowed to replace a via stop by equivalent stops.\n\
        \nTripDataFilters given at a via apply to the section after that via. To apply a TripDataFilter for \nthe first section\
        \ (between the origin and the first via), use the TripDataFilter within the\nTripParameters structure.\n"
      type: array
      items:
        $ref: ./ojp/trip.yml#/TripVia
    parameters:
      $ref: ./ojp/trip.yml#/TripParameters
Route:
  type: object
  additionalProperties: false
  description: |
    Route description including the first and last real stopPoint
  properties:
    viaSummary:
      description: |
        Printable representation of the allowed routing ("Wegetext") excluding the start and end point (via-description).
      type:
      - string
      - 'null'
      maxLength: 140
    routeStartName:
      description: name of the route start, either a station or a tariff border. When concatenated with another fare only
        one of the end and start points remains.
      type:
      - string
      - 'null'
      maxLength: 40
    routeEndName:
      description: name of the route end, either a station or a tariff border. When concatenated with another fare only one
        of the end and start points remains.
      type:
      - string
      - 'null'
      maxLength: 40
      examples:
      - Salzburg Hbf (GR)
    routeItem:
      $ref: '#/RouteItem'
    routeItemList:
      description: |
        list of route items referenced within the list
      type: array
      items:
        $ref: '#/RouteItem'
RouteItem:
  type: object
  additionalProperties: false
  description: |
    Items to compose routes (Note - replaced viaStation, content compliant with viaStation in IRS 90918-4 and 90918-9)
  properties:
    alternativeRouteItemIndices:
      description: |
        list of alternative route parts to be used on this travel path referenced by the index in the provided list of route items
      type:
      - array
      - 'null'
      items:
        type: integer
        format: int32
    carrierConstraint:
      $ref: ./fare.yml#/CarrierConstraint
    routeItemIndices:
      description: |
        sequence of route items along the travel path referenced by the index in the provided list of route items
      type: array
      items:
        type:
        - integer
        - 'null'
        format: int32
    serviceConstraint:
      $ref: ./_common.yml#/ServiceConstraint
    station:
      $ref: ./ojp/trip.yml#/StopPlace
    fareReferenceStation:
      $ref: ./fare.yml#/FareReferenceStation
RouteSpecification:
  type: object
  properties:
    origin:
      $ref: ./ojp/place.yml#/PlaceRef
    destination:
      $ref: ./ojp/place.yml#/PlaceRef
Section:
  type: object
  additionalProperties: false
  description: |
    Allows to indicate the sub-part of the trip. LegIds are only relevant if
    a trip can be referenced. When absent, the totality of the trip is priced.
  properties:
    startPlace:
      $ref: ./ojp/place.yml#/PlaceRef
    startLegId:
      type:
      - string
      - 'null'
    endPlace:
      $ref: ./ojp/place.yml#/PlaceRef
    endLegId:
      type:
      - string
      - 'null'
    externalTripRef:
      description: reference to a trip in case multiple trips are provided
      type:
      - string
      - 'null'
      maxLength: 32768
StopBehavior:
  type: string
  enum:
  - ORIGIN_DESTINATION_ONLY
  - REAL_BOARDING_ALIGHTING
  default: ORIGIN_DESTINATION_ONLY
  description: |
    Influences what stops are to be returned in response (ORIGIN_DESTINATION_ONLY returns no intermediate stops; REAL_BOARDING_ALIGHTING returns all stops except virtual stops). Default value: ORIGIN_DESTINATION_ONLY
TimedLegSpecification:
  type: object
  additionalProperties: false
  description: |
    A minimal timed leg specification.
  required:
  - start
  - end
  - service
  properties:
    start:
      $ref: '#/BoardSpecification'
    intermediates:
      type: array
      items:
        $ref: '#/IntermediateSpecification'
    end:
      $ref: '#/AlightSpecification'
    service:
      $ref: ./ojp/trip.yml#/DatedJourney
TimeFrameSegmentation:
  type: string
  enum:
  - HOUR
  - DAY
TrainLink:
  type: object
  additionalProperties: false
  required:
  - fromStation
  - toStation
  - train
  - travelDate
  - serviceBrandAbbreviation
  properties:
    fromStation:
      $ref: ./ojp/trip.yml#/StopPlaceRef
    toStation:
      $ref: ./ojp/trip.yml#/StopPlaceRef
    train:
      type: string
    travelDate:
      description: |
        date and time of the departure where the train link starts
      type: string
      format: date-time
    serviceBrandCode:
      $ref: ./_common.yml#/ServiceBrandCode
    serviceBrandAbbreviation:
      description: |
        Abbreviation of the service brand, e.g. 'IC', 'TGV'. See the OSDM code list. Needs to match the service brand code.
      type: string
TransferType:
  description: |
    Modes dedicated to perform transfers. Provided by OJP.
  type: string
  x-extensible-enum:
  - WALK
  - SHUTTLE
  - REMAIN_IN_VEHICLE
  - CHANGE_WITHIN_VEHICLE
  - CHECK_IN
  - CHECK_OUT
  - PARK_AND_RIDE
  - BIKE_AND_RIDE
  - CAR_HIRE
  - BIKE_HIRE
  - PROTECTED_CONNECTION
  - GUARANTEED_CONNECTION
TripAllocationConstraint:
  type: object
  additionalProperties: false
  description: |
    constraint on the use of a multiple trip ticket
  required:
  - allocationUnit
  - requiredProcesses
  properties:
    allocationUnit:
      $ref: '#/TripAllocationUnit'
    maxUnits:
      description: |
        maximum number of allowed units to be allocated
      type:
      - integer
      - 'null'
      format: int32
    durationUnit:
      description: |
        multiples of this duration can be allocated
      type:
      - string
      - 'null'
      format: duration
      examples:
      - PT30M
    requiredProcesses:
      description: |
        one of the listed processes is required for the allocation of a single trip
      type: array
      items:
        $ref: '#/TripAllocationProcess'
      minItems: 1
TripAllocationProcess:
  description: |
    Values from the [Trip Allocation Process Code List](https://osdm.io/spec/catalog-of-code-lists/#TripAllocationProcess)
    Known Values:
    - NONE: Individual trips don't need to be allocated.
    - MANUAL: The passenger has to allocate a trip manually (This should not be used as it is by design non-interoperable).
    - ACTIVATION: Individual trips can be allocated by activation of the ticket.
    - FULFILLMENT: A new fulfillment needs to be created to allocate a trip.
  type: string
  x-extensible-enum:
  - NONE
  - MANUAL
  - ACTIVATION
  - FULFILLMENT
TripAllocationUnit:
  description: "Values from the [Trip Allocation Unit Code List](https://osdm.io/spec/catalog-of-code-lists/#TripAllocationUnit)\n\
    Unit to allocate trips in a multi-trip fare. Trips can be allocated per day (e.g. Eurail) or per\nduration (e.g. multiples\
    \ of a duration unit to cover the trip) or as single trips (e.g. carnet))\nKnown Values:\n- NONE: Individual trips don't\
    \ need to be allocated. \n- TRIP: allocation per individual trip.\n- DAY: The allocation is per travel day.\n- DURATION:\
    \ the allocation is per duration.\n"
  type: string
  x-extensible-enum:
  - NONE
  - TRIP
  - DAY
  - DURATION
TripChangeParameter:
  type: object
  additionalProperties: false
  description: parameters to change a trip at a leg
  properties:
    changeLegRef:
      type: string
    additionaWaitingTime:
      type: string
      format: duration
    tripParameter:
      $ref: ./ojp/trip.yml#/TripParameters
TripCollectionRequest:
  type: object
  additionalProperties: false
  description: |
    You must define only one of tripSearchCriteria or tripSearchCriteriaMultiOd, they are mutually exclusive.
  properties:
    tripSearchCriteria:
      $ref: ./ojp/trip.yml#/TripSearchCriteria
    tripSearchCriteriaMultiOd:
      $ref: '#/TripSearchCriteriaMultiOD'
TripContentFilter:
  description: |
    Options to control the response contents.
    Provided by OJP.
  type: object
  additionalProperties: false
  properties:
    filters:
      type: array
      items:
        $ref: '#/TripContentFilterItem'
    tripSummaryOnly:
      type: boolean
      default: false
TripContentFilterItem:
  description: "- INCLUDE_TRACK_SECTIONS        \n- INCLUDE_LEG_PROJECTION       geographical description of a leg \n- INCLUDE_TURN_DESCRIPTIONS\
    \    \n- INCLUDE_ACCESS_FEATURES\n- INCLUDE_ACCESS_FEATURES_STATUS\n- INCLUDE_ACCESSABILITY_FEATURES_VISUAL_IMPAIRED \
    \  \n- INCLUDE_ACCESSABILITY_FEATURES_AUDITORY_IMPAIRED   \n- INCLUDE_ACCESSABILITY_FEATURES_MOBILITY_IMPAIRED    \n-\
    \ INCLUDE_ACCESSABILITY_FEATURES_BIKE\n- INCLUDE_ACCESSABILITY_FEATURES_GENERAL        \n- INCLUDE_PLACES_CONTEXT \n-\
    \ INCLUDE_SITUATIONS_CONTEXT    \n- INCLUDE_INTERMEDIATE_STOPS  intermediate stops within a leg    \n- INCLUDE_OPERATING_DAYS\
    \ include operating day information\n"
  type: string
  x-extensible-enum:
  - INCLUDE_TRACK_SECTIONS
  - INCLUDE_LEG_PROJECTION
  - INCLUDE_TURN_DESCRIPTIONS
  - INCLUDE_ACCESS_FEATURES
  - INCLUDE_ACCESS_FEATURES_STATUS
  - INCLUDE_ACCESSABILITY_FEATURES_VISUAL_IMPAIRED
  - INCLUDE_ACCESSABILITY_FEATURES_AUDITORY_IMPAIRED
  - INCLUDE_ACCESSABILITY_FEATURES_MOBILITY_IMPAIRED
  - INCLUDE_ACCESSABILITY_FEATURES_BIKE
  - INCLUDE_ACCESSABILITY_FEATURES_GENERAL
  - INCLUDE_PLACES_CONTEXT
  - INCLUDE_SITUATIONS_CONTEXT
  - INCLUDE_INTERMEDIATE_STOPS
  - INCLUDE_OPERATING_DAYS
TripContext:
  type: object
  additionalProperties: false
  description: context to trips
  properties:
    operators:
      type: array
      items:
        $ref: ./_common.yml#/Operator
    places:
      type: array
      items:
        $ref: ./ojp/place.yml#/Place
    situations:
      type: array
      items:
        $ref: ./ojp/_common.yml#/Situation
TripCoverage:
  type: object
  additionalProperties: false
  description: |
    The trip coverage defines which part of the trip is covered by the offer, offer part, booking or booking part, respectively.

    If neither coveredLegIds nor coveredSections are defined, the complete trip is covered.
    coveredLegIds and coveredSections are mutually exclusive, i.e. only one of the structures can be present.

    If either coveredLegIds or coveredSections is defined, the sectionIndex field must be filled to indicate which part of the trip is covered
    by the respective OfferPart or BookingPart
  required:
  - coveredTripId
  properties:
    coveredTripId:
      type: string
      maxLength: 32768
    sectionIndex:
      description: |
        Describes which part of the trip (in order) is covered by the OfferPart/BookingPart which contains this TripCoverage structure.

        This needs to be filled if either coveredLegIds or coveredSections is present.
      type:
      - integer
      - 'null'
      format: int32
      minimum: 1
    coveredLegIds:
      description: |
        Indicate which legs are covered by the specific offer. Not used for fares.
      type:
      - array
      - 'null'
      items:
        type: string
    coveredSections:
      type: array
      items:
        $ref: '#/Section'
TripDirectionType:
  type: string
  enum:
  - OUT_BOUND
  - IN_BOUND
  default: OUT_BOUND
TripFeasibility:
  description: |
    feasibility of a trip related to the required access features
    in case of SEE_SITUATIONS situations must be provided
  type: string
  x-extensible-enum:
  - ALL_ACCESS_FEATURES_AVAILABLE
  - ACCESS_FEATURES_NOT_AVAILABLE
  - ACCESS_FEATURES_PARTIALLY_AVAILABLE
  - ACCESS_FEATURES_WITH_UNKNOWN_AVAILABILITY
  - SEE_SITUATIONS
TripInterruptionConstraint:
  type: object
  additionalProperties: false
  description: |
    rules on allowed trip interruptions. Interruptions due to a train change
    indicated by a trip search must not be included here.
  required:
  - maxInterruptions
  - requiredProcesses
  properties:
    maxInterruptions:
      description: |
        maximum number of allowed interruptions
      type: integer
      format: int32
    maxDuration:
      description: |
        maximum duration of one interruption
      type:
      - string
      - 'null'
      format: duration
      examples:
      - PT30M
    totalMaxDuration:
      description: |
        maximum duration of all interruptions on the route
      type:
      - string
      - 'null'
      format: duration
      examples:
      - PT30M
    requiredProcesses:
      description: |
        one of the listed processes is required for the interruption of the trip
      type: array
      items:
        $ref: '#/TripInterruptionProcess'
      minItems: 1
TripInterruptionProcess:
  description: |
    Values from the [Trip Interruption Process Code List](https://osdm.io/spec/catalog-of-code-lists/#TripInterruptionProcess)
    Known Values:
    - NONE
    - MANUAL: passenger needs manual confirmation of train or station staff to interrupt the trip.
    - ACTIVATION: Passenger needs to deactivate the ticket during the interruption (via an app).
  type: string
  x-extensible-enum:
  - NONE
  - MANUAL
  - ACTIVATION
TripLegCoverage:
  type: object
  additionalProperties: false
  required:
  - tripId
  - legId
  properties:
    tripId:
      type: string
      maxLength: 32768
    legId:
      type: string
TripLegSpecification:
  type: object
  additionalProperties: false
  description: |
    A minimal trip leg specification.
  properties:
    externalRef:
      description: |
        External reference of this trip leg. Unique within trip result.
      type:
      - string
      - 'null'
    timedLeg:
      $ref: '#/TimedLegSpecification'
    transferLeg:
      $ref: ./ojp/trip.yml#/TransferLeg
TripMobilityFilterItem:
  description: |
    restrictions of the traveler  (List of booleans in OJP BaseTripMobilityFilter)
    NO_SIGHT  - traveler is not able to see
    NO_SINGLE_STEP  - traveler can not pass a single step
    NO_STAIRS  - traveler can not use stairs
    NO_ESCALATOR  - traveler can not use an escalator
    NO_ELEVATOR  - traveler can not use an elevator
    NO_RAMP  - traveler can not use a ramp
    NO_TRAVELATOR - traveler can not use a travelator
    LEVEL_ENTRANCE - traveller needs a level entrance
    LEVEL_ENTRANCE_OR_BOARDING_AID - traveller needs a level entrance or boarding aid
  type: string
  x-extensible-enum:
  - NO_SIGHT
  - NO_SINGLE_STEP
  - NO_STARS
  - NO_ESCALATOR
  - NO_ELEVATOR
  - NO_RAMP
  - NO_TRAVELATOR
  - LEVEL_ENTRANCE
  - LEVEL_ENTRANCE_OR_BOARDING_AID
TripMobilityFilterItems:
  description: |
    restrictions that control the trip search behavior for both public and individual transport.
    Provided by OJP.
  type: array
  items:
    $ref: '#/TripMobilityFilterItem'
  minItems: 1
TripPolicyFilter:
  description: |
    Options to control the search behavior and response contents.
    number of results > either number of results or number of results before and after are used.
    Provided by OJP.
    numberOfResults is intentionally omitted to avoid inconsistent request parameters. numberOfResults is equal to numberOfResultsBefore = 0 and numberOfResultsAfter = numberOfResults
  type: object
  additionalProperties: false
  properties:
    numberOfResultsBefore:
      type: integer
      format: int32
      default: 0
    numberOfResultsAfter:
      type: integer
      format: int32
      default: 5
    useRealtimeData:
      $ref: '#/TripRealTimeDataUsage'
      default: FULL
    transferLimit:
      description: |
        The maximum number of interchanges the user will accept per trip.
      type:
      - integer
      - 'null'
      format: int32
      minimum: 0
    optimisationMethod:
      $ref: '#/TripSearchOptimisationMethod'
    itModesToCover:
      $ref: ./person.yml#/PersonalMode
TripRealTimeDataUsage:
  description: use of real time data in a trip
  type: string
  x-extensible-enum:
  - FULL
  - EXPLANATORY
  - NONE
TripResponse:
  type: object
  additionalProperties: false
  required:
  - trip
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    trip:
      $ref: ./ojp/trip.yml#/Trip
    tripContext:
      $ref: '#/TripContext'
TripResponseContent:
  type: string
  enum:
  - ALL
  - PLACES
  - NONE
  default: ALL
TripResponseParameters:
  type: object
  additionalProperties: false
  description: |
    Options to control response contents on Trip objects.
  properties:
    stopBehavior:
      $ref: '#/StopBehavior'
TripResult:
  type: object
  additionalProperties: false
  description: |
    The trip result to be changed.
  properties:
    TripSummary:
      $ref: ./ojp/trip.yml#/TripSpecificationSummary
TripsCollectionResponseContent:
  type: string
  enum:
  - ALL
  - TRIPS
  - TRIPSUMMARIES
  - TRIP_CONTEXT
  - NONE
  default: ALL
TripSearchCriteriaMultiOD:
  type: object
  additionalProperties: false
  description: |
    Trip request structure. Provides trips from one of the origin places to one of the destination places. Provided by OJP.
  required:
  - origins
  - destinations
  properties:
    departureTime:
      description: |
        Needs to be in local date time format of the stop. Exactly one of `departureTime` or `arrivalTime` must be provided.
      type:
      - string
      - 'null'
      format: date-time
    arrivalTime:
      description: |
        Needs to be in local date time format of the stop. Exactly one of `departureTime` or `arrivalTime` must be provided.
      type:
      - string
      - 'null'
      format: date-time
    origins:
      type: array
      items:
        $ref: ./ojp/place.yml#/PlaceRef
    destinations:
      type: array
      items:
        $ref: ./ojp/place.yml#/PlaceRef
    vias:
      description: "Ordered series of points where the journey must pass through. If more\nthan one via point is given all\
        \ of them must be obeyed - in the correct\norder. The server is allowed to replace a via stop by equivalent stops.\n\
        \nTripDataFilters given at a via apply to the section after that via. To apply a TripDataFilter for \nthe first section\
        \ (between the origin and the first via), use the TripDataFilter within the\nTripParameters structure.\n"
      type: array
      items:
        $ref: ./ojp/trip.yml#/TripVia
    notVias:
      type: array
      items:
        $ref: ./ojp/place.yml#/PlaceRef
    noChangeAt:
      type: array
      items:
        $ref: ./ojp/place.yml#/PlaceRef
    parameters:
      $ref: ./ojp/trip.yml#/TripParameters
    multipleODSearchType:
      $ref: '#/TripSearchTypeMultipleOD'
    embed:
      description: |
        Influences whether referenced resources are returned in full or as references only. Proposed default ALL
      type: array
      items:
        $ref: '#/TripsCollectionResponseContent'
    returnSearchParameters:
      $ref: '#/ReturnSearchParameters'
TripSearchOptimisationMethod:
  description: |
    The optimization method to be used for the search
  type: string
  x-extensible-enum:
  - FASTEST
  - MIN_CHANGES
  - LEAST_WALKING
  - LEAST_DISTANCE
  - EARLIEST_ARRIVAL
  - LATEST_DEPARTURE
  - EARLIEST_ARRIVAL_AND_LATEST_DEPARTURE
  - MIN_NON_LEVEL_ENTRANCES
  - MIN_STAIRSE
  - BEST_FOR_VISUALLY_IMPAIRED
  - BEST_FOR_AUDITORY_IMPAIRED
  - ENVIROMENTAL_SAFETY
  - EXTRA_SAFE
  - EXTRA_RELIABLE
  - SCENIC
  - QUIET_TRAVEL
TripSearchTypeMultipleOD:
  description: |
    expected search behaviour
    'ANY' # Returning results for a single origin and destination
    'EACH_ORIGIN' # At least a distinct solution for each of the origin must be delivered.
    'EACH_DESTINATION' # At least a distinct solution for each of the origin must be delivered.
    'EACH_ORIGIN_DESTINATION' #  At least a distinct solution for each of the origin-destination pair must be delivered.origin-destination pair must be delivered.
    'SOME' # some origin-destination pairs should be returned.
  type: string
  x-extensible-enum:
  - ANY
  - EACH_ORIGIN
  - EACH_DESTINATION
  - EACH_ORIGIN_DESTINATION
  - SOME
  default: ANY
TripSpecification:
  type: object
  additionalProperties: false
  description: |
    A minimal trip specification from origin to destination.
  required:
  - legs
  properties:
    externalRef:
      description: |
        External reference of this trip for referencing purposes. Unique within a trip specification.
      type:
      - string
      - 'null'
    legs:
      type: array
      items:
        $ref: '#/TripLegSpecification'
      minItems: 1
    isPartOfInternationalTrip:
      type:
      - boolean
      - 'null'
      default: false
    returnSearchParameters:
      $ref: '#/ReturnSearchParameters'
TripStatus:
  type: object
  additionalProperties: false
  properties:
    unplanned:
      description: |
        Whether this trip is an additional one that has not been planned.
      type: boolean
      default: false
    cancelled:
      description: |
        Whether this trip is cancelled and will not be run.
      type: boolean
      default: false
    deviation:
      description: |
        Whether this trip deviates from the planned service pattern.
      type: boolean
      default: false
    delayed:
      description: |
        Whether this trip is delayed.
      type: boolean
      default: false
    infeasible:
      description: |
        Whether this trip cannot be used, due to operational delays and impossible transfers.
      type: boolean
      default: false
