AbstractBookingPart:
  type: object
  additionalProperties: false
  discriminator:
    propertyName: objectType
  required:
  - objectType
  - partType
  - id
  - createdOn
  - price
  - status
  - refundable
  - exchangeable
  properties:
    objectType:
      description: Attribute is used as discriminator for inheritance between data types.
      type: string
    partType:
      $ref: ./offer.yml#/PartType
    id:
      type: string
      maxLength: 32768
    summary:
      type: string
    createdOn:
      description: |
        Validity of offer towards passenger
      type: string
      format: date-time
    confirmedOn:
      type:
      - string
      - 'null'
      format: date-time
    confirmedFulfillmentOptions:
      $ref: ./fulfillment.yml#/FulfillmentOption
    price:
      $ref: ./_common.yml#/Price
    tripCoverage:
      type: array
      items:
        $ref: ./trip.yml#/TripCoverage
    summaryProductId:
      type: string
      description: |
        Id of the product representing the commercial attributes of this booking part. Although not currently
        mandatory, this attribute should in all cases be filled in order to allow matching a booking response
        to the data in the booking request
    products:
      description: |
        In offer mode, in almost all cases exactly one product is referenced. Only on some French
        trips consisting of a TGV and a TER two products need to be used.
        In fare mode, no product exists as first needs to created from the different fares.
      type: array
      items:
        $ref: ./offer.yml#/ProductLegAssociation
    status:
      $ref: '#/BookingPartStatus'
    pricingStatus:
      description: payment status in post-payment scenarios
      type: string
      default: PRICING_FINAL
      x-extensible-enum:
      - PRICING_UPCOMING
      - PRICING_ONGOING
      - PRICING_FINAL
    offerMode:
      $ref: ./offer.yml#/OfferMode
    bookingPartCode:
      type: string
      description: |
        The unique booking code for the part in the provider system.
    passengerIds:
      description: |
        Ids of the passengers
        Providing the passengerIds is required for passenger transport. There are uses cases (e.g. sale of merchandising articles) where no passenger is involved. Only in these cases it is allowed to omit the passengerIds.
      type: array
      items:
        type: string
      minItems: 1
    availableFulfillmentOptions:
      type: array
      items:
        $ref: ./fulfillment.yml#/FulfillmentOption
    refundable:
      $ref: ./aftersales.yml#/RefundType
    exchangeable:
      $ref: ./aftersales.yml#/ExchangeableType
    afterSaleConditions:
      description: |
        Fine grained specification of the after sale condition of the booking.
      type: array
      items:
        $ref: ./aftersales.yml#/AfterSaleCondition
    afterSalesOverrideDetails:
      $ref: ./aftersales.yml#/AfterSalesOverrideDetails
    appliedCorporateCodes:
      type: array
      items:
        $ref: ./_common.yml#/CorporateCode
    appliedPromotionCodes:
      type: array
      items:
        $ref: ./_common.yml#/PromotionCode
    appliedReductions:
      description: |
        applied reductions.
      type: array
      items:
        $ref: ./_common.yml#/AppliedReductions
    indicatedUsage:
      $ref: '#/IndicatedUsage'
    accountingRef:
      $ref: ./_common.yml#/AccountingRef
BackOfficeChangeType:
  type: string
  description: The type of change that has occurred.
  enum:
  - INITIATED
  - EVALUATING
  - DECIDED
  - SETTLED
  - INFORMATION_MISSING
  default: INITIATED
BookedOffer:
  type: object
  additionalProperties: false
  description: |
    The attribute 'offerSummary' is meaningful at trip-offer-collection response time only.
    The offerSummary must be provided for product based offers. It is not needed for fares.
  required:
  - offerId
  properties:
    offerId:
      type: string
      maxLength: 32768
      description: Note that the offerId returned does not necessarily match the offerId given in the Booking Request.
    externalRef:
      description: |
        A stable reference to the id of the booked offer in the caller's system. When received in input of a request, it must be persisted and echoed back in the response.
      type: string
    summary:
      description: |
        A human-readable description of the booked offer.
      type:
      - string
      - 'null'
    admissions:
      type: array
      items:
        $ref: ./offer.yml#/Admission
    reservations:
      type: array
      items:
        $ref: ./offer.yml#/Reservation
    ancillaries:
      type: array
      items:
        $ref: ./offer.yml#/Ancillary
    continuousServices:
      type: array
      items:
        $ref: ./continuous-service.yml#/ContinuousServiceBookingPart
    fees:
      type: array
      items:
        $ref: ./_common.yml#/AppliedFee
    fares:
      type: array
      items:
        $ref: ./fare.yml#/FareBookingPart
    tripCoverage:
      type: array
      items:
        $ref: ./trip.yml#/TripCoverage
    appliedThroughTicketTags:
      type: array
      items:
        $ref: ./offer.yml#/ThroughTicketTag
    products:
      description: |
        products must be provided in case they are referenced in booking or offer parts. Some offer parts (e.g. fares)
        do not have products assigned.
      type: array
      items:
        $ref: ./product.yml#/Product
      minItems: 1
BookedOfferPartRequest:
  type: object
  additionalProperties: false
  required:
  - offerId
  - passengerRefs
  properties:
    offerId:
      type: string
      maxLength: 32768
    ancillaryOfferIds:
      type: array
      minItems: 1
      items:
        type: string
        maxLength: 32768
    placeSelections:
      type: array
      minItems: 1
      items:
        $ref: ./place.yml#/PlaceSelection
    passengerRefs:
      type: array
      items:
        type: string
      minItems: 1
    tripCoverage:
      $ref: ./trip.yml#/TripCoverage
    inboundTripCoverage:
      $ref: ./trip.yml#/TripCoverage
BookedOfferPartResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    bookedOffers:
      type: array
      items:
        $ref: '#/BookedOffer'
BookedOfferRequest:
  type: object
  description: adding an offer to a booking as pre-booked. additional passengers that were not already in the booking are
    added in additional passengers existing passengers are referenced in passengerRef.
  additionalProperties: false
  required:
  - offers
  properties:
    offers:
      type: array
      items:
        $ref: ./offer.yml#/OfferSelection
      minItems: 1
    additionalPassengerSpecifications:
      type: array
      items:
        $ref: ./person.yml#/PassengerSpecification
    promotionCodes:
      type: array
      items:
        $ref: ./_common.yml#/PromotionCode
BookedOfferResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    bookedOfferIds:
      type: array
      items:
        type: string
        maxLength: 32768
      description: |
        IDs of offers booked by the request. Will be always provided, single of the booked offer may not be provided in bookedOffer attribute.
BookedOfferSummary:
  type: object
  additionalProperties: false
  required:
  - offerId
  - summary
  - bookingPartSummaries
  properties:
    offerId:
      type: string
      maxLength: 32768
    summary:
      type: string
    bookingPartSummaries:
      type: array
      items:
        $ref: '#/BookingPartSummary'
      minItems: 1
Booking:
  type: object
  additionalProperties: false
  required:
  - id
  - createdOn
  - passengers
  properties:
    id:
      type: string
    bookingCode:
      type: string
      description: The unique booking code in the provider system. Usually refers to an order number or PNR.
    externalRef:
      description: |
        The unique booking reference in the provider system. Usually refers to an order number or PNR.
      type:
      - string
      - 'null'
    summary:
      description: |
        A human-readable description of the booking.
      type:
      - string
      - 'null'
      examples:
      - Booking 2345 for Clemens Gantert
    createdOn:
      type: string
      format: date-time
    passengers:
      type: array
      items:
        $ref: ./person.yml#/Passenger
      minItems: 1
    purchaser:
      $ref: ./person.yml#/Purchaser
    provisionalPrice:
      description: |
        Price of all unconfirmed pre-booked parts in the booking
      $ref: ./_common.yml#/Price
    confirmedPrice:
      description: |
        Sum of all prices of confirmed parts in the booking minus the sum of all confirmed refund amounts.
      $ref: ./_common.yml#/Price
    bookedOffers:
      type: array
      items:
        $ref: '#/BookedOffer'
    trips:
      description: |
        This trip will be included in the offer if the offer is part of the booking.
      type: array
      items:
        $ref: ./ojp/trip.yml#/Trip
    tripContext:
      $ref: ./trip.yml#/TripContext
    requestedInformation:
      $ref: ./_common.yml#/RequestedInformation
    confirmationTimeLimit:
      description: |
        Time until the booking needs to be confirmed or put on hold. After that, the booking is no longer valid.
      type:
      - string
      - 'null'
      format: date-time
    fulfillmentRefs:
      type: array
      items:
        $ref: ./fulfillment.yml#/FulfillmentRefs
    fulfillmentStatus:
      $ref: ./fulfillment.yml#/FulfillmentSummaryStatus
    issuedVouchers:
      type: array
      items:
        $ref: ./_common.yml#/VoucherInformation
    documents:
      type: array
      items:
        $ref: ./fulfillment.yml#/Document
    paymentMethods:
      type: array
      items:
        $ref: ./_common.yml#/PaymentMethod
    refundOffers:
      description: "Refund offers are created with the details of the to-be-confirmed refund operation.\nOne refund offer\
        \ can then be confirmed, which turns it into a confirmedRefund. \nRefund offers in state PROPOSED might not be available\
        \ in the Booking but only \nvia the get endpoint.\n"
      type: array
      items:
        $ref: ./aftersales.yml#/RefundOffer
    confirmedRefunds:
      description: |
        Confirmed refund offers must be listed here.
      type: array
      items:
        $ref: ./aftersales.yml#/ConfirmedRefund
    releaseOffers:
      type: array
      items:
        $ref: ./aftersales.yml#/ReleaseOffer
    confirmedReleases:
      type: array
      items:
        $ref: ./aftersales.yml#/ConfirmedRelease
    cancelFulfillmentsOffers:
      type: array
      items:
        $ref: ./aftersales.yml#/CancelFulfillmentsOffer
    exchangeOperations:
      type: array
      items:
        $ref: ./aftersales.yml#/ExchangeOperation
    onHoldOffer:
      $ref: ./offer.yml#/OnHoldOffer
    relatedBookingIds:
      description: |
        If this booking has been split, this attribute references the newly created bookingIds.
      type:
      - array
      - 'null'
      items:
        type: string
    _links:
      $ref: ./_common.yml#/Links
BookingAccess:
  description: |
    used to indicate booking options not provided via the OSDM app.
    Provided by OJP.
  type: string
  x-extensible-enum:
  - PUBLIC
  - AUTHORIZED_PUBLIC
  - STAFF
BookingAccessTiming:
  description: |
    used to indicate booking options not provided via the OSDM app.
    Provided by OJP.
  type: string
  x-extensible-enum:
  - ADVANCE_ONLY
  - UNTIL_PREVIOUS_DAY
  - DAY_OF_TRAVEL_ONLY
  - ADVANCE_AND_DAY_OF_TRAVEL
  - TIME_OF_TRAVEL_ONLY
  - SUBSCRIPTION_CHARGE_MOMENT
BookingArrangement:
  type: object
  additionalProperties: false
  description: |
    a booking arrangement description in a Leg- To be used if the leg can not be booked via the OSDM api.
    Provided by OJP.
  properties:
    bookingContact:
      $ref: ./_common.yml#/ContactDetail
    bookingMethod:
      $ref: '#/BookingMethod'
    bookingAccess:
      $ref: '#/BookingAccess'
    bookingAccessTime:
      $ref: '#/BookingAccessTiming'
    bookingPurchaseMoment:
      $ref: '#/BookingPurchaseMoment'
    lastBookingTime:
      type: string
      format: date-time
    minimumBookingPeriod:
      type: string
      format: duration
    maximumBookingPeriod:
      type: string
      format: duration
    _links:
      $ref: ./_common.yml#/Links
    bookingNotes:
      description: human readable description on booking arrangement
      type: array
      items:
        type: string
BookingChangeType:
  type: string
  description: The type of change that has occurred on the booking.
  enum:
  - BOOKING_REAL_TIME_EVENT_OCCURRED
  - BOOKING_REACCOMMODATED
  - BOOKING_TRIP_CHANGED
  - BOOKING_TRIP_CONFIRMED
  - BOOKING_ON_HOLD
  - DOCUMENT_AVAILABLE
  - FULFILLMENT_AVAILABLE
  - FULFILLMENT_REFUNDED
  - FULFILLMENT_EXCHANGED
  - FULFILLMENT_CANCELLED
  - FULFILLMENT_RELEASED
  - FULFILLMENT_CONTROLLED
  - ACCOMMODATION_RELEASED
  - PURCHASER_CHANGED
  - PASSENGER_CHANGED
  - REFUND_INITIATED
  - EXCHANGE_INITIATED
  - RELEASE_INITIATED
  - CANCEL_INITIATED
  - ON_HOLD_INITIATED
  - AFTERSALES_OVERRIDEN
  - CONTINUOUS_SERVICE_UPDATE
  - CONTINUOUS_SERVICE_USAGE_BLOCKED
  - CONTINUOUS_SERVICE_USAGE_UNBLOCKED
  - CONTINUOUS_SERVICE_USAGE_STARTED
  - CONTINUOUS_SERVICE_USAGE_EDED
  - CONTINUOUS_SERVICE_USAGE_UPDATE
  - POST_PAYMENT_PRICING_UPDATE
  - PRE_PAYMENT_PRICING_UPDATE
  examples:
  - FULFILLMENT_REFUNDED
BookingCleanupRequest:
  type: object
  additionalProperties: false
  description: |
    Request to cleanup a complete booking.
    Unconfirmed items will be deleted, any confirmed items will be refunded. There is no confirmation required.
BookingEvent:
  type: object
  description: An event that has occurred on a booking.
  allOf:
  - $ref: ./complaint.yml#/NotificationEvent
  - type: object
    additionalProperties: false
    required:
    - type
    - bookingId
    properties:
      type:
        $ref: '#/BookingChangeType'
      bookingId:
        type: string
        description: The ID of the booking that has changed.
      affectedBookingPartIds:
        description: list of ids of affected booking parts
        type: array
        items:
          type: string
      affectedFulfillmentIds:
        description: list of ids of affected fulillments
        type: array
        items:
          type: string
BookingHistoryResponse:
  type: object
  additionalProperties: false
  required:
  - events
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    events:
      type: array
      items:
        $ref: ./_common.yml#/Event
      minItems: 1
BookingMethod:
  description: |
    used to indicate booking options not provided via the OSDM app.
    Provided by OJP.
  type: string
  x-extensible-enum:
  - CALL_DRIVER
  - CALL_OFFICE
  - ONLINE
  - OTHER
  - PHONE_AT_STOP
  - TEXT
  - MOBILE_APP
  - AT_OFFICE
BookingPartReference:
  type: object
  additionalProperties: false
  description: |
    References all the booking part elements in an uniform format.
    In its part, a BookingPartReference can refer to reservation, admission, ancillary or fee.
  required:
  - id
  properties:
    id:
      type: string
      maxLength: 32768
    summary:
      description: |
        A human-readable description of the booking part reference.
      type:
      - string
      - 'null'
    _links:
      $ref: ./_common.yml#/Links
BookingPartStatus:
  type: string
  enum:
  - PREBOOKED
  - ON_HOLD
  - CONFIRMED
  - FULFILLED
  - CANCELLED
  - RELEASED
  - REFUNDED
  - EXCHANGE_ONGOING
  - EXCHANGED
  - ERROR
BookingPartSummary:
  type: object
  additionalProperties: false
  required:
  - id
  - summary
  - productSummaries
  - status
  - type
  properties:
    id:
      type: string
      maxLength: 32768
    summary:
      type: string
    productSummaries:
      type: array
      items:
        $ref: ./product.yml#/ProductSummary
      minItems: 1
    status:
      $ref: '#/BookingPartStatus'
    type:
      $ref: '#/BookingPartType'
BookingPartType:
  type: string
  enum:
  - ADMISSION
  - RESERVATION
  - ANCILLARY
  - CONTINUOUS_SERVICE
BookingPatchRequest:
  type: object
  additionalProperties: false
  description: |
    Allows setting the required fulfillment type, e.g. value paper
    or e-ticket and preferred fulfillment media.
    The latter is optional and relevant in some cases only.
  properties:
    externalRef:
      type:
      - string
      - 'null'
      description: The unique booking reference in the distributor/retailer system. Usually refers to an order number or PNR.
    placeSelections:
      type: array
      items:
        $ref: ./place.yml#/PlaceSelection
    requestedFulfillmentType:
      $ref: ./fulfillment.yml#/FulfillmentType
    preferredFulfillmentMedia:
      $ref: ./fulfillment.yml#/FulfillmentMediaType
    usedPaymentMethods:
      type: array
      items:
        $ref: ./_common.yml#/PaymentMethod
BookingPurchaseMoment:
  description: "used to indicate booking options not provided via the OSDM app.\nProvided by OJP.\n- 'ON_RESERVATION'\ndescription:\
    \ must be made on reservation in advance of travel\n- 'IN_ADVANCE'\ndescription: can be made in advance of travel\n- 'IN_ADVANCE_ONLY'\n\
    description: can only be made in advance of travel \n- 'BEFORE_BOARDING'\ndescription: can be made before boarding transport\
    \ vehicle\n- 'BEFORE_BOARDING_ONLY'\ndescription: must be made before boarding transport vehicle\n- 'ON_BOARDING'\ndescription:\
    \ be made when boarding the transport vehicle\n- 'ON_BOARDING_ONLY'\ndescription: can only be made when boarding the transport\
    \ vehicle\n- 'AFTER_BOARDING'\ndescription: can be made after boarding transport vehicle\n- 'ON_CHECKIN'\ndescription:\
    \ can be made on entering transport system\n- 'ON_CHECKOUT'\ndescription: can be made on leaving transport system\n- 'SUBSCRIPTION_ONLY'\n\
    description: can only be made on subscription\n"
  type: string
  x-extensible-enum:
  - ON_RESERVATION
  - IN_ADVANCE
  - IN_ADVANCE_ONLY
  - BEFORE_BOARDING
  - BEFORE_BOARDING_ONLY
  - ON_BOARDING
  - ON_BOARDING_ONLY
  - AFTER_BOARDING
  - ON_CHECKIN
  - ON_CHECKOUT
  - SUBSCRIPTION_ONLY
BookingRequest:
  type: object
  additionalProperties: false
  required:
  - offers
  - passengerSpecifications
  properties:
    offers:
      description: |
        The list of offers that need to be provisionally booked, with possibly the reservations and ancillaries associated that should be booked as well.
      type: array
      items:
        $ref: ./offer.yml#/OfferSelection
      minItems: 1
    passengerSpecifications:
      description: |
        If needed (cf requiredInformation) or desired, this array allows providing the required details on some or all passengers
      type: array
      items:
        $ref: ./person.yml#/PassengerSpecification
      minItems: 1
    purchaser:
      $ref: ./person.yml#/PurchaserSpecification
    promotionCodes:
      type: array
      items:
        $ref: ./_common.yml#/PromotionCode
    requestedFulfillmentType:
      $ref: ./fulfillment.yml#/FulfillmentType
    preferredFulfillmentMedia:
      $ref: ./fulfillment.yml#/FulfillmentMediaType
    embed:
      description: |
        Influences whether referenced resources are returned in full or as references only.
      type: array
      items:
        $ref: '#/BookingResponseContent'
    externalRef:
      type:
      - string
      - 'null'
BookingResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    booking:
      $ref: '#/Booking'
BookingResponseContent:
  description: |
    Influences whether referenced resources are returned in full or as references only.
  type: string
  enum:
  - ALL
  - BOOKING
  - BOOKING_PASSENGERS
  - BOOKING_PURCHASER
  - BOOKING_TRIPS
  - BOOKING_BOOKEDOFFERS
  - BOOKING_FULFILLMENTS
  - BOOKING_DOCUMENTS
  - BOOKING_REFUNDOFFERS
  - BOOKING_RELEASEOFFERS
  - BOOKING_CANCELFULFILLMENTSOFFER
  - BOOKING_EXCHANGEOPERATIONS
  - NONE
  default: ALL
BookingSearchParameters:
  type: object
  additionalProperties: false
  properties:
    numberOfResults:
      type:
      - integer
      - 'null'
      format: int32
      default: 10
    status:
      type: array
      items:
        $ref: '#/BookingPartStatus'
BookingSearchRequest:
  type: object
  additionalProperties: false
  properties:
    origin:
      $ref: ./ojp/place.yml#/PlaceRef
    destination:
      $ref: ./ojp/place.yml#/PlaceRef
    passenger:
      $ref: ./person.yml#/PersonSearchRequest
    purchaser:
      $ref: ./person.yml#/PurchaserSearchRequest
    bookingId:
      type:
      - string
      - 'null'
    bookingCode:
      description: |
        reference to the booking in the downstream distributor system
      type:
      - string
      - 'null'
    externalRef:
      description: reference to the booking in the retailer system
      type:
      - string
      - 'null'
    fulfillmentId:
      type:
      - string
      - 'null'
    fulfillmentControlNumber:
      type:
      - string
      - 'null'
    travelDateRange:
      $ref: ./_common.yml#/DateRange
    purchaseDateRange:
      $ref: ./_common.yml#/DateRange
    parameters:
      $ref: '#/BookingSearchParameters'
BookingSearchResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    bookingSearchResults:
      type: array
      items:
        $ref: '#/BookingSearchResult'
    _links:
      $ref: ./_common.yml#/Links
BookingSearchResult:
  type: object
  additionalProperties: false
  description: |
    Summary of the booking found by the booking search. For more information, get the booking.
  required:
  - passengers
  - id
  - bookedOfferSummaries
  properties:
    purchaser:
      $ref: ./person.yml#/Purchaser
    passengers:
      type: array
      items:
        $ref: ./person.yml#/Passenger
      minItems: 1
    tripSummaries:
      type: array
      items:
        $ref: ./ojp/trip.yml#/TripSummary
    id:
      type: string
    bookingCode:
      type: string
      description: The unique booking code in the provider system. Usually refers to an order number or PNR.
    externalRef:
      description: |
        The unique booking reference in the provider system. Usually refers to an order number or PNR.
      type:
      - string
      - 'null'
    provisionalPrice:
      description: |
        price of all unconfirmed pre-booked parts in the booking
      $ref: ./_common.yml#/Price
    confirmedPrice:
      description: |
        sum of all prices of confirmed parts in the booking minus the sum of all confirmed refund amounts.
      $ref: ./_common.yml#/Price
    bookedOfferSummaries:
      type: array
      items:
        $ref: '#/BookedOfferSummary'
      minItems: 1
BookingSplit:
  type: object
  additionalProperties: false
  description: |
    Contains the newly created booking
  required:
  - bookingId
  properties:
    bookingId:
      type: string
    passengerIds:
      description: |
        Ids of the passengers
        Providing the passengerIds is required for passenger transport. There are uses cases (e.g. sale of merchandising articles) where no passenger is involved. Only in these cases it is allowed to omit the passengerIds.
      type: array
      items:
        type: string
      minItems: 1
BookingSplitGroup:
  type: object
  additionalProperties: false
  description: |
    Group of passenger(s) that is to be split into a separate booking.
  required:
  - passengerIds
  properties:
    passengerIds:
      type: array
      items:
        type: string
      minItems: 1
BookingSplitRequest:
  type: object
  additionalProperties: false
  required:
  - groups
  properties:
    groups:
      type: array
      items:
        $ref: '#/BookingSplitGroup'
      minItems: 1
BookingSplitResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
