AbstractTravelAccount:
  type: object
  additionalProperties: false
  discriminator:
    propertyName: objectType
  required:
  - objectType
  - issuer
  - validFrom
  - validUntil
  - number
  properties:
    objectType:
      description: Attribute is used as discriminator for inheritance between data types.
      type: string
    holder:
      $ref: ./person.yml#/PersonDetail
    issuer:
      $ref: ./_common.yml#/CompanyRef
    validFrom:
      type: string
      format: date-time
    validUntil:
      type: string
      format: date-time
    number:
      type: string
AbstractTravelAccountUnit:
  type: object
  additionalProperties: false
  discriminator:
    propertyName: objectType
  required:
  - objectType
  properties:
    objectType:
      description: Attribute is used as discriminator for inheritance between data types.
      type: string
DayTravelAccountUnit:
  allOf:
  - $ref: '#/AbstractTravelAccountUnit'
  - type: object
    additionalProperties: false
MoneyTravelAccountUnit:
  allOf:
  - $ref: '#/AbstractTravelAccountUnit'
  - type: object
    additionalProperties: false
    required:
    - currency
    properties:
      currency:
        $ref: ./_common.yml#/Currency
      scale:
        type:
        - integer
        - 'null'
        format: int32
        default: 2
MultiRideAccount:
  allOf:
  - $ref: '#/AbstractTravelAccount'
  - type: object
    additionalProperties: false
    required:
    - regionalConstraintSummary
    - balance
    properties:
      regionalConstraint:
        $ref: ./fare.yml#/RegionalConstraint
      regionalConstraintSummary:
        type: string
      balance:
        $ref: '#/MultiRideBalance'
      usage:
        type: array
        items:
          $ref: '#/TravelAccountUsage'
MultiRideBalance:
  type: object
  additionalProperties: false
  description: |
    The balance of the travel account.
  required:
  - total
  - remaining
  - unit
  properties:
    total:
      type: integer
      format: int32
    remaining:
      type: integer
      format: int32
    unit:
      $ref: '#/AbstractTravelAccountUnit'
NamedTravelAccountUnit:
  allOf:
  - $ref: '#/AbstractTravelAccountUnit'
  - type: object
    additionalProperties: false
    required:
    - name
    properties:
      name:
        type: string
TravelAccountResponse:
  type: object
  additionalProperties: false
  properties:
    problems:
      type: array
      items:
        $ref: ./_common.yml#/Problem
    travelAccount:
      $ref: '#/AbstractTravelAccount'
TravelAccountResponseContent:
  type: string
  enum:
  - ALL
  - USAGE
  - NONE
  default: ALL
TravelAccountType:
  description: |
    Values from the [Travel Account Type Code List](https://osdm.io/spec/catalog-of-code-lists/#TravelAccountType)
  type: string
  enum:
  - LINKED_TICKET
  - LOYALTY_CARD
  - MULTI_RIDE
  - REDUCTION_CARD
  - TRAVEL_PASS
TravelAccountUsage:
  type: object
  additionalProperties: false
  required:
  - usedOn
  - bookingId
  - unit
  - bookingSummary
  - usedAmount
  properties:
    usedOn:
      type: string
      format: date-time
    bookingId:
      type: string
    unit:
      $ref: '#/AbstractTravelAccountUnit'
    bookingSummary:
      type: string
    tripSummary:
      $ref: ./ojp/trip.yml#/TripSummary
    usedAmount:
      type: integer
      format: int32
TravelPassAccount:
  allOf:
  - $ref: '#/AbstractTravelAccount'
  - type: object
    additionalProperties: false
    required:
    - regionalConstraintSummary
    properties:
      regionalConstraintSummary:
        type: string
      regionalConstraint:
        $ref: ./fare.yml#/RegionalConstraint
      usage:
        type: array
        items:
          $ref: '#/TravelAccountUsage'
TripTravelAccountUnit:
  allOf:
  - $ref: '#/AbstractTravelAccountUnit'
  - type: object
    additionalProperties: false
