name: Bundle OpenAPI Specification

on:
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: latest

      - name: Install Redocly CLI
        run: npm i -g @redocly/cli@latest

      - name: Bundle modular spec
        run: redocly bundle specification/OSDM-online-api.yml --output specification/OSDM-online-api.bundled.yml

      - name: Commit bundled spec
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add specification/OSDM-online-api.bundled.yml
          git diff --cached --quiet || git commit -m "chore: update bundled OpenAPI spec"
          git push
